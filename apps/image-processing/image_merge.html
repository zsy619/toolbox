    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var layoutItems = document.querySelectorAll('.layout-item');
            var ratioItems = document.querySelectorAll('.ratio-item');

            layoutItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    layoutItems.forEach(function(el) {
                        el.classList.remove('active', 'border-primary', 'ring-2', 'ring-blue-200');
                        el.classList.add('border-gray-200');
                    });
                    this.classList.add('active', 'border-primary');
                    this.classList.remove('border-gray-200');

                    var gridStyle = this.dataset.grid;
                    var layoutId = this.dataset.layout;
                    updatePreviewLayout(layoutId, gridStyle);
                });
            });

            ratioItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    ratioItems.forEach(function(el) {
                        el.classList.remove('bg-primary', 'text-white');
                        el.classList.add('bg-gray-100', 'text-gray-700');
                    });
                    this.classList.remove('bg-gray-100', 'text-gray-700');
                    this.classList.add('bg-primary', 'text-white');
                });
            });

            document.getElementById('spacingSlider').addEventListener('input', function() {
                document.getElementById('spacingValue').textContent = this.value + 'px';
                applySpacing(this.value);
            });

            document.getElementById('radiusSlider').addEventListener('input', function() {
                document.getElementById('radiusValue').textContent = this.value + 'px';
                applyRadius(this.value);
            });

            document.getElementById('qualitySlider').addEventListener('input', function() {
                document.getElementById('qualityValue').textContent = this.value + '%';
            });

            document.getElementById('bgColorPicker').addEventListener('input', function() {
                var preview = document.getElementById('bgColorPreview');
                var textInput = document.getElementById('bgColorText');
                preview.style.backgroundColor = this.value;
                textInput.value = this.value;
                document.getElementById('previewContainer').style.backgroundColor = this.value;
            });

            document.getElementById('bgColorText').addEventListener('input', function() {
                var picker = document.getElementById('bgColorPicker');
                var preview = document.getElementById('bgColorPreview');
                if (/^#[0-9A-Fa-f]{6}$/.test(this.value)) {
                    picker.value = this.value;
                    preview.style.backgroundColor = this.value;
                    document.getElementById('previewContainer').style.backgroundColor = this.value;
                }
            });

            document.getElementById('mergeBtn').addEventListener('click', function() {
                var gridCells = document.querySelectorAll('.grid-cell');
                var hasImage = false;

                gridCells.forEach(function(cell) {
                    if (cell.querySelector('img')) hasImage = true;
                });

                if (!hasImage) {
                    layui.layer.msg('请至少上传一张图片', { icon: 2 });
                    return;
                }

                layui.layer.msg('正在合并图片...', { icon: 16, time: 2000 }, function() {
                    document.getElementById('resultPreview').src = 'https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1200&q=80';
                    document.getElementById('resultContainer').classList.remove('hidden');
                    document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
                });
            });

            document.getElementById('downloadBtn').addEventListener('click', function() {
                layui.layer.msg('拼图已开始下载', { icon: 1 });
            });

            document.getElementById('newBtn').addEventListener('click', function() {
                document.getElementById('resultContainer').classList.add('hidden');
                resetPreview();
            });

            document.getElementById('resetBtn').addEventListener('click', resetPreview);

            function updatePreviewLayout(layoutId, gridStyle) {
                var gridContainer = document.getElementById('previewGrid');
                gridContainer.style.cssText = gridStyle + ' width: 100%; min-height: 400px;';
                gridContainer.innerHTML = '';

                var cellCount = 2;
                if (layoutId.startsWith('3')) cellCount = 3;
                else if (layoutId.startsWith('4')) cellCount = 4;
                else if (layoutId.startsWith('6')) cellCount = 6;
                else if (layoutId.startsWith('8')) cellCount = 8;
                else if (layoutId.startsWith('9')) cellCount = 9;

                for (var i = 0; i < cellCount; i++) {
                    var cell = document.createElement('div');
                    cell.className = 'grid-cell relative bg-white border-2 border-dashed border-primary rounded-lg overflow-hidden transition-all duration-300 cursor-pointer hover:border-solid hover:shadow-lg flex items-center justify-center';
                    cell.dataset.index = i;

                    cell.innerHTML = '<div class="text-center p-5"><div class="text-4xl text-primary mb-2"><i class="fas fa-cloud-upload-alt"></i></div><div class="text-sm text-gray-500">点击上传图片</div></div>';

                    cell.addEventListener('click', function(e) {
                        if (!e.target.closest('.remove-btn')) {
                            simulateUpload(this, i);
                        }
                    });

                    cell.setAttribute('draggable', true);

                    cell.addEventListener('dragstart', function(e) {
                        this.classList.add('opacity-70', 'scale-95');
                        e.dataTransfer.setData('text/plain', i.toString());
                    });

                    cell.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        this.classList.add('border-solid', 'ring-2', 'ring-blue-300');
                    });

                    cell.addEventListener('dragleave', function() {
                        this.classList.remove('ring-2', 'ring-blue-300');
                    });

                    cell.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.classList.remove('ring-2', 'ring-blue-300');

                        var fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                        var toIndex = parseInt(this.dataset.index);

                        if (fromIndex !== toIndex) {
                            swapImages(fromIndex, toIndex);
                        }
                    });

                    cell.addEventListener('dragend', function() {
                        this.classList.remove('opacity-70', 'scale-95');
                    });

                    gridContainer.appendChild(cell);
                }

                updateImageCount();
            }

            function simulateUpload(cell, index) {
                var images = [
                    'https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80',
                    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80',
                    'https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80',
                    'https://images.unsplash.com/photo-1506260408121-e353d10b87c7?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80',
                    'https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80'
                ];

                var randomImage = images[Math.floor(Math.random() * images.length)];

                cell.innerHTML = '<img src="' + randomImage + '" alt="上传的图片" class="w-full h-full object-cover">' +
                    '<button class="remove-btn absolute top-2 right-2 w-7 h-7 bg-white/90 rounded-full flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white shadow-lg opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-times text-sm"></i></button>' +
                    '<div class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded-full">' + (index + 1) + '</div>';

                cell.classList.add('group');
                cell.classList.remove('border-dashed');

                var removeBtn = cell.querySelector('.remove-btn');
                removeBtn.style.opacity = '1';
                removeBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    cell.innerHTML = '<div class="text-center p-5"><div class="text-4xl text-primary mb-2"><i class="fas fa-cloud-upload-alt"></i></div><div class="text-sm text-gray-500">点击上传图片</div></div>';
                    cell.classList.remove('group', 'border-solid');
                    cell.addEventListener('click', function() { simulateUpload(cell, index); });
                    updateImageCount();
                });

                updateImageCount();
            }

            function swapImages(fromIndex, toIndex) {
                var cells = document.querySelectorAll('.grid-cell');
                var fromCell = cells[fromIndex];
                var toCell = cells[toIndex];

                var fromImg = fromCell.querySelector('img');
                var toImg = toCell.querySelector('img');

                if (fromImg && toImg) {
                    var tempSrc = fromImg.src;
                    fromImg.src = toImg.src;
                    toImg.src = tempSrc;
                    layui.layer.msg('已交换图片 ' + (fromIndex + 1) + ' 和 ' + (toIndex + 1), { icon: 1 });
                }
            }

            function updateImageCount() {
                var count = document.querySelectorAll('.grid-cell img').length;
                document.getElementById('imageCount').textContent = count;
            }

            function applySpacing(spacing) {
                document.getElementById('previewGrid').style.gap = spacing + 'px';
            }

            function applyRadius(radius) {
                var cells = document.querySelectorAll('.grid-cell');
                cells.forEach(function(cell) {
                    cell.style.borderRadius = radius + 'px';
                });
            }

            function resetPreview() {
                document.getElementById('previewGrid').innerHTML = '';
                document.getElementById('imageCount').textContent = '0';

                var activeLayout = document.querySelector('.layout-item.active');
                var gridStyle = activeLayout.dataset.grid;
                var layoutId = activeLayout.dataset.layout;
                updatePreviewLayout(layoutId, gridStyle);
            }

            var defaultLayout = document.querySelector('.layout-item.active');
            var defaultGridStyle = defaultLayout.dataset.grid;
            var defaultLayoutId = defaultLayout.dataset.layout;
            updatePreviewLayout(defaultLayoutId, defaultGridStyle);
        });
    </script>
