    <script src="../../assets/js/layui.min.js"></script>
    <script>
        layui.use(['slider', 'upload', 'element', 'layer'], function () {
            var slider = layui.slider;
            var upload = layui.upload;
            var element = layui.element;
            var layer = layui.layer;

            var currentImage = null;
            var images = [];
            var outputFormat = 'jpg';

            slider.render({
                elem: '#qualitySlider',
                value: 80,
                min: 10,
                max: 100,
                step: 5,
                theme: '#3498db',
                change: function (value) {
                    document.getElementById('qualityValue').textContent = value + '%';
                    if (currentImage) {
                        currentImage.quality = value;
                        updatePreview();
                    }
                }
            });

            slider.render({
                elem: '#brightnessSlider',
                value: 0,
                min: -100,
                max: 100,
                step: 5,
                theme: '#3498db',
                change: function (value) {
                    document.getElementById('brightnessValue').textContent = value + '%';
                    if (currentImage) {
                        currentImage.brightness = value;
                        updatePreview();
                    }
                }
            });

            slider.render({
                elem: '#contrastSlider',
                value: 0,
                min: -100,
                max: 100,
                step: 5,
                theme: '#3498db',
                change: function (value) {
                    document.getElementById('contrastValue').textContent = value + '%';
                    if (currentImage) {
                        currentImage.contrast = value;
                        updatePreview();
                    }
                }
            });

            document.getElementById('uploadBtn').addEventListener('click', function () {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', function (e) {
                if (this.files && this.files.length > 0) {
                    handleFiles(this.files);
                }
            });

            var uploadArea = document.getElementById('uploadArea');
            uploadArea.addEventListener('dragover', function (e) {
                e.preventDefault();
                uploadArea.classList.add('border-primary', 'bg-blue-50');
            });
            uploadArea.addEventListener('dragleave', function () {
                uploadArea.classList.remove('border-primary', 'bg-blue-50');
            });
            uploadArea.addEventListener('drop', function (e) {
                e.preventDefault();
                uploadArea.classList.remove('border-primary', 'bg-blue-50');
                if (e.dataTransfer.files.length) {
                    handleFiles(e.dataTransfer.files);
                }
            });

            function handleFiles(files) {
                var imageList = document.getElementById('imageList');
                if (imageList.querySelector('.text-center')) {
                    imageList.innerHTML = '';
                }

                Array.from(files).forEach(function (file, index) {
                    if (!file.type.startsWith('image/')) return;

                    var reader = new FileReader();
                    reader.onload = function (e) {
                        var imgInfo = {
                            id: 'img_' + Date.now() + '_' + index,
                            name: file.name,
                            size: (file.size / 1024).toFixed(1) + 'KB',
                            url: e.target.result,
                            file: file,
                            index: index,
                            quality: 80,
                            format: outputFormat,
                            rotation: 0,
                            flipH: 1,
                            flipV: 1,
                            brightness: 0,
                            contrast: 0
                        };

                        images.push(imgInfo);

                        var itemHTML = `
                            <div class="image-item group relative bg-white rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 cursor-pointer border-2 border-transparent hover:border-primary" data-id="${imgInfo.id}">
                                <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                    <button class="remove-btn w-8 h-8 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 shadow-lg text-xs">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                                <div class="absolute top-2 left-2 bg-primary text-white px-2 py-0.5 rounded-full text-xs font-semibold opacity-0 group-hover:opacity-100 transition-opacity z-10">${imgInfo.format.toUpperCase()}</div>
                                <div class="h-32 overflow-hidden">
                                    <img src="${imgInfo.url}" alt="${imgInfo.name}" class="w-full h-full object-cover">
                                </div>
                                <div class="p-3">
                                    <div class="text-sm font-semibold text-gray-700 truncate">${imgInfo.name}</div>
                                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                                        <span>${imgInfo.size}</span>
                                        <span class="format-tag">${imgInfo.format.toUpperCase()}</span>
                                    </div>
                                </div>
                            </div>
                        `;

                        imageList.innerHTML += itemHTML;
                        updateImageCount();

                        document.querySelectorAll('.image-item').forEach(function (item) {
                            item.addEventListener('click', function (e) {
                                if (e.target.closest('.remove-btn')) return;
                                var id = this.getAttribute('data-id');
                                selectImage(id);
                            });
                        });

                        document.querySelectorAll('.remove-btn').forEach(function (btn) {
                            btn.addEventListener('click', function (e) {
                                e.stopPropagation();
                                var id = this.closest('.image-item').getAttribute('data-id');
                                removeImage(id);
                            });
                        });
                    };
                    reader.readAsDataURL(file);
                });
            }

            function updateImageCount() {
                document.getElementById('imageCount').textContent = images.length + '张图片';
                document.getElementById('totalText').textContent = images.length;
            }

            function selectImage(id) {
                document.querySelectorAll('.image-item').forEach(function (item) {
                    item.classList.remove('active', 'border-primary');
                    item.classList.add('border-transparent');
                });

                var selectedItem = document.querySelector(`.image-item[data-id="${id}"]`);
                if (selectedItem) {
                    selectedItem.classList.add('active', 'border-primary');
                    selectedItem.classList.remove('border-transparent');
                }

                currentImage = images.find(function (img) { return img.id === id; });
                updatePreview();

                slider.render({
                    elem: '#qualitySlider',
                    value: currentImage.quality,
                    min: 10,
                    max: 100,
                    step: 5,
                    theme: '#3498db'
                });

                slider.render({
                    elem: '#brightnessSlider',
                    value: currentImage.brightness,
                    min: -100,
                    max: 100,
                    step: 5,
                    theme: '#3498db'
                });

                slider.render({
                    elem: '#contrastSlider',
                    value: currentImage.contrast,
                    min: -100,
                    max: 100,
                    step: 5,
                    theme: '#3498db'
                });

                document.getElementById('qualityValue').textContent = currentImage.quality + '%';
                document.getElementById('brightnessValue').textContent = currentImage.brightness + '%';
                document.getElementById('contrastValue').textContent = currentImage.contrast + '%';
                updateFormatDisplay();
            }

            function removeImage(id) {
                document.querySelector(`.image-item[data-id="${id}"]`).remove();
                images = images.filter(function (img) { return img.id !== id; });
                updateImageCount();

                if (images.length === 0) {
                    currentImage = null;
                    document.getElementById('previewBox').innerHTML = `
                        <div class="text-center text-gray-400">
                            <i class="fas fa-image text-6xl mb-4 opacity-30"></i>
                            <p class="text-lg font-medium">选择一张图片进行预览</p>
                            <p class="text-sm">在下方图片列表中点击图片</p>
                        </div>
                    `;
                    document.getElementById('imageCount').textContent = '0张图片';
                } else if (currentImage && currentImage.id === id) {
                    selectImage(images[0].id);
                }
            }

            function updatePreview() {
                if (!currentImage) return;

                var previewBox = document.getElementById('previewBox');
                previewBox.innerHTML = `
                    <img src="${currentImage.url}" 
                         alt="${currentImage.name}"
                         class="max-w-full max-h-full object-contain rounded-lg shadow-xl transition-all duration-300"
                         style="transform: scaleX(${currentImage.flipH}) scaleY(${currentImage.flipV}) rotate(${currentImage.rotation}deg); 
                                filter: brightness(${100 + currentImage.brightness}%) contrast(${100 + currentImage.contrast}%)">
                    <div class="absolute top-4 right-4 bg-primary text-white px-4 py-1 rounded-full font-semibold shadow-lg">${currentImage.format.toUpperCase()}</div>
                `;
            }

            function updateFormatDisplay() {
                if (!currentImage) return;

                document.querySelectorAll('.format-option').forEach(function (option) {
                    option.classList.remove('bg-primary', 'text-white');
                    option.classList.add('text-gray-600');
                    if (option.getAttribute('data-format') === currentImage.format) {
                        option.classList.add('bg-primary', 'text-white');
                        option.classList.remove('text-gray-600');
                    }
                });

                document.querySelectorAll('.format-tag').forEach(function (span) {
                    var item = span.closest('.image-item');
                    if (item && item.getAttribute('data-id') === currentImage.id) {
                        span.textContent = currentImage.format.toUpperCase();
                    }
                });
            }

            document.querySelectorAll('.format-option').forEach(function (option) {
                option.addEventListener('click', function () {
                    if (!currentImage) {
                        layer.msg('请先选择一张图片', { icon: 2, time: 1500 });
                        return;
                    }

                    document.querySelectorAll('.format-option').forEach(function (opt) {
                        opt.classList.remove('bg-primary', 'text-white');
                        opt.classList.add('text-gray-600');
                    });
                    this.classList.add('bg-primary', 'text-white');
                    this.classList.remove('text-gray-600');

                    currentImage.format = this.getAttribute('data-format');
                    updatePreview();
                    updateFormatDisplay();
                    layer.msg('已设置为输出 ' + currentImage.format.toUpperCase() + ' 格式', { icon: 1, time: 1500 });
                });
            });

            document.querySelectorAll('.rotate-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    if (!currentImage) return;
                    var deg = parseInt(this.getAttribute('data-deg'));
                    currentImage.rotation += deg;
                    if (currentImage.rotation >= 360) currentImage.rotation -= 360;
                    if (currentImage.rotation < 0) currentImage.rotation += 360;
                    updatePreview();
                    layer.msg('已旋转 ' + (deg > 0 ? '向右' : '向左') + ' 90度', { icon: 1, time: 1500 });
                });
            });

            document.getElementById('flipV').addEventListener('click', function () {
                if (!currentImage) return;
                currentImage.flipV = currentImage.flipV === 1 ? -1 : 1;
                updatePreview();
                layer.msg('已垂直翻转', { icon: 1, time: 1500 });
            });

            document.getElementById('flipH').addEventListener('click', function () {
                if (!currentImage) return;
                currentImage.flipH = currentImage.flipH === 1 ? -1 : 1;
                updatePreview();
                layer.msg('已水平翻转', { icon: 1, time: 1500 });
            });

            document.getElementById('applyCrop').addEventListener('click', function () {
                if (!currentImage) return;
                layer.msg('裁剪已应用', { icon: 1, time: 1500 });
            });

            document.getElementById('resetCrop').addEventListener('click', function () {
                if (!currentImage) return;
                currentImage.rotation = 0;
                currentImage.flipH = 1;
                currentImage.flipV = 1;
                currentImage.brightness = 0;
                currentImage.contrast = 0;

                slider.render({
                    elem: '#brightnessSlider',
                    value: 0,
                    min: -100,
                    max: 100,
                    step: 5,
                    theme: '#3498db'
                });

                slider.render({
                    elem: '#contrastSlider',
                    value: 0,
                    min: -100,
                    max: 100,
                    step: 5,
                    theme: '#3498db'
                });

                document.getElementById('brightnessValue').textContent = '0%';
                document.getElementById('contrastValue').textContent = '0%';
                updatePreview();
                layer.msg('已重置所有编辑', { icon: 1, time: 1500 });
            });

            function simulateProcessing() {
                if (images.length === 0) {
                    layer.msg('请先上传图片', { icon: 2, time: 2000 });
                    return;
                }

                var processed = 0;
                var total = images.length;

                document.getElementById('processedText').textContent = '0';
                document.getElementById('progressText').textContent = '0%';
                document.getElementById('totalText').textContent = total;

                var progressBar = document.querySelector('.layui-progress-bar');
                progressBar.style.width = '0%';
                progressBar.setAttribute('lay-percent', '0%');
                element.render('progress');

                var interval = setInterval(function () {
                    processed++;
                    var percent = Math.round((processed / total) * 100);

                    document.getElementById('processedText').textContent = processed;
                    document.getElementById('progressText').textContent = percent + '%';
                    progressBar.style.width = percent + '%';
                    progressBar.setAttribute('lay-percent', percent + '%');
                    element.render('progress');

                    if (processed >= total) {
                        clearInterval(interval);
                        layer.msg('处理完成！共处理 ' + total + ' 张图片', { icon: 1, time: 3000 });
                    }
                }, 300);
            }

            document.getElementById('downloadAll').addEventListener('click', function () {
                if (images.length === 0) {
                    layer.msg('请先上传图片', { icon: 2, time: 2000 });
                    return;
                }
                layer.msg('开始打包下载处理后的图片', { icon: 1, time: 2000 });
                setTimeout(function () {
                    layer.msg('下载完成！', { icon: 1, time: 2000 });
                }, 2000);
            });

            document.getElementById('processAll').addEventListener('click', simulateProcessing);

            document.getElementById('mobileProcess').addEventListener('click', simulateProcessing);
            document.getElementById('mobileDownload').addEventListener('click', function () {
                document.getElementById('downloadAll').click();
            });
            document.getElementById('mobileCrop').addEventListener('click', function () {
                if (!currentImage) {
                    layer.msg('请先选择一张图片', { icon: 2, time: 1500 });
                    return;
                }
                document.getElementById('applyCrop').click();
            });
            document.getElementById('mobileRotate').addEventListener('click', function () {
                if (!currentImage) {
                    layer.msg('请先选择一张图片', { icon: 2, time: 1500 });
                    return;
                }
                document.querySelector('.rotate-btn[data-deg="90"]').click();
            });

            document.querySelectorAll('.crop-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.crop-btn').forEach(function (b) {
                        b.classList.remove('bg-primary', 'text-white');
                        b.classList.add('bg-gray-100', 'text-gray-700');
                    });
                    this.classList.add('bg-primary', 'text-white');
                    this.classList.remove('bg-gray-100', 'text-gray-700');

                    var ratio = this.getAttribute('data-ratio');
                    layer.msg('已设置为 ' + (ratio === 'free' ? '自由裁剪' : ratio + '比例裁剪'), { icon: 1, time: 1500 });
                });
            });
        });
    </script>
