    <script src="../../assets/js/vendor/cropper.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const fileInput = document.getElementById('fileInput');
            const uploadBox = document.getElementById('uploadBox');
            const cropperContainer = document.getElementById('cropperContainer');
            const photoPreview = document.getElementById('photoPreview');
            const resultPhoto = document.getElementById('resultPhoto');
            const resultSection = document.getElementById('resultSection');
            const cropBtn = document.getElementById('cropBtn');
            const cropResetBtn = document.getElementById('cropResetBtn');
            const processBtn = document.getElementById('processBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const resetBtn = document.getElementById('resetBtn');
            const progressBar = document.getElementById('progressBar');
            const steps = document.querySelectorAll('.step');

            let cropper;
            let currentBgColor = '#1E9FFF';

            uploadBox.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', function (e) {
                if (this.files && this.files[0]) {
                    const file = this.files[0];
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        initCropper(e.target.result);
                        updateProgress(2);
                    };
                    reader.readAsDataURL(file);
                }
            });

            function initCropper(imageSrc) {
                cropperContainer.innerHTML = '';
                const image = document.createElement('img');
                image.id = 'imageToCrop';
                image.src = imageSrc;
                image.style.maxWidth = '100%';
                cropperContainer.appendChild(image);
                cropper = new Cropper(image, {
                    aspectRatio: 3 / 4,
                    viewMode: 1,
                    autoCropArea: 0.8,
                    guides: true,
                    highlight: true,
                    cropBoxMovable: true,
                    cropBoxResizable: true
                });
            }

            document.querySelectorAll('.bg-color').forEach(color => {
                color.addEventListener('click', function () {
                    document.querySelectorAll('.bg-color').forEach(c => {
                        c.classList.remove('ring-4', 'ring-blue-200');
                    });
                    this.classList.add('ring-4', 'ring-blue-200');
                    currentBgColor = this.dataset.color;
                    photoPreview.style.backgroundColor = currentBgColor;
                });
            });

            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.size-btn').forEach(b => {
                        b.classList.remove('bg-blue-500', 'text-white');
                        b.classList.add('bg-blue-50', 'text-gray-700');
                    });
                    this.classList.remove('bg-blue-50', 'text-gray-700');
                    this.classList.add('bg-blue-500', 'text-white');
                });
            });

            cropBtn.addEventListener('click', function () {
                if (cropper) {
                    const croppedCanvas = cropper.getCroppedCanvas();
                    const croppedImage = croppedCanvas.toDataURL('image/jpeg');
                    photoPreview.style.backgroundImage = `url(${croppedImage})`;
                    photoPreview.style.backgroundSize = 'contain';
                    photoPreview.style.backgroundColor = currentBgColor;
                    showNotification('照片裁剪完成！', 'success');
                    updateProgress(3);
                }
            });

            cropResetBtn.addEventListener('click', function () {
                if (cropper) {
                    cropper.reset();
                    showNotification('裁剪区域已重置', 'info');
                }
            });

            processBtn.addEventListener('click', function () {
                if (cropper) {
                    const croppedCanvas = cropper.getCroppedCanvas();
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = croppedCanvas.width;
                    finalCanvas.height = croppedCanvas.height;
                    const ctx = finalCanvas.getContext('2d');
                    ctx.fillStyle = currentBgColor;
                    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
                    ctx.drawImage(croppedCanvas, 0, 0);
                    resultPhoto.src = finalCanvas.toDataURL('image/jpeg');
                    resultSection.classList.remove('hidden');
                    resultSection.scrollIntoView({ behavior: 'smooth' });
                    showNotification('证件照生成成功！', 'success');
                    updateProgress(4);
                } else {
                    showNotification('请先上传并裁剪照片', 'warning');
                }
            });

            downloadBtn.addEventListener('click', function () {
                if (resultPhoto.src) {
                    const link = document.createElement('a');
                    link.download = 'professional-id-photo.jpg';
                    link.href = resultPhoto.src;
                    link.click();
                    showNotification('证件照下载成功！', 'success');
                }
            });

            resetBtn.addEventListener('click', function () {
                fileInput.value = '';
                cropperContainer.innerHTML = '';
                photoPreview.style.backgroundImage = '';
                photoPreview.style.backgroundColor = '#1E9FFF';
                resultSection.classList.add('hidden');
                document.querySelectorAll('.bg-color').forEach(c => c.classList.remove('ring-4', 'ring-blue-200'));
                document.querySelector('.bg-color[data-color="#1E9FFF"]').classList.add('ring-4', 'ring-blue-200');
                currentBgColor = '#1E9FFF';
                document.querySelectorAll('.size-btn').forEach(b => {
                    b.classList.remove('bg-blue-500', 'text-white');
                    b.classList.add('bg-blue-50', 'text-gray-700');
                });
                document.querySelector('.size-btn[data-size="1"]').classList.remove('bg-blue-50', 'text-gray-700');
                document.querySelector('.size-btn[data-size="1"]').classList.add('bg-blue-500', 'text-white');
                updateProgress(1);
                if (cropper) {
                    cropper.destroy();
                    cropper = null;
                }
                showNotification('系统已重置，可以重新开始', 'info');
            });

            function updateProgress(step) {
                progressBar.style.width = `${12.5 + step * 18.75}%`;
                steps.forEach((s, index) => {
                    const icon = s.querySelector('.step-icon');
                    const text = s.querySelector('.step-text');
                    if (index < step) {
                        s.classList.add('active');
                        icon.classList.remove('text-gray-400', 'border-gray-300');
                        icon.classList.add('text-primary', 'border-primary');
                        text.classList.remove('text-white/70');
                        text.classList.add('text-white');
                    } else {
                        s.classList.remove('active');
                        icon.classList.add('text-gray-400', 'border-gray-300');
                        icon.classList.remove('text-primary', 'border-primary');
                        text.classList.add('text-white/70');
                        text.classList.remove('text-white');
                    }
                });
            }

            function showNotification(message, type) {
                const notification = document.createElement('div');
                notification.textContent = message;
                notification.className = 'fixed top-5 right-5 px-6 py-4 rounded-xl text-white font-medium shadow-xl z-50 transform translate-x-full opacity-0 transition-all duration-400';

                const colors = {
                    success: 'bg-gradient-to-r from-green-500 to-green-600',
                    warning: 'bg-gradient-to-r from-yellow-500 to-yellow-600',
                    error: 'bg-gradient-to-r from-red-500 to-red-600',
                    info: 'bg-gradient-to-r from-blue-500 to-blue-600'
                };
                notification.className += ` ${colors[type] || colors.info}`;

                document.body.appendChild(notification);
                setTimeout(() => {
                    notification.classList.remove('translate-x-full', 'opacity-0');
                }, 10);

                setTimeout(() => {
                    notification.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => document.body.removeChild(notification), 400);
                }, 3000);
            }
        });
    </script>
