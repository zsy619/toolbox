            margin: 0;
            padding: 0;

        body {

            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            background-image:

                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 40%),
                radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-container h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .label-row span {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
        }

        textarea {
            width: 100%;
            height: calc(100vh - 420px);
            min-height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-family: 'ui-monospace', 'SFMono-Regular', Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        textarea:focus {
            border-color: var(--accent-blue);
        }

        textarea.maximized {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
            resize: none;
            background-color: #0f172a;
            color: #f1f5f9;
            border: none;
            padding: 10px;
            font-size: 26px;
            line-height: 1.2;
        }

        textarea.maximized:focus {
            outline: none;
            border: 2px solid #38bdf8;
        }

        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 16px;
            max-height: 200px;
            overflow-y: auto;
        }

        .template-grid::-webkit-scrollbar {
            width: 4px;
        }

        .template-grid::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .template-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-main);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;

        .template-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);

        .action-btns {

            gap: 12px;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-row .btn-secondary {
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #0ea5e9);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-secondary {
            background: var(--secondary-btn-bg);

            align-items: center;
            color: var(--text-main);

        .tool-btn.active {

        .tool-btn:hover {

        /* Theme Selector */
        .theme-select {

        .theme-options {
            display: flex;
            gap: 8px;

        .theme-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;

        .theme-circle:hover {

        }

        .theme-circle.active {

        }

        #diagram-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #diagram-svg:active {
            cursor: grabbing;
        }

        /* Node Styles */
        .node-rect {
            fill: var(--card-bg);
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1;
            rx: 12;
            ry: 12;

        .node-text {
            fill: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            user-select: none;
        }

        .operator-badge {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));

        }

        .operator-badge:hover {
            transform: scale(1.2);
        }

        .operator-circle {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 2;
        }

        .operator-text {
            fill: #fff;
            font-size: 14px;
            font-weight: 800;
            user-select: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);

        /* Red 500 */

            fill: #8b5cf6;
        }

        /* Violet 500 */

            fill: #f59e0b;
        }

        /* Amber 500 */
        .op-default {
            fill: #64748b;
        }

        /* Slate 500 */
        .link-path {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 2;
            transition: stroke 0.3s;
        }

        const templates = {
            "ecommerce": "女装店收入 = 流量指标 * 转化指标 * 客单价指标\n流量指标 = 进店人数 + 站外引流\n进店人数 = 站内流量 + 站外流量\n付费转化率 = 详情页转化 * 支付转化\n转化指标 = 付费转化率 + 详情页转化\n客单价指标 = 平均件单价 * 人均购买件数\n平均件单价 = 基础价 * 折扣率",
            "saas": "MRR = 客户指标 * ARPU指标 + 本月新增\n客户指标 = 存量客户 + 新增客户\n存量客户 = 上月存量 - 流失客户数\n本月新增 = 线索量 * 试用转化率 * 成交率\n流失客户数 = 存量客户 * 流失率\nARPU指标 = 基础订阅 + 增值服务",
            "retail": "单店产出 = 客流指标 * 转化指标 * 客单价指标\n客流指标 = 橱窗客流 * 进店率\n转化率 = 试穿率 * 购买率\n转化指标 = 转化率 + 试穿率\n客单价指标 = 连带率 * 平均单价\n平均单价 = 基础价 * 折扣率",
            "content": "内容总收益 = 阅读量指标 * 收益指标\n阅读量指标 = 粉丝分发 + 算法推荐 + 社群传播\n粉丝分发 = 粉丝数 * 打开率\n算法推荐 = 内容质量分 * 关键词权重\n社群传播 = 社群用户 * 分享率\n收益指标 = 千次阅读收益 + 广告分成\n内容质量分 = 点击率 + 点赞率 * 2 + 完读率 * 5",
            "education": "课程收入 = 学员指标 * 客单价指标\n学员指标 = 试听转化 * 咨询转化 * 促单转化\n咨询转化 = 试听人数 * 课程匹配度 * 顾问能力\n促单转化 = 转化率 * 成交率\n客单价指标 = 课程定价 * 优惠系数",
            "private": "私域GMV = 社群产出 + 直播产出 + 1对1产出\n社群产出 = 社群人数 * 人均产出\n社群人数 = 存量用户 + 新增用户 - 流失用户\n新增用户 = 裂变新增 + 内容新增 + 活动新增\n流失用户 = 社群人数 * 流失率\n人均产出 = 互动率 * 转化率 * 客单价",
            "restaurant": "餐饮营收 = 内场营收 + 外卖营收\n内场营收 = 堂食客流 * 客单价 * 翻台率\n堂食客流 = 自然客流 * 截流率\n截流率 = 门口曝光 * 入店转化\n外卖营收 = 线上订单 * 平均单价 * 平台抽成",
            "livestream": "直播GMV = 场观人数 * 停留时长 * 千次观看产出\n场观人数 = 短视频引流 + 付费投流 + 粉丝召回\n停留时长 = 互动率 * 内容吸引力 * 话术转化\n千次观看产出 = 点击转化率 * 付款转化率 * 客单价",

            "realestate": "中介佣金 = 二手房佣金 + 新房佣金 + 租赁佣金\n二手房佣金 = 成交套数 * 成交均价 * 费率\n新房佣金 = 带看组数 * 成交转化率 * 单套佣金\n租赁佣金 = 租赁单数 * 月租金 * 收费月数\n成交套数 = 有效客户 * 需求匹配度 * 成交意愿度",
            "finance": "基金销售收入 = 管理费收入 + 申赎费收入 + 投顾服务费\n管理费收入 = AUM规模 * 综合管理费率\nAUM规模 = 存量规模 * 保有率 + 新增规模\n保有率 = 1 - 赎回率\n申赎费收入 = 认申购额 * 申赎费率均值 * 前端费率占比",
            "insurance": "保险佣金 = 首年指标 + 续期指标\n首年指标 = 新单保费 * 首年佣金率\n新单保费 = 有效拜访量 * 拜访转化率 * 件均保费\n有效拜访量 = 名单量 * 电话接通率 * 约见成功率\n件均保费 = 主险件均 + 附加险件均 * 组合率\n续期指标 = 续期佣金 + 团队管理津贴",
            "gaming": "游戏流水 = 内购收入 + 广告收入 + 订阅收入\n内购收入 = 活跃用户 * 付费率 * ARPU\n活跃用户 = 新增用户 * 次留率 * 回流率\n付费率 = 付费人数 / 活跃人数\nARPU = 首充金额 * 充值频次 + 累计充值 * 付费深度",
            "logistics": "物流营收 = 快递指标 + 快运指标 + 仓储指标\n快递指标 = 揽件量 * 均重 * 单价 * 增值服务率\n揽件量 = 上门客户数 * 下单转化 * 客均件数\n快运指标 = 票数 * 票均重量 * 干线单价 * 增值系数\n仓储指标 = 库存容量 * 库容利用率 * 仓储单价",
            "hotel": "酒店营收 = 客房指标 + 餐饮指标\n客房指标 = 可售房数 * 出租率 * 平均房价\n出租率 = 实际出租间夜 / 可售间夜\n平均房价 = ADR指数 * 市场均价 * 溢价系数\n餐饮指标 = 早餐收入 + 中晚餐收入 + 宴会收入",
            "tourism": "旅游营收 = 门票指标 + 住宿指标\n门票指标 = 客流量 * 门票单价 * 二次入园率\n客流量 = 线上渠道 + 线下渠道 + 团队渠道\n住宿指标 = 入住率 * 房间数 * 均价 * 平均天数",
            "beauty": "美容院营收 = 疗程指标 + 产品指标 + 会员指标\n疗程指标 = 新客成交 * 疗程单价 + 老客复购 * 疗程单价\n新客成交 = 咨询人数 * 体验转化率 * 成交转化率\n老客复购 = 存量客户 * 复购率 * 升单率\n产品指标 = 办卡人数 * 会员等级 * 平均充值金额",
            "fitness": "健身房营收 = 会籍指标 + 私教指标 + 课程指标\n会籍指标 = 新入会人数 * 年卡均价 + 续会人数 * 续会折扣\n新入会人数 = 潜客量 * 到店率 * 转化率\n私教指标 = 私教课时数 * 课时单价 * 续课率\n续课率 = 满意客户占比 * 需求匹配度\n课程指标 = 开课数 * 班均人数 * 课程单价",
            "auto": "4S店营收 = 销售指标 + 服务指标 + 保险指标\n销售指标 = 展厅客流 * 成交率 * 车价毛利\n展厅客流 = 自然进店 + 电话邀约 + 老带新\n服务指标 = 进场台次 * 客单价 * 进场频次\n保险指标 = 新保保费 * 手续费率 + 续保保费 * 续保手续费率",
            "farm": "农产品营收 = 线上指标 + 线下指标 + 体验采摘 + 会员配送\n线上指标 = 订单量 * 客单价 * 复购率\n线下指标 = 批发商数量 * 批发频次 * 批发均价\n体验采摘 = 体验人次 * 人均消费 * 转化会员率\n会员配送 = 会员数量 * 月均订单 * 月均消费",
            "beautyProd": "美妆品牌营收 = 电商指标 + 私域指标\n电商指标 = 天猫收入 + 抖音收入\n天猫收入 = 访客数 * 转化率 * 客单价\n访客数 = 搜索流量 + 付费流量 + 内容流量\n转化率 = 点击率 * 成交率\n抖音收入 = GMV * 退货率 * 佣金扣点\n私域指标 = 社群人数 * 人均产出 * 转化率",
            "furniture": "家具营收 = 零售指标 + 工程指标 + 定制指标\n零售指标 = 进店客流 * 留资率 * 成交率 * 客单价\n工程指标 = 中标项目数 * 项目规模 * 工程折扣\n定制指标 = 订单数 * 投影面积 * 单价 * 五金系数",
            "hotelTravel": "旅行社营收 = 跟团游指标 + 自由行指标 + 定制游指标\n跟团游指标 = 出团数 * 团均人数 * 人均团费 * 利润分成\n自由行指标 = 机票收入 + 酒店收入 + 门票收入\n机票收入 = 出票量 * 平均票价 * 代理费率\n定制游指标 = 订单数 * 定制客单价 * 服务费率",
            "cleaning": "家政营收 = 服务指标 + 保姆指标\n服务指标 = 保洁收入 + 清洗收入 + 收纳收入\n保洁收入 = 服务单量 * 单次价格 * 复购率\n清洗收入 = 空调清洗数 * 均价 + 油烟机清洗数 * 均价\n收纳收入 = 上门次数 * 次均价格 * 转化收纳套餐率\n保姆指标 = 在岗保姆数 * 月均服务费 * 中介费率",
            "repair": "维修营收 = 维修指标 + 配件指标 + 延保指标\n维修指标 = 上门维修 + 寄修服务\n上门维修 = 订单数 * 均价 * 上门成功率\n寄修服务 = 寄修件数 * 维修均价 * 修复率\n配件指标 = 配件SKU数 * 周转率 * 配件毛利率\n延保指标 = 销售台数 * 延保单价 * 延保转化率",
            "pet": "宠物店营收 = 服务指标 + 商品指标\n服务指标 = 洗美收入 + 医疗收入\n洗美收入 = 到店宠物数 * 洗美均价 * 月均频次\n医疗收入 = 就诊数 * 客单价 * 手术转化率\n商品指标 = 食品收入 + 活体收入\n食品收入 = 客户数 * 月均消费 * 食品毛利率\n活体收入 = 引进只数 * 加价率 * 成活率",
            "florist": "花店营收 = 零售指标 + 定制指标\n零售指标 = 客流 * 成交率 * 客单价\n定制指标 = 婚礼布置 + 绿植租摆 + 企业定制\n婚礼布置 = 接单数 * 场均单价 * 道具复用率\n绿植租摆 = 租摆数量 * 月租单价 * 续租率\n企业定制 = 企业客户数 * 年均消费 * 复购率",
            "photography": "摄影营收 = 摄影指标 + 直播指标\n摄影指标 = 婚纱摄影 + 儿童摄影 + 商业摄影\n婚纱摄影 = 接单数 * 套系均价 * 后期加片率\n儿童摄影 = 到店儿童数 * 套系选择率 * 精修张数\n商业摄影 = 拍摄天数 * 日均报价 * 后期调色费\n直播指标 = 活动场次 * 观看人次 * 人均转化",
            "educationTrain": "培训营收 = 教育指标 + 认证指标\n教育指标 = 线下面授 + 在线课程 + 企业培训\n线下面授 = 开班期数 * 班均人数 * 课程单价\n在线课程 = 学员数 * 课程定价 * 完课率\n企业培训 = 签约企业数 * 企均单价 * 交付满意度\n认证指标 = 报考人数 * 报考费 * 通过率 * 补考率",
            "consulting": "咨询营收 = 咨询指标 + 培训指标\n咨询指标 = 战略咨询 + 管理咨询 + 数字化咨询\n战略咨询 = 项目数 * 项目均价 * 项目周期\n管理咨询 = 顾问人数 * 人天单价 * 人均产值\n数字化咨询 = 方案报价 * 实施折扣 * 验收通过率\n培训指标 = 辅导场次 * 场次均价 * 客户满意度",
            "law": "律所营收 = 诉讼指标 + 非诉指标 + 法律顾问 + 尽职调查\n诉讼指标 = 立案数 * 案件均价 * 胜诉率 * 加权系数\n非诉指标 = 服务时长 * 小时费率 * 业务难度系数\n法律顾问 = 顾问单位数 * 年费标准 * 续约率\n尽职调查 = 调查项目数 * 项目规模 * 收费梯度",
            "hr": "人力资源营收 = 猎头指标 + RPO指标 + 派遣指标\n猎头指标 = 成功职位数 * 职位均价 * 猎头费率\nRPO指标 = 招聘岗位数 * 岗位均价 * RPO费率\n派遣指标 = 派遣人数 * 人月均价 * 管理费率",
            "it": "IT外包营收 = 人力指标 + 项目指标 + 运维指标\n人力指标 = 外派人数 * 人月单价 * 在岗月数\n项目指标 = 项目数量 * 项目均价 * 项目完成率\n运维指标 = 签约客户数 * 年服务费 * 续约率",
            "design": "设计营收 = 设计指标 + 数字指标\n设计指标 = 品牌设计 + 空间设计 + 产品设计\n品牌设计 = 项目数 * 项目均价 * 提案通过率\n空间设计 = 设计面积 * 单位报价 * 施工配合费\n产品设计 = 开发项目数 * 项目均价 * 打样通过率\n数字指标 = 页面数量 * 页面单价 * 客户满意率",
            "marketing": "营销Agency营收 = 策略指标 + 投放指标 + 执行指标\n策略指标 = 项目数 * 服务月费 * 策略通过率\n投放指标 = 媒介投放 + 内容创作\n媒介投放 = 投放金额 * 代理折扣 * 效果达成率\n内容创作 = 内容数量 * 内容单价 * 客户复用率\n执行指标 = 活动场次 * 场次均价 * 执行满意度",
            "advertising": "广告营收 = 品牌指标 + 效果指标 + 数字指标\n品牌指标 = 投放品牌数 * 品牌均价 * 续约率\n效果指标 = 消耗金额 * 返点系数 * 转化达成率\n数字指标 = 曝光量 * CPM单价 * 点击转化率",
            "media": "媒体营收 = 订阅指标 + 广告指标 + 版权指标\n订阅指标 = 付费用户数 * 订阅单价 * 续订率\n广告指标 = 广告位 * 填充率 * CPM * 有效曝光\n版权指标 = IP授权数 * 授权单价 * 授权期限",
            "newsletter": "知识付费营收 = 课程指标 + 会员指标\n课程指标 = 专栏订阅 + 单课购买\n专栏订阅 = 订阅人数 * 专栏年费 * 内容更新率\n单课购买 = 购课人数 * 课程单价 * 完课率\n会员指标 = 会员订阅 + 付费社群\n会员订阅 = 会员人数 * 月费标准 * 月活跃率\n付费社群 = 入群人数 * 入群费用 * 年均活跃月",
            "community": "社区运营营收 = 流量指标 + 电商指标 + 会员指标\n流量指标 = 广告收入\n广告收入 = DAU * 广告加载率 * CPM * 有效点击率\n电商指标 = 商品曝光 * 点击率 * 转化率 * 客单价\n会员指标 = 会员数 * 会员年费 * 权益使用率",
            "didi": "出行平台营收 = 快车指标 + 专车指标 + 顺风车指标\n快车指标 = 完单量 * 客单价 * 抽成比例\n完单量 = 日活司机 * 人均单量 * 出勤率\n专车指标 = 专车订单 * 专车均价 * 专车抽成\n顺风车指标 = 顺风车单数 * 均价 * 平台抽成",

        // --- Enhanced Formatting ---
        // 1. Parse tree to determine hierarchy (depth)
        // 2. Identify LHS of each definition
        // 3. Indent based on depth * 2 spaces
        // 4. Align '= ' signs using padding
        // --- Enhanced Formatting (Topological & Alignment) ---
        function formatFormula() {
            let text = dataInput.value;
            const lines= text.split('\n').filter(line => line.includes('= '));
            if (lines.length=== 0) return;

            // 1. Parse all lines into a map with deduplication (keep first definition)
            const map = {};
            const lhsList = [];
            const definedNames = new Set();

            lines.forEach(line => {
                const parts = line.split(' = ');
                if (parts.length >= 2) {
                    const lhs = parts[0].trim();
                    const rhs = parts.slice(1).join(' = ').trim();
                    if (!definedNames.has(lhs)) {
                        map[lhs] = rhs;
                        lhsList.push(lhs);
                        definedNames.add(lhs);
                    }
                }
            });

            // 2. Find all variable names (not pure numbers)
            const rhsTokens = new Set();
            const tokenRegex = /([\u4e00-\u9fa5a-zA-Z][\u4e00-\u9fa5a-zA-Z0-9]*)/g;
            Object.values(map).forEach(rhs => {
                let match;
                while ((match= tokenRegex.exec(rhs)) !== null) {
                    const token = match[0].trim();
                    if (token && !/^[0-9\.]+%?$/.test(token)) {
                        rhsTokens.add(token);
                    }
                }
            });

            // 3. Find roots (LHS not mentioned in any RHS)
            let roots= lhsList.filter(lhs => !rhsTokens.has(lhs));
            if (roots.length=== 0 && lhsList.length > 0) {
                roots = [lhsList[0]];
            }

            // 4. Calculate max variable name length for alignment
            const maxNameLen= Math.max(...Object.keys(map).map(k => k.length));

            const visited = new Set();
            const outputLines = [];

            function traverse(node, indent) {
                if (visited.has(node)) return;
                const rhs = map[node];
                if (rhs=== undefined) return;

                visited.add(node);

                let cleanRhs = rhs.replace(/\s*([+\-*\/×÷])\s*/g, " $1 ");
                cleanRhs = cleanRhs.replace(/\s+/g, " ").trim();
                cleanRhs = cleanRhs.replace(/\s*=\s*/g, " = ");
                cleanRhs = cleanRhs.replace(/([^\s])\s*=\s*/g, "$1 = ");
                cleanRhs = cleanRhs.replace(/\s*=\s*([^\s])/g, "= $1");
                cleanRhs = cleanRhs.replace(/  +/g, " ");

                const prefix = "\u3000\u3000".repeat(indent);
                const paddedName = node.padEnd(maxNameLen);
                let formattedLine = `${prefix}${paddedName} = ${cleanRhs}`;
                formattedLine = formattedLine.replace(/  +/g, " ");
                outputLines.push(formattedLine);

                // Find children
                const children = [];
                const localRegex = /([\u4e00-\u9fa5a-zA-Z][\u4e00-\u9fa5a-zA-Z0-9]*)/g;
                let match;
                while ((match= localRegex.exec(rhs)) !== null) {
                    const token = match[0].trim();
                    if (map[token] && !visited.has(token)) {
                        children.push(token);
                    }
                }

                children.forEach(child => traverse(child, indent + 1));
            }

            roots.forEach(r => traverse(r, 0));
            lhsList.forEach(lhs => {
                if (!visited.has(lhs)) traverse(lhs, 0);
            });

            dataInput.value = outputLines.join('\n');
            renderDiagram();
        }

        // 验证 formatFormula 修复的正确性

                    }

                    }

                {

                    expect: {
                        "GMV": 1,
                        "平台营收": 0
                    }
                }
            ];

            let passed = 0;
            let failed = 0;

            testCases.forEach(test => {
                const lines = test.input.split('\n').filter(line => line.includes('= '));
                const map = {};
                const lhsList = [];
                const definedNames = new Set();

                lines.forEach(line => {
                    const parts = line.split(' = ');
                    if (parts.length >= 2) {
                        const lhs = parts[0].trim();
                        const rhs = parts.slice(1).join(' = ').trim();
                        if (!definedNames.has(lhs)) {
                            map[lhs] = rhs;
                            lhsList.push(lhs);
                            definedNames.add(lhs);
                        }
                    }
                });

                const rhsTokens = new Set();
                const tokenRegex = /([\u4e00-\u9fa5a-zA-Z][\u4e00-\u9fa5a-zA-Z0-9]*)/g;
                Object.values(map).forEach(rhs => {
                    let match;
                    while ((match = tokenRegex.exec(rhs)) !== null) {
                        const token = match[0].trim();
                        if (token && !/^[0-9\.]+%?$/.test(token)) {
                            rhsTokens.add(token);
                        }
                    }
                });

                let roots = lhsList.filter(lhs => !rhsTokens.has(lhs));
                if (roots.length === 0 && lhsList.length > 0) {
                    roots = [lhsList[0]];
                }

                const visited = new Set();
                const indentMap = {};

                function traverse(node, indent) {
                    if (visited.has(node)) return;
                    const rhs = map[node];
                    if (rhs === undefined) return;
                    visited.add(node);
                    indentMap[node] = indent;

                    const children = [];
                    let match;
                    while ((match = tokenRegex.exec(rhs)) !== null) {
                        const token = match[0].trim();
                        if (token && map[token] && !visited.has(token)) {
                            children.push(token);
                        }
                    }
                    children.forEach(child => traverse(child, indent + 1));
                }

                roots.forEach(r => traverse(r, 0));
                lhsList.forEach(lhs => {
                    if (!visited.has(lhs)) traverse(lhs, 0);
                });

                let testPassed = true;
                for (const [varName, expectedIndent] of Object.entries(test.expect)) {
                    if (indentMap[varName] !== expectedIndent) {

                    }
                }

                if (testPassed) {
                    console.log(`✅ 测试通过: ${test.name}`);
                    passed++;
                } else {
                    failed++;
                }
            });

            console.log(`\n总计: ${passed} 通过, ${failed} 失败`);
            return failed === 0;
        }

        // --- Parser Logic ---
        function parseFormulas(text) {
            const lines= text.split('\n').filter(line => line.includes('= '));
            const map = {};
            const definedNames = new Set();
            const isCoef= (s) => /^[0-9]+(\.[0-9]+)?%?$/.test(s);

            lines.forEach(line => {
                const parts = line.split(' = ');
                if (parts.length < 2) return;
                const lhs = parts[0].trim();
                const rhs = parts[1].trim();
                const tokenRegex = /([\+\-×\*\/\÷])|([^\+\-×\*\/\÷]+)/g;
                const rawTokens = [];
                let match;
                while ((match= tokenRegex.exec(rhs)) !== null) {
                    const t = match[0].trim();
                    if (t) rawTokens.push(t);
                }
                const mergedTokens = [];
                for (let i = 0; i < rawTokens.length; i++) {
                    const current = rawTokens[i];
                    if ((current=== '*' || current=== '×') &&
                        i + 1 < rawTokens.length &&
                        isCoef(rawTokens[i + 1]) &&
                        mergedTokens.length > 0 &&
                        !['+', '-', '*', '/', '×', '÷'].includes(mergedTokens[mergedTokens.length - 1])) {
                        const prev = mergedTokens.pop();
                        const coef = rawTokens[i + 1];
                        mergedTokens.push(`${prev} × ${coef}`);
                        i++;
                    } else {
                        mergedTokens.push(current);
                    }
                }
                if (!definedNames.has(lhs)) {
                    map[lhs] = mergedTokens;
                    definedNames.add(lhs);
                }
            });

            if (Object.keys(map).length=== 0) return null;
            const firstLhs = lines[0].split(' = ')[0].trim();
            return buildTree(firstLhs, map, 0, new Set());
        }

        function buildTree(name, map, depth, visited) {
            const node = { name, depth, children: [], operators: [], totalHeight: 0, x: 0, y: 0 };
            let lookupName = name;
            const splitIndex = name.indexOf(' × ');
            if (splitIndex > -1 && /^[0-9\.]+%?$/.test(name.substring(splitIndex + 3))) {
                lookupName = name.substring(0, splitIndex);
            }

            if (visited.has(lookupName)) {
                return node;
            }
            visited.add(lookupName);

            if (map[lookupName]) {
                const tokens = map[lookupName];
                tokens.forEach(token => {
                    if (['+', '-', '*', '/', '×', '÷'].includes(token)) {
                        node.operators.push(token);
                    } else {
                        if (token !== lookupName && token !== name) {
                            node.children.push(buildTree(token, map, depth + 1, visited));
                        }
                    }
                });
            }
            return node;
        }

        // --- Layout Logic (Direction Aware) ---
        // Horizontal: X= Depth, Y= Spread
        // Vertical: Y= Depth, X= Spread
        const NODE_W = 180;
        const NODE_H = 50;
        const LEVEL_GAP = 120; // Gap between levels
        const NODE_GAP = 50;   // Gap between siblings

        function calculateLayout(node) {
            if (node.children.length=== 0) {
                // Cross-axis dimension
                const size= layoutDirection=== 'horizontal' ? (NODE_H + NODE_GAP) : (NODE_W + NODE_GAP);
                node.totalHeight = size;
                return size;
            }

            let total = 0;
            node.children.forEach(child => {
                total += calculateLayout(child);
            });

            const minSize= layoutDirection=== 'horizontal' ? (NODE_H + NODE_GAP) : (NODE_W + NODE_GAP);
            node.totalHeight = Math.max(total, minSize);
            return node.totalHeight;
        }

        function assignPositions(node, startMain, startCross) {
            // Main axis position (Depth)
            if (layoutDirection=== 'horizontal') {
                node.x = startMain;
                node.y = startCross;
            } else {
                node.y = startMain;
                node.x = startCross;
            }

            if (node.children.length > 0) {
                let currentCross = startCross - node.totalHeight / 2;
                node.children.forEach(child => {
                    const childCross = currentCross + child.totalHeight / 2;
                    // Gap increases for next level
                    const nextMain= startMain + (layoutDirection=== 'horizontal' ? (NODE_W + LEVEL_GAP) : (NODE_H + LEVEL_GAP));
                    assignPositions(child, nextMain, childCross);
                    currentCross += child.totalHeight;
                });
            }
        }

        // --- Rendering Logic ---
        function renderDiagram() {
            const tree = parseFormulas(dataInput.value);
            if (!tree) return;

            calculateLayout(tree);
            // Center roughly
            assignPositions(tree, 100, (layoutDirection=== 'horizontal' ? svg.clientHeight / 2 : svg.clientWidth / 2));

            nodesGroup.innerHTML = '';
            linksGroup.innerHTML = '';

            drawNode(tree);
            // Don't reset view every type if dragging? 
            // Only reset if first render? Or maybe not reset at all, user controls view.
            // But initial load needs center.
            // Let's keep resetView logic separate or optional.
        }

        function drawNode(node) {
            // Links
            if (node.children.length > 0) {
                node.children.forEach((child, index) => {
                    // Determine anchor points based on direction
                    let startX, startY, endX, endY;
                    let cp1x, cp1y, cp2x, cp2y;

                    if (layoutDirection=== 'horizontal') {
                        startX = node.x + NODE_W;
                        startY = node.y;
                        endX = child.x;
                        endY = child.y;

                        const midX = startX + (endX - startX) / 2;
                        cp1x = midX; cp1y = startY;
                        cp2x = midX; cp2y = endY;
                    } else {
                        // Vertical: Bottom to Top of child
                        startX = node.x; // Center x since it's vertical flow?
                        // Wait, node.x/y is top-left or center? 
                        // Our rect drawing uses y - H/2. So node.y is CENTER of Rect in Vertical?
                        // Actually in horizontal layout, y is center.
                        // In vertical layout, x should be center.
                        // Let's ensure consistency.

                        // Horizontal: node.y is center Y. node.x is Left X.
                        // Vertical: node.x is center X. node.y is Top Y?
                        // Let's adjust rect drawing effectively.

                        startX = node.x;
                        startY = node.y + NODE_H / 2; // Bottom center
                        endX = child.x;
                        endY = child.y - NODE_H / 2; // Top center of child

                        const midY = startY + (endY - startY) / 2;
                        cp1x = startX; cp1y = midY;
                        cp2x = endX; cp2y = midY;
                    }

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`;
                    path.setAttribute("d", d);
                    path.setAttribute("class", "link-path");

                    // Rainbow colors (0-6)
                    const colorIndex = index % 7;
                    path.classList.add(`accent-${colorIndex}`);
                    path.style.strokeOpacity = 0.5;
                    linksGroup.appendChild(path);

                    // Operator Badge
                    let op = '';
                    if (node.operators.length > 0) {
                        if (index=== 0) op= node.operators[0];
                        else op = node.operators[index - 1] || node.operators[node.operators.length - 1];
                    }

                    if (op) {
                        // Midpoint of curve roughly
                        // Bezier at t= 0.5
                        // B(t)= (1-t)^3 P0 + 3(1-t)^2 t P1 + ... 
                        // Simplified C is usually sufficient approximation with average of CPs
                        // Actually for C P0 P1 P2 P3 (C uses 2 control points in SVG definitions, cubic)
                        // P0= (startX, startY), P1= (cp1x, cp1y), P2= (cp2x, cp2y), P3= (endX, endY)
                        // t= 0.5
                        const t = 0.5;
                        const mt = 1 - t;
                        const bx = mt * mt * mt * startX + 3 * mt * mt * t * cp1x + 3 * mt * t * t * cp2x + t * t * t * endX;
                        const by = mt * mt * mt * startY + 3 * mt * mt * t * cp1y + 3 * mt * t * t * cp2y + t * t * t * endY;

                        const gBadge = document.createElementNS("http://www.w3.org/2000/svg", "g");
                        gBadge.setAttribute("class", "operator-badge");
                        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        circle.setAttribute("cx", bx);
                        circle.setAttribute("cy", by);
                        circle.setAttribute("r", "14");
                        circle.setAttribute("class", "operator-circle");

                        if (op=== '*' || op=== '×') circle.classList.add('op-multiply');
                        else if (op=== '/' || op=== '÷') circle.classList.add('op-divide');
                        else if (op=== '+') circle.classList.add('op-plus');
                        else if (op=== '-') circle.classList.add('op-minus');
                        else circle.classList.add('op-default');
                        gBadge.appendChild(circle);

                        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        text.setAttribute("x", bx);
                        text.setAttribute("y", by + 5);
                        text.setAttribute("text-anchor", "middle");
                        text.setAttribute("class", "operator-text");
                        text.textContent= op=== '*' ? '×' : (op=== '/' ? '÷' : op);
                        gBadge.appendChild(text);
                        linksGroup.appendChild(gBadge);
                    }

                    drawNode(child);
                });
            }

            // Node Rect
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

            // Layout specific rect position: Center the rect around the node point
            if (layoutDirection=== 'horizontal') {
                // node.x is left, node.y is center
                rect.setAttribute("x", node.x);
                rect.setAttribute("y", node.y - NODE_H / 2);
            } else {
                // node.x is center X, node.y is center Y
                rect.setAttribute("x", node.x - NODE_W / 2);
                rect.setAttribute("y", node.y - NODE_H / 2);
            }

            rect.setAttribute("width", NODE_W);
            rect.setAttribute("height", NODE_H);
            rect.setAttribute("class", "node-rect");

            // Color Cycle for Border using Classes
            rect.classList.add(`accent-${node.depth % 7}`);
            rect.style.strokeWidth= node.depth=== 0 ? "2" : "1";

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            // Text alignment - always use middle for better alignment
            if (layoutDirection=== 'horizontal') {
                text.setAttribute("x", node.x + NODE_W / 2);
                text.setAttribute("y", node.y + 4);
                text.setAttribute("text-anchor", "middle");
            } else {
                text.setAttribute("x", node.x);
                text.setAttribute("y", node.y + 4);
                text.setAttribute("text-anchor", "middle");
            }
            text.setAttribute("class", "node-text");

            let displayName = node.name;
            if (displayName.length > 20) displayName = displayName.substring(0, 18) + '..';
            text.textContent = displayName;

            g.appendChild(rect);
            g.appendChild(text);

            // Dynamic color from variable mapping or JS array?
            // Since we updated to use JS array for shadow, we simply use the global `currentPaletteColors`
            const nodeColor = currentPaletteColors[node.depth % 7];

            g.onmouseenter= () => {
                rect.style.filter = `drop-shadow(0 0 8px ${nodeColor})`;
                rect.style.fill = "rgba(255,255,255,0.1)";
            };
            g.onmouseleave= () => {
                rect.style.filter = "";
                rect.style.fill = "";
            };

            nodesGroup.appendChild(g);
        }

        // --- Interaction ---
        function setupInteractivity() {
            svg.onmousedown= (e) => {
                if (e.button=== 0) {
                    isDragging = true;
                    startPos = { x: e.clientX - currentTranslate.x, y: e.clientY - currentTranslate.y };
                    svg.style.cursor = 'grabbing';
                }
            };
            window.onmousemove= (e) => {
                if (isDragging) {
                    currentTranslate.x = e.clientX - startPos.x;
                    currentTranslate.y = e.clientY - startPos.y;
                    updateViewport();
                }
            };
            window.onmouseup= () => { isDragging= false; svg.style.cursor= 'grab'; };
            svg.onwheel= (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.min(Math.max(currentScale * delta, 0.2), 3);
                const rect = svg.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                currentTranslate.x = mouseX - (mouseX - currentTranslate.x) * (newScale / currentScale);
                currentTranslate.y = mouseY - (mouseY - currentTranslate.y) * (newScale / currentScale);
                currentScale = newScale;
                updateViewport();
            };
        }
        function updateViewport() {
            viewportGroup.setAttribute('transform', `translate(${currentTranslate.x}, ${currentTranslate.y}) scale(${currentScale})`);
        }
        function resetView() {
            currentScale = 0.8;
            currentTranslate = { x: layoutDirection === 'horizontal' ? 50 : 0, y: 100 };
            updateViewport();
        }
        function zoomIn() { currentScale *= 1.2; updateViewport(); }
        function zoomOut() { currentScale *= 0.8; updateViewport(); }

        // --- Custom Export (Enhanced) ---
        async function exportImage() {
            const serializer = new XMLSerializer();

            const allNodes = svg.querySelectorAll('.node-rect');

            if (allNodes.length=== 0) {
                alert('请先生成图表');
                return;
            }

            // 计算图表内容实际边界（包括节点和连接线）
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            // 遍历所有节点
            allNodes.forEach(node => {
                const x = parseFloat(node.getAttribute('x')) || 0;
                const y = parseFloat(node.getAttribute('y')) || 0;
                const w = parseFloat(node.getAttribute('width')) || 180;
                const h = parseFloat(node.getAttribute('height')) || 50;
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x + w);
                maxY = Math.max(maxY, y + h);
            });

            // 遍历所有连接线路径
            svg.querySelectorAll('#links-group .link-path').forEach(path => {
                const d = path.getAttribute('d');
                if (d) {
                    const coords = d.match(/[\d.]+/g);
                    if (coords) {
                        for (let i = 0; i < coords.length; i += 2) {
                            const px = parseFloat(coords[i]);
                            const py = parseFloat(coords[i + 1]);
                            if (!isNaN(px) && !isNaN(py)) {
                                minX = Math.min(minX, px);
                                minY = Math.min(minY, py);
                                maxX = Math.max(maxX, px);
                                maxY = Math.max(maxY, py);
                            }
                        }
                    }
                }
            });

            // 确保有合理的边界
            if (minX === Infinity) minX = 0;
            if (minY === Infinity) minY = 0;
            if (maxX === -Infinity) maxX = 1000;
            if (maxY === -Infinity) maxY = 500;

            const padding = 80;
            const chartWidth = maxX - minX + padding * 2;
            const chartHeight = maxY - minY + padding * 2;

            // 动态计算公式区域高度，确保所有公式都能完整显示
            const formulaLines = dataInput.value.split('\n').filter(l => l.trim());
            const lineHeight = 26;
            const formulaBlockHeight = formulaLines.length * lineHeight + 80;
            const formulaAreaHeight = Math.max(250, formulaBlockHeight + 30);

            const finalWidth = Math.max(chartWidth, 1000);
            const finalHeight = chartHeight + formulaAreaHeight;

            // 自我校验机制：确保所有内容都能被完整导出
            const validation = {
                chartNodes: allNodes.length,
                chartBounds: { minX, minY, maxX, maxY },
                chartWidth: chartWidth,
                chartHeight: chartHeight,
                formulaLines: formulaLines.length,
                formulaAreaHeight: formulaAreaHeight,
                finalWidth: finalWidth,
                finalHeight: finalHeight,
                isValid: chartWidth > 0 && chartHeight > 0 && finalHeight > 0,
                isLargeChart: chartWidth > 1500,
                isLargeFormula: formulaLines.length > 10,
                hasLinks: (svg.querySelectorAll('#links-group .link-path').length) > 0
            };

            // 检查边界是否合理
            if (validation.chartWidth <= 0 || validation.chartHeight <= 0) {
                console.warn('[导出图片] ⚠️ 图表边界计算异常，尝试使用默认尺寸');
                validation.isValid = false;
            }

            // 检查是否所有节点都在边界内
            if (validation.isLargeChart) {
                console.warn('[导出图片] ⚠️ 图表较宽(' + validation.chartWidth + 'px)，已自动调整导出宽度');
            }

            console.log('[导出图片] 自我校验:', validation);

            // 主题颜色
            const themeColors = {
                bgColor: '#0f172a',
                cardBg: 'rgba(51, 65, 85, 0.4)',
                textMain: '#f1f5f9',
                textDim: '#94a3b8',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                linkColor: 'rgba(255, 255, 255, 0.3)',
                sidebarBg: 'rgba(30, 41, 59, 0.9)',
                gradientBlue: 'rgba(56, 189, 248, 0.12)',
                gradientPurple: 'rgba(167, 139, 250, 0.12)',
                dotColor: 'rgba(255, 255, 255, 0.03)',
                accentBlue: '#38bdf8',
                accentPurple: '#a78bfa'
            };

            // 创建新的 SVG
            const exportSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            exportSvg.setAttribute('width', finalWidth);
            exportSvg.setAttribute('height', finalHeight);
            exportSvg.setAttribute('viewBox', `0 0 ${finalWidth} ${finalHeight}`);
            exportSvg.setAttribute("xmlns", "http://www.w3.org/2000/svg");

            // 创建 defs
            const bgDefs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            exportSvg.appendChild(bgDefs);

            // 左上角蓝色渐变
            const grad1 = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
            grad1.setAttribute("id", "bgGrad1");
            grad1.setAttribute("cx", "20%");
            grad1.setAttribute("cy", "25%");
            grad1.setAttribute("r", "50%");
            grad1.setAttribute("gradientUnits", "objectBoundingBox");
            const gs1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            gs1.setAttribute("offset", "0%");
            gs1.setAttribute("stop-color", themeColors.gradientBlue);
            grad1.appendChild(gs1);
            const ge1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            ge1.setAttribute("offset", "100%");
            ge1.setAttribute("stop-color", "transparent");
            grad1.appendChild(ge1);
            bgDefs.appendChild(grad1);

            // 右下角紫色渐变
            const grad2 = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
            grad2.setAttribute("id", "bgGrad2");
            grad2.setAttribute("cx", "80%");
            grad2.setAttribute("cy", "75%");
            grad2.setAttribute("r", "50%");
            grad2.setAttribute("gradientUnits", "objectBoundingBox");
            const gs2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            gs2.setAttribute("offset", "0%");
            gs2.setAttribute("stop-color", themeColors.gradientPurple);
            grad2.appendChild(gs2);
            const ge2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            ge2.setAttribute("offset", "100%");
            ge2.setAttribute("stop-color", "transparent");
            grad2.appendChild(ge2);
            bgDefs.appendChild(grad2);

            // 点状图案
            const dotPattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
            dotPattern.setAttribute("id", "dots");
            dotPattern.setAttribute("width", "30");
            dotPattern.setAttribute("height", "30");
            dotPattern.setAttribute("patternUnits", "userSpaceOnUse");
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("cx", "15");
            dot.setAttribute("cy", "15");
            dot.setAttribute("r", "1");
            dot.setAttribute("fill", themeColors.dotColor);
            dotPattern.appendChild(dot);
            bgDefs.appendChild(dotPattern);

            // 标题渐变
            const titleGrad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
            titleGrad.setAttribute("id", "titleGrad");
            const tg1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            tg1.setAttribute("offset", "0%");
            tg1.setAttribute("stop-color", themeColors.accentBlue);
            titleGrad.appendChild(tg1);
            const tg2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
            tg2.setAttribute("offset", "100%");
            tg2.setAttribute("stop-color", themeColors.accentPurple);
            titleGrad.appendChild(tg2);
            bgDefs.appendChild(titleGrad);

            // 背景层
            const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bgRect.setAttribute("width", "100%");
            bgRect.setAttribute("height", "100%");
            bgRect.setAttribute("fill", themeColors.bgColor);
            exportSvg.appendChild(bgRect);

            const gRect1 = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            gRect1.setAttribute("width", "100%");
            gRect1.setAttribute("height", "100%");
            gRect1.setAttribute("fill", "url(#bgGrad1)");
            exportSvg.appendChild(gRect1);

            const gRect2 = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            gRect2.setAttribute("width", "100%");
            gRect2.setAttribute("height", "100%");
            gRect2.setAttribute("fill", "url(#bgGrad2)");
            exportSvg.appendChild(gRect2);

            const dRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            dRect.setAttribute("width", "100%");
            dRect.setAttribute("height", "100%");
            dRect.setAttribute("fill", "url(#dots)");
            exportSvg.appendChild(dRect);

            // 创建图表容器组
            const chartGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            chartGroup.setAttribute("transform", `translate(${padding - minX}, ${padding - minY})`);

            // 深度颜色数组
            const depthColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7'];

            // 复制连线
            const linksGroup = svg.querySelector('#links-group');
            if (linksGroup) {
                linksGroup.querySelectorAll('.link-path').forEach(path => {
                    const newPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    newPath.setAttribute("d", path.getAttribute("d"));
                    newPath.setAttribute("fill", "none");
                    newPath.setAttribute("stroke", themeColors.linkColor);
                    newPath.setAttribute("stroke-width", "2.5");
                    newPath.setAttribute("stroke-opacity", "0.8");
                    chartGroup.appendChild(newPath);
                });

                // 复制运算符徽章
                linksGroup.querySelectorAll('.operator-badge').forEach(badge => {
                    const badgeClone = badge.cloneNode(true);
                    badgeClone.querySelectorAll('circle').forEach(circle => {
                        circle.setAttribute("fill", "rgba(30, 41, 59, 0.95)");
                        circle.setAttribute("stroke", "rgba(255, 255, 255, 0.4)");
                        circle.setAttribute("stroke-width", "2");
                    });
                    badgeClone.querySelectorAll('text').forEach(text => {
                        text.setAttribute("fill", "#ffffff");
                        text.setAttribute("font-family", "Inter, Arial, sans-serif");
                    });
                    chartGroup.appendChild(badgeClone);
                });
            }

            // 复制节点
            let nodeIndex = 0;
            nodesGroup.querySelectorAll('g').forEach(nodeGroup => {
                const rect = nodeGroup.querySelector('.node-rect');
                const text = nodeGroup.querySelector('.node-text');

                if (rect && text) {
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

                    const newRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    newRect.setAttribute("x", rect.getAttribute("x"));
                    newRect.setAttribute("y", rect.getAttribute("y"));
                    newRect.setAttribute("width", rect.getAttribute("width"));
                    newRect.setAttribute("height", rect.getAttribute("height"));
                    newRect.setAttribute("fill", themeColors.cardBg);
                    newRect.setAttribute("stroke", depthColors[nodeIndex % 7]);
                    newRect.setAttribute("stroke-width", "2");
                    newRect.setAttribute("rx", "12");
                    newRect.setAttribute("ry", "12");
                    newRect.style.filter = "drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4))";
                    g.appendChild(newRect);

                    const newText = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    newText.setAttribute("x", text.getAttribute("x"));
                    newText.setAttribute("y", text.getAttribute("y"));
                    newText.setAttribute("text-anchor", text.getAttribute("text-anchor"));
                    newText.setAttribute("fill", themeColors.textMain);
                    newText.setAttribute("font-size", "14");
                    newText.setAttribute("font-weight", "500");
                    newText.setAttribute("font-family", "Inter, Arial, sans-serif");
                    newText.textContent = text.textContent;
                    g.appendChild(newText);

                    chartGroup.appendChild(g);
                    nodeIndex++;
                }
            });

            exportSvg.appendChild(chartGroup);

            // 公式列表区域（复用前面动态计算的高度）
            const sidebarBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            sidebarBg.setAttribute("x", "0");
            sidebarBg.setAttribute("y", chartHeight);
            sidebarBg.setAttribute("width", finalWidth);
            sidebarBg.setAttribute("height", formulaBlockHeight + 30);
            sidebarBg.setAttribute("fill", themeColors.sidebarBg);
            exportSvg.appendChild(sidebarBg);

            const topBorder = document.createElementNS("http://www.w3.org/2000/svg", "line");
            topBorder.setAttribute("x1", "0");
            topBorder.setAttribute("y1", chartHeight);
            topBorder.setAttribute("x2", finalWidth);
            topBorder.setAttribute("y2", chartHeight);
            topBorder.setAttribute("stroke", themeColors.borderColor);
            topBorder.setAttribute("stroke-width", "1");
            exportSvg.appendChild(topBorder);

            const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
            title.textContent = "业务公式";
            title.setAttribute("x", "30");
            title.setAttribute("y", chartHeight + 40);
            title.setAttribute("fill", `url(#titleGrad)`);
            title.setAttribute("font-size", "20");
            title.setAttribute("font-weight", "700");
            title.setAttribute("font-family", "Outfit, Inter, Arial, sans-serif");
            exportSvg.appendChild(title);

            const formulaGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            formulaGroup.setAttribute("transform", `translate(30, ${chartHeight + 70})`);

            formulaLines.forEach((line, i) => {
                const textLine = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textLine.textContent = line;
                textLine.setAttribute("x", "0");
                textLine.setAttribute("y", i * lineHeight);
                textLine.setAttribute("fill", themeColors.textDim);
                textLine.setAttribute("font-size", "14");
                textLine.setAttribute("font-family", "'Courier New', Courier, monospace");
                textLine.setAttribute("xml:space", "preserve");
                textLine.style.whiteSpace = "pre";
                formulaGroup.appendChild(textLine);
            });

            exportSvg.appendChild(formulaGroup);

            const footer = document.createElementNS("http://www.w3.org/2000/svg", "text");
            footer.textContent = "由 一堂·业务公式Pro 提供";
            footer.setAttribute("x", finalWidth - 20);
            footer.setAttribute("y", chartHeight + formulaBlockHeight + 15);
            footer.setAttribute("text-anchor", "end");
            footer.setAttribute("fill", themeColors.textDim);
            footer.setAttribute("font-size", "11");
            footer.setAttribute("font-family", "Inter, Arial, sans-serif");
            footer.setAttribute("opacity", "0.6");
            exportSvg.appendChild(footer);

            // 字体导入
            const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
            style.setAttribute("type", "text/css");
            style.textContent = `@import url('https://fonts.googleapis.com/css2?family = Inter:wght@400;500;600;700&family = Outfit:wght@400;500;600;700&display = swap');`;
            exportSvg.insertBefore(style, exportSvg.firstChild);

            // 导出
            let retryCount = 0;
            const maxRetries = 3;

            function attemptExport() {
                try {
                    const source = serializer.serializeToString(exportSvg);

                    const hasBg = source.includes(themeColors.bgColor);
                    const hasNodes = source.includes('node-text');
                    const hasFormula = source.includes('业务公式');

                    if ((!hasBg || !hasNodes) && retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(attemptExport, 100);
                        return;
                    }

                    const blob = new Blob([source], { type: 'image/svg+xml;charset = utf-8' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'business-formula-pro.svg';
                    link.click();
                    URL.revokeObjectURL(url);
                } catch (error) {
                    if (retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(attemptExport, 100);
                    } else {
                        alert('导出失败，请重试。');
                    }
                }
            }

            attemptExport();
        }
    </script>
