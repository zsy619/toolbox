            // ---------- 分层分级定义 ----------

                { id: 'industry', name: '十大行业', icon: 'fa-regular fa-building', color: 'from-sky-400 to-blue-500', range: [1001, 1587] },
                { id: 'startup', name: '创业阶段', icon: 'fa-regular fa-rocket', color: 'from-emerald-400 to-teal-500', range: [1588, 1737] }
            ];

                soul: [
                    { id: 'scene', name: '场景识别', range: [1, 200] },
                    { id: 'goal', name: '目标设定', range: [201, 500] },
                    { id: 'tool', name: '工具使用', range: [501, 700] },

                startup: [
                    { id: 'mvp', name: 'MVP阶段', range: [1588, 1637] },
                    { id: 'scale', name: '规模化阶段', range: [1638, 1687] },
                    { id: 'mature', name: '成熟阶段', range: [1688, 1737] }
                ]
            };

            // 工具函数：根据编号获取子分类名称
            function getSubNameByNumber(num) {
                if (num <= 200) return '场景识别';
                if (num <= 500) return '目标设定';
                if (num <= 700) return '工具使用';
                if (num <= 1000) return '层级挖掘';
                if (num <= 1100) return '互联网科技';
                if (num <= 1180) return '金融';
                if (num <= 1247) return '医疗健康';
                if (num <= 1307) return '教育培训';
                if (num <= 1367) return '零售电商';
                if (num <= 1427) return '制造业';
                if (num <= 1467) return '房地产';
                if (num <= 1507) return '交通运输';
                if (num <= 1547) return '农业';
                if (num <= 1587) return '文化创意';
                if (num <= 1637) return 'MVP阶段';
                if (num <= 1687) return '规模化阶段';
                return '成熟阶段';
            }

            // 获取主分类id
            function getMasterIdByNumber(num) {
                if (num <= 1000) return 'soul';
                if (num <= 1587) return 'industry';
                return 'startup';
            }

            // 状态
            let currentMaster = 'soul';           // 当前选中的主分类
            let currentSub = 'all';                // 当前选中的子分类id (all表示全部)
            let searchTerm = '';

            // DOM 元素
            const masterContainer = document.getElementById('masterContainer');
            const subFilterContainer = document.getElementById('subFilterContainer');
            const currentCategoryTitle = document.getElementById('currentCategoryTitle').querySelector('span');
            const itemContainer = document.getElementById('itemListContainer');
            const emptyDiv = document.getElementById('emptyMessage');
            const resultSpan = document.getElementById('resultCount');
            const searchInput = document.getElementById('searchInput');

            // 初始化渲染主分类卡片
            function renderMasterCards() {
                let html = '';
                masterCategories.forEach(m => {
                    const count = m.range[1] - m.range[0] + 1;
                    html += `
            <div class="master-card p-5 cursor-pointer transform transition hover:scale-105" data-master="${m.id}">
              <div class="flex items-center gap-3">
                <div class="text-4xl bg-gradient-to-br ${m.color} w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-md">
                  <i class="${m.icon}"></i>
                </div>
                <div>
                  <h3 class="text-xl font-bold text-stone-700">${m.name}</h3>
                  <p class="text-amber-600 text-sm">${count} 个场景</p>
                </div>
              </div>
              <div class="mt-3 flex gap-1 flex-wrap">
                ${subCategoriesMap[m.id].map(sub => `<span class="text-xs bg-amber-100 px-2 py-1 rounded-full">${sub.name}</span>`).join('')}
              </div>
            </div>
          `;
                });
                masterContainer.innerHTML = html;

                // 绑定点击事件
                document.querySelectorAll('.master-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const master = card.dataset.master;
                        currentMaster = master;
                        currentSub = 'all'; // 重置子分类为全部
                        renderSubFilters();
                        updateTitle();
                        renderItems();
                    });
                });
            }

            // 渲染二级分类按钮
            function renderSubFilters() {
                const subs = subCategoriesMap[currentMaster] || [];
                let html = `<span class="sub-chip ${currentSub === 'all' ? 'active' : ''}" data-sub="all">全部</span>`;
                subs.forEach(sub => {
                    html += `<span class="sub-chip ${currentSub === sub.id ? 'active' : ''}" data-sub="${sub.id}">${sub.name}</span>`;
                });
                subFilterContainer.innerHTML = html;

                // 绑定事件
                document.querySelectorAll('.sub-chip').forEach(chip => {
                    chip.addEventListener('click', (e) => {
                        document.querySelectorAll('.sub-chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        currentSub = chip.dataset.sub;
                        renderItems();
                    });
                });
            }

            // 更新当前分类标题
            function updateTitle() {
                const master = masterCategories.find(m => m.id === currentMaster);
                currentCategoryTitle.innerText = master ? master.name : '请选择一个分类';
            }

            // 根据当前过滤条件获取条目索引
            function getFilteredIndices() {
                const lowerSearch = searchTerm.toLowerCase();
                const result = [];
                entries.forEach((text, idx) => {
                    const num = idx + 1;
                    // 主分类过滤
                    if (getMasterIdByNumber(num) !== currentMaster) return;

                    // 子分类过滤
                    if (currentSub !== 'all') {
                        const targetSub = subCategoriesMap[currentMaster].find(s => s.id === currentSub);
                        if (targetSub) {
                            const [start, end] = targetSub.range;
                            if (num < start || num > end) return;
                        }
                    }

                    // 搜索过滤
                    if (searchTerm && !text.toLowerCase().includes(lowerSearch)) return;

                    result.push(idx);
                });
                return result;
            }

            // 渲染条目列表
            function renderItems() {
                const indices = getFilteredIndices();
                resultSpan.innerText = indices.length + ' 项';

                if (indices.length === 0) {
                    itemContainer.innerHTML = '';
                    emptyDiv.classList.remove('hidden');
                } else {
                    emptyDiv.classList.add('hidden');
                    let html = '';
                    indices.forEach(idx => {
                        const num = idx + 1;
                        const subName = getSubNameByNumber(num);
                        html += `<div class="item-card"><span class="badge-sub">${subName}</span> ${entries[idx]}</div>`;
                    });
                    itemContainer.innerHTML = html;
                }
            }

            // 搜索防抖
            let timer;
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                clearTimeout(timer);
                timer = setTimeout(() => {
                    renderItems();
                }, 200);
            });

            // 初始化
            renderMasterCards();
            // 默认选中第一个主分类
            currentMaster = 'soul';
            renderSubFilters();
            updateTitle();
            renderItems();
        })();
