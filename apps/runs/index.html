            save() {
                localStorage.setItem('appStudioApps', JSON.stringify(this.apps));
            },

            add(app) {
                this.apps.push({
                    id: Date.now(),
                    ...app,
                    createdAt: new Date().toISOString()
                });
                this.save();
                this.renderAppList();
            },

            delete(id) {
                this.apps = this.apps.filter(app => app.id !== id);
                this.save();
                this.renderAppList();
            },

            renderAppList(filter = '') {
                const container = document.getElementById('appList');
                const filteredApps = filter
                    ? this.apps.filter(app => app.name.toLowerCase().includes(filter.toLowerCase()))
                    : this.apps;

                if (filteredApps.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                            <p>未找到应用</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = filteredApps.map(app => `
                    <div class="sidebar-item rounded-lg p-3 cursor-pointer mb-2 flex items-center gap-3" data-id="${app.id}">
                        <div class="w-10 h-10 rounded-lg flex-shrink-0 bg-${app.color}-500 flex items-center justify-center text-white font-bold shadow-lg" data-name="${this.escapeHtml(app.name)}" style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.06);">
                            ${app.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="sidebar-content flex-1 min-w-0">
                            <div class="font-medium text-gray-800 app-name">${this.escapeHtml(app.name)}</div>
                            <div class="text-xs text-gray-500 truncate app-url">${this.escapeHtml(app.url)}</div>
                        </div>
                        <button class="delete-btn p-1 hover:bg-red-100 rounded opacity-0 group-hover:opacity-100 transition flex-shrink-0" data-id="${app.id}" title="删除">
                            <svg class="w-4 h-4 text-gray-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                `).join('');

                // 绑定事件
                container.querySelectorAll('.sidebar-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        if (!e.target.closest('.delete-btn')) {
                            const id = parseInt(item.dataset.id);
                            const app = this.apps.find(a => a.id === id);
                            if (app) TabManager.openNewTab(app);
                        }
                    });
                });

                container.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('确定要删除这个应用吗？')) {
                            this.delete(parseInt(btn.dataset.id));
                        }
                    });
                });
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        };

        // 标签页管理
        const TabManager = {
            tabs: [],
            activeTabId: null,

            openNewTab(app = null) {
                // 如果传入应用且已存在对应标签页，则激活它
                if (app) {
                    const existingTab = this.tabs.find(t => t.id === app.id);
                    if (existingTab) {
                        this.activateTab(existingTab.tabId);
                        return existingTab;
                    }
                }

                const tabId = Date.now();
                const tab = app ? { ...app, tabId, isLoading: true } : {
                    tabId,
                    id: null,
                    name: '新标签页',
                    url: '',
                    color: 'gray',
                    isLoading: false
                };

                this.tabs.push(tab);
                this.renderTabs();
                this.renderTabContent(tab);
                this.activateTab(tabId);

                return tab;
            },

            closeTab(tabId) {
                const index = this.tabs.findIndex(t => t.tabId === tabId);
                if (index === -1) return;

                // 移除标签页内容
                const content = document.getElementById(`tab-content-${tabId}`);
                if (content) content.remove();

                // 移除标签页
                this.tabs.splice(index, 1);

                // 如果关闭的是当前激活的标签页，激活前一个或后一个
                if (this.activeTabId === tabId) {
                    if (this.tabs.length > 0) {
                        const newIndex = Math.min(index, this.tabs.length - 1);
                        this.activateTab(this.tabs[newIndex].tabId);
                    } else {
                        this.activeTabId = null;
                        document.getElementById('welcomeScreen').classList.remove('hidden');
                        document.getElementById('tabsContent').classList.add('hidden');
                    }
                }

                this.renderTabs();
            },

            activateTab(tabId) {
                this.activeTabId = tabId;

                // 更新标签页样式
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.toggle('active', parseInt(tab.dataset.tabId) === tabId);
                });

                // 更新内容显示
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.toggle('active', parseInt(content.dataset.tabId) === tabId);
                });

                // 显示/隐藏欢迎界面
                if (this.tabs.length > 0) {
                    document.getElementById('welcomeScreen').classList.add('hidden');
                    document.getElementById('tabsContent').classList.remove('hidden');
                } else {
                    document.getElementById('welcomeScreen').classList.remove('hidden');
                    document.getElementById('tabsContent').classList.add('hidden');
                }
            },

            refreshTab(tabId) {
                const tab = this.tabs.find(t => t.tabId === tabId);
                if (tab && tab.url) {
                    const frame = document.getElementById(`frame-${tabId}`);
                    if (frame) {
                        frame.src = frame.src;
                    }
                }
            },

            renderTabs() {
                const container = document.getElementById('tabs');
                container.innerHTML = this.tabs.map(tab => `
                    <div class="tab flex items-center gap-2 px-4 py-2 cursor-pointer ${tab.tabId === this.activeTabId ? 'active' : ''}" data-tab-id="${tab.tabId}">
                        ${tab.isLoading ? `
                            <svg class="w-4 h-4 spinner text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v8m0 0l-4-4m4 4l4-4"></path>
                            </svg>
                        ` : `
                            <div class="w-6 h-6 rounded bg-${tab.color}-500 flex items-center justify-center text-white text-xs font-bold">
                                ${tab.name.charAt(0).toUpperCase()}
                            </div>
                        `}
                        <span class="text-sm text-gray-700 max-w-32 truncate">${this.escapeHtml(tab.name)}</span>
                        <button class="close-tab p-1 hover:bg-red-100 rounded opacity-0 group-hover:opacity-100 transition" data-tab-id="${tab.tabId}">
                            <svg class="w-3 h-3 text-gray-400 hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                `).join('');

                // 绑定点击事件
                container.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        if (!e.target.closest('.close-tab')) {
                            this.activateTab(parseInt(tab.dataset.tabId));
                        }
                    });

                    tab.addEventListener('mouseenter', () => {
                        tab.querySelector('.close-tab').classList.remove('opacity-0');
                    });

                    tab.addEventListener('mouseleave', () => {
                        tab.querySelector('.close-tab').classList.add('opacity-0');
                    });
                });

                container.querySelectorAll('.close-tab').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.closeTab(parseInt(btn.dataset.tabId));
                    });
                });
            },

            renderTabContent(tab) {
                const container = document.getElementById('tabsContent');
                const content = document.createElement('div');
                content.id = `tab-content-${tab.tabId}`;
                content.className = 'tab-content';
                content.dataset.tabId = tab.tabId;

                if (tab.url) {
                    content.innerHTML = `
                        <iframe id="frame-${tab.tabId}" class="w-full h-full border-0" src="${this.escapeHtml(tab.url)}" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
                        <div class="loading-overlay absolute inset-0 flex items-center justify-center" id="loading-${tab.tabId}">
                            <div class="text-center">
                                <svg class="w-12 h-12 spinner mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v8m0 0l-4-4m4 4l4-4"></path>
                                </svg>
                                <p class="text-gray-600">加载中...</p>
                            </div>
                        </div>
                    `;

                    const frame = content.querySelector('iframe');
                    const loading = content.querySelector('.loading-overlay');

                    frame.onload = () => {
                        loading.classList.add('hidden');
                        // 更新标签页加载状态
                        const tabData = this.tabs.find(t => t.tabId === tab.tabId);
                        if (tabData) {
                            tabData.isLoading = false;
                            this.renderTabs();
                        }
                    };
                }

                container.appendChild(content);
            },

            getCurrentTab() {
                return this.tabs.find(t => t.tabId === this.activeTabId);
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        };

        // 模态框管理
        const Modal = {
            show() {
                document.getElementById('addAppModal').classList.remove('hidden');
                document.getElementById('appNameInput').value = '';
                document.getElementById('appUrlInput').value = '';
            },

            hide() {
                document.getElementById('addAppModal').classList.add('hidden');
            },

            getSelectedColor() {
                const selected = document.querySelector('.color-btn.border-gray-800');
                return selected ? selected.dataset.color : 'indigo';
            },

            confirm() {
                const name = document.getElementById('appNameInput').value.trim();
                const url = document.getElementById('appUrlInput').value.trim();
                const color = this.getSelectedColor();

                if (!name || !url) {
                    alert('请填写应用名称和地址');
                    return;
                }

                AppManager.add({ name, url, color });
                this.hide();
            }
        };

        // 工具栏操作
        const Toolbar = {
            refresh() {
                if (TabManager.activeTabId) {
                    TabManager.refreshTab(TabManager.activeTabId);
                }
            },

            openExternal() {
                const tab = TabManager.getCurrentTab();
                if (tab && tab.url) {
                    window.open(tab.url, '_blank');
                }
            },

            toggleFullscreen() {
                if (TabManager.activeTabId) {
                    const frame = document.getElementById(`frame-${TabManager.activeTabId}`);
                    if (frame) {
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        } else {
                            frame.requestFullscreen();
                        }
                    }
                }
            }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            AppManager.init();

            // 侧边栏折叠
            document.getElementById('toggleSidebar').addEventListener('click', () => {
                const sidebar = document.querySelector('.sidebar');
                sidebar.classList.toggle('collapsed');
            });

            // 搜索功能
            document.getElementById('searchInput').addEventListener('input', (e) => {
                AppManager.renderAppList(e.target.value);
            });

            // 添加应用按钮
            document.getElementById('addAppBtn').addEventListener('click', () => Modal.show());
            document.getElementById('cancelAddBtn').addEventListener('click', () => Modal.hide());
            document.getElementById('confirmAddBtn').addEventListener('click', () => Modal.confirm());

            // 新标签页按钮
            document.getElementById('newTabBtn').addEventListener('click', () => {
                TabManager.openNewTab();
            });

            // 点击模态框外部关闭
            document.getElementById('addAppModal').addEventListener('click', (e) => {
                if (e.target.id === 'addAppModal') {
                    Modal.hide();
                }
            });

            // 颜色选择
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('border-gray-800', 'border-4'));
                    btn.classList.add('border-gray-800', 'border-4');
                });
            });

            // 工具栏按钮
            document.getElementById('refreshBtn').addEventListener('click', () => Toolbar.refresh());
            document.getElementById('openExternalBtn').addEventListener('click', () => Toolbar.openExternal());
            document.getElementById('fullscreenBtn').addEventListener('click', () => Toolbar.toggleFullscreen());
        });
    </script>
