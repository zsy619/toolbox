        .glass-panel {

            left: 0;

            overflow: hidden;
            z-index: 0;
        }
        
        .rain-drop {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
            animation: fall linear infinite;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        
        .cloud {
            position: absolute;

            border-radius: 100px;

        // 切换城市
        function switchCity(city, btn) {

            document.querySelectorAll('.city-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('bg-gray-100', 'text-gray-600');

            btn.classList.add('active');
            btn.classList.remove('bg-gray-100', 'text-gray-600');
            
            renderWeather(city);
        }

        function renderWeather(city) {
            const data = cityData[city];
            
            // 更新基本信息
            document.getElementById('currentTemp').textContent = data.temp + '°';
            document.getElementById('weatherDesc').textContent = data.desc;
            document.getElementById('maxTemp').textContent = data.maxTemp + '°';
            document.getElementById('minTemp').textContent = data.minTemp + '°';

            const iconMap = {
                sunny: '<i class="fas fa-sun text-yellow-400"></i>',
                rainy: '<i class="fas fa-cloud-rain text-blue-400"></i>',
                cloudy: '<i class="fas fa-cloud text-gray-400"></i>',
                storm: '<i class="fas fa-bolt text-purple-400"></i>'
            };
            document.getElementById('weatherIcon').innerHTML = iconMap[data.weather] || iconMap.sunny;
            
            // 更新指标
            document.getElementById('humidity').textContent = data.humidity + '%';
            document.getElementById('windSpeed').textContent = data.windSpeed + ' km/h';
            document.getElementById('pressure').textContent = data.pressure + ' hPa';
            document.getElementById('visibility').textContent = data.visibility + ' km';
            document.getElementById('uvIndex').textContent = data.uvIndex;

                green: 'bg-green-100 text-green-600',
                yellow: 'bg-yellow-100 text-yellow-600',
                orange: 'bg-orange-100 text-orange-600',

            };

            renderHourlyChart(data.hourly);
            renderWeeklyChart(data.weekly);
            renderMonthlyChart(data.monthly);
            
            // 渲染小时列表
            renderHourlyList(data.hourly);
            
            // 显示/隐藏预警
            const warningPanel = document.getElementById('warningPanel');
            if (data.warning) {
                warningPanel.style.display = 'block';
                document.getElementById('warningText').textContent = data.warning;
            } else {
                warningPanel.style.display = 'none';
            }
        }

        // 渲染小时列表
        function renderHourlyList(hourly) {
            const container = document.getElementById('hourlyList');
            const icons = ['fa-moon', 'fa-moon', 'fa-moon', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun', 'fa-sun'];
            let html = '';
            const now = new Date().getHours();
            
            hourly.forEach((temp, index) => {
                const hour = (now + index) % 24;
                const icon = hour >= 6 && hour < 18 ? 'fa-sun text-yellow-400' : 'fa-moon text-blue-300';
                html += `
                    <div class="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50">
                        <div class="flex items-center gap-3">
                            <span class="text-gray-500 text-sm w-12">${hour}:00</span>
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="w-20 h-1 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full bg-gradient-to-r from-blue-400 to-red-400 rounded-full" style="width: ${(temp / 40) * 100}%"></div>
                            </div>
                            <span class="font-bold text-gray-700 w-8">${temp}°</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 渲染24小时图表
        function renderHourlyChart(hourly) {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            
            if (hourlyChartInstance) {
                hourlyChartInstance.destroy();
            }
            
            hourlyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${(new Date().getHours() + i) % 24}:00`),
                    datasets: [{
                        label: '温度',
                        data: hourly,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { callback: value => value + '°' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8 }
                        }
                    }
                }
            });
        }

        // 渲染7天趋势
        function renderWeeklyChart(weekly) {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            
            if (weeklyChartInstance) {
                weeklyChartInstance.destroy();
            }
            
            weeklyChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weekly.dates,
                    datasets: [
                        {
                            label: '最高温',
                            data: weekly.high,
                            backgroundColor: 'rgba(239, 68, 68, 0.8)',
                            borderRadius: 8,
                            barPercentage: 0.6
                        },
                        {
                            label: '最低温',
                            data: weekly.low,
                            backgroundColor: 'rgba(59, 130, 246, 0.8)',
                            borderRadius: 8,
                            barPercentage: 0.6
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { usePointStyle: true }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { callback: value => value + '°' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 渲染月度对比
        function renderMonthlyChart(monthly) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            if (monthlyChartInstance) {
                monthlyChartInstance.destroy();
            }
            
            monthlyChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    datasets: [{
                        label: '平均气温',
                        data: monthly,
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#8b5cf6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { callback: value => value + '°' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 初始化天气背景动画
        function initWeatherBg(weather) {
            const bg = document.getElementById('weatherBg');
            bg.innerHTML = '';
            
            if (weather === 'rainy') {
                // 创建雨滴
                for (let i = 0; i < 50; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    bg.appendChild(drop);
                }
            } else if (weather === 'sunny') {
                // 创建阳光
                const sun = document.createElement('div');
                sun.className = 'sun-ray';
                bg.appendChild(sun);
            } else if (weather === 'cloudy') {
                // 创建云朵
                for (let i = 0; i < 5; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'cloud';
                    cloud.style.width = (100 + Math.random() * 100) + 'px';
                    cloud.style.height = (40 + Math.random() * 40) + 'px';
                    cloud.style.top = Math.random() * 50 + '%';
                    cloud.style.left = '-200px';
                    cloud.style.animationDuration = (15 + Math.random() * 10) + 's';
                    cloud.style.animationDelay = (i * 3) + 's';
                    bg.appendChild(cloud);
                }
            }
        }
    </script>
