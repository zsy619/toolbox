<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高尔夫游戏 - 经典高尔夫挑战</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="高尔夫游戏 - 经典高尔夫挑战">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="高尔夫游戏 - 经典高尔夫挑战">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="高尔夫游戏 - 经典高尔夫挑战">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="club-selector">
        <div style="font-weight: bold; color: #2d3436; margin-bottom: 10px;">选择球杆</div>
        <button class="club-button active" data-club="putter">推杆</button>
        <button class="club-button" data-club="wedge">挖起杆</button>
        <button class="club-button" data-club="iron">铁杆</button>
        <button class="club-button" data-club="driver">一号木</button>
    </div>
    <div class="power-indicator">
        <div style="font-weight: bold; color: #2d3436; margin-bottom: 5px;">击球力度</div>
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>
        <div style="font-size: 0.9em; color: #636e72; margin-top: 5px;">
            <span id="windInfo">风速: 无风</span>
        </div>
    </div>
    <canvas id="gameCanvas" class="game-canvas" width="900" height="600"></canvas>
    <div class="message" id="message"></div>
    <button class="start-button" id="startButton">开始游戏</button>
    <div class="controls">
        <h3>🎮 游戏控制</h3>
        <div class="control-item">鼠标移动 - 瞄准方向</div>
        <div class="control-item">按住鼠标 - 蓄力击球</div>
        <div class="control-item">松开鼠标 - 击球</div>
        <div class="control-item">完成18洞挑战</div>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
