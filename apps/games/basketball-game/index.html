<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="power-bar">
        <div class="power-bar-label">投篮力度</div>
        <div class="power-bar-container">

    <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>
    <div class="message" id="message"></div>
    <button class="start-button" id="startButton">开始游戏</button>
    <div class="controls">
        <h3>🎮 游戏控制</h3>
        <div class="control-item">按住鼠标 - 蓄力投篮</div>
        <div class="control-item">松开鼠标 - 投篮</div>
