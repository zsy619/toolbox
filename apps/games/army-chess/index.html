<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">

    <meta name="twitter:title" content="军棋游戏 - 军事策略对战">

    <meta itemprop="name" content="军棋游戏 - 军事策略对战">

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="board-container">
        <div class="chess-board" id="chessBoard">
            <!-- 棋盘动态生成 -->
        </div>
    </div>
    <div class="message" id="message"></div>
    <div class="piece-info">
        <div class="army-info red-army">
            <h3>🔴 红军兵力</h3>
            <div class="piece-count" id="redPieceCount">
                <!-- 红军棋子统计 -->
            </div>
        </div>
        <div class="army-info blue-army">
            <h3>🔵 蓝军兵力</h3>
            <div class="piece-count" id="bluePieceCount">
                <!-- 蓝军棋子统计 -->
            </div>
        </div>
    </div>
    <div class="game-controls">
        <button class="control-button" id="startButton">开始游戏</button>
        <button class="control-button" id="resetButton">重新开始</button>
        <button class="control-button" id="hintButton">提示</button>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
