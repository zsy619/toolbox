<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史知识问答 - 穿越历史长河</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="历史知识问答 - 穿越历史长河">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="历史知识问答 - 穿越历史长河">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="历史知识问答 - 穿越历史长河">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="timer" id="timer">
        ⏰ 时间: <span id="timeLeft">30</span>秒
    </div>
    <div class="question-card" id="questionCard">
        <div class="era-badge" id="eraBadge">历史时期</div>
        <div class="question-text" id="questionText">准备开始历史知识问答！</div>
        <div class="hint-box" id="hintBox">
            <div class="hint-text" id="hintText"></div>
        </div>
        <div class="historical-context" id="historicalContext"></div>
    </div>
    <div class="answers-grid" id="answersGrid">
        <!-- 答案选项动态生成 -->
    </div>
    <div class="message" id="message"></div>
    <div class="quiz-controls">
        <button class="control-button" id="startButton">开始答题</button>
        <button class="control-button" id="hintButton" style="display: none;">💡 提示</button>
        <button class="control-button" id="nextButton" style="display: none;">下一题</button>
        <button class="control-button" id="restartButton" style="display: none;">重新开始</button>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
