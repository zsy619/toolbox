<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗兽棋 - 动物王国大战</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="斗兽棋 - 动物王国大战">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="斗兽棋 - 动物王国大战">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="斗兽棋 - 动物王国大战">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="board-container">
        <div class="chess-board" id="chessBoard">
            <!-- 棋盘动态生成 -->
        </div>
    </div>
    <div class="message" id="message"></div>
    <div class="animal-info">
        <div class="animal-card red">
            <div class="animal-rank">1</div>
            <div class="animal-emoji">🐭</div>
            <div>鼠 (克象)</div>
        </div>
        <div class="animal-card red">
            <div class="animal-rank">2</div>
            <div class="animal-emoji">🐱</div>
            <div>猫 (克鼠)</div>
        </div>
        <div class="animal-card red">
            <div class="animal-rank">3</div>
            <div class="animal-emoji">🐕</div>
            <div>狗 (克猫)</div>
        </div>
        <div class="animal-card red">
            <div class="animal-rank">4</div>
            <div class="animal-emoji">🐺</div>
            <div>狼 (克狗)</div>
        </div>
        <div class="animal-card blue">
            <div class="animal-rank">5</div>
            <div class="animal-emoji">🐆</div>
            <div>豹 (克狼)</div>
        </div>
        <div class="animal-card blue">
            <div class="animal-rank">6</div>
            <div class="animal-emoji">🐅</div>
            <div>虎 (克豹)</div>
        </div>
        <div class="animal-card blue">
            <div class="animal-rank">7</div>
            <div class="animal-emoji">🦁</div>
            <div>狮 (克虎)</div>
        </div>
        <div class="animal-card blue">
            <div class="animal-rank">8</div>
            <div class="animal-emoji">🐘</div>
            <div>象 (被鼠克)</div>
        </div>
    </div>
    <div class="game-controls">
        <button class="control-button" id="startButton">开始游戏</button>
        <button class="control-button" id="resetButton">重新开始</button>
        <button class="control-button" id="rulesButton">游戏规则</button>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
