<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <link rel="stylesheet" href="css/minesweeper.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="扫雷游戏">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="扫雷游戏">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="扫雷游戏">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="game-controls">
        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-level="beginner">初级</button>
            <button class="difficulty-btn" data-level="intermediate">中级</button>
            <button class="difficulty-btn" data-level="expert">高级</button>
        </div>
        <button class="restart-btn" id="restartBtn">😐</button>
    </div>
    <div class="game-board-container">
        <div class="game-board" id="gameBoard"></div>
    </div>
    <div class="game-message" id="gameMessage">
        <div class="message-content">
            <h2 id="messageTitle">游戏结束</h2>
            <p id="messageText">你赢了！</p>
            <button class="btn" id="newGameBtn">新游戏</button>
        </div>
    </div>
    <div class="game-instructions">
        <h3>游戏说明</h3>
        <ul>
            <li><strong>左键点击</strong>：翻开方块</li>
            <li><strong>右键点击</strong>：标记/取消标记地雷</li>
            <li><strong>数字</strong>：表示周围地雷数量</li>
            <li><strong>目标</strong>：找出所有地雷而不触雷</li>
        </ul>
        <div class="legend">
            <div class="legend-item">
                <div class="cell demo covered"></div>
                <span>未翻开</span>
            </div>
            <div class="legend-item">
                <div class="cell demo flagged">🚩</div>
                <span>标记</span>
            </div>
            <div class="legend-item">
                <div class="cell demo revealed">💣</div>
                <span>地雷</span>
            </div>
            <div class="legend-item">
                <div class="cell demo revealed number">3</div>
                <span>数字</span>
            </div>
        </div>
    </div>
    </div>
    <script src="js/minesweeper.js"></script>
</body>

</html>
