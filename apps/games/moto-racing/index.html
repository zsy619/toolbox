<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏍️ 摩托车赛 - 扁平化竞速游戏</title>
    <link rel="stylesheet" href="css/moto-racing.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="🏍️ 摩托车赛 - 扁平化竞速游戏">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🏍️ 摩托车赛 - 扁平化竞速游戏">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="🏍️ 摩托车赛 - 扁平化竞速游戏">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <!-- 游戏控制面板 -->
    <div class="game-controls">
        <button class="btn btn-primary" id="startBtn">开始比赛</button>
        <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
        <div class="difficulty-selector">
            <label>赛道:</label>
            <select id="trackSelect">
                <option value="desert">沙漠赛道</option>
                <option value="mountain" selected>山地赛道</option>
                <option value="city">城市赛道</option>
                <option value="extreme">极限赛道</option>
            </select>
        </div>
    </div>
    <!-- 游戏画布区域 -->
    <div class="game-canvas-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="balance-indicator">
            <div class="balance-bar">
                <div class="balance-fill" id="balanceFill"></div>
            </div>
            <span>平衡度</span>
        </div>
    </div>
    <!-- 操控面板 -->
    <div class="control-panel">
        <div class="control-instructions">
            <h3>🎮 操控说明</h3>
            <div class="control-grid">
                <div class="control-item">
                    <kbd>↑</kbd>
                    <span>加速</span>
                </div>
                <div class="control-item">
                    <kbd>↓</kbd>
                    <span>刹车</span>
                </div>
                <div class="control-item">
                    <kbd>←</kbd>
                    <span>后倾</span>
                </div>
                <div class="control-item">
                    <kbd>→</kbd>
                    <span>前倾</span>
                </div>
                <div class="control-item">
                    <kbd>Space</kbd>
                    <span>跳跃</span>
                </div>
            </div>
        </div>
        <!-- 触屏控制按钮 -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-row">
                <button class="touch-btn" id="accelerateBtn">▲</button>
                <button class="touch-btn" id="jumpBtn">⬆</button>
            </div>
            <div class="touch-row">
                <button class="touch-btn" id="backwardBtn">◀</button>
                <button class="touch-btn" id="brakeBtn">▼</button>
                <button class="touch-btn" id="forwardBtn">▶</button>
            </div>
        </div>
    </div>
    <!-- 特技系统 -->
    <div class="stunt-system">
        <h3>🤸 特技系统</h3>
        <div class="stunt-grid">
            <div class="stunt-item">
                <span class="stunt-name">后空翻</span>
                <span class="stunt-score">+100</span>
            </div>
            <div class="stunt-item">
                <span class="stunt-name">前空翻</span>
                <span class="stunt-score">+80</span>
            </div>
            <div class="stunt-item">
                <span class="stunt-name">完美着陆</span>
                <span class="stunt-score">+50</span>
            </div>
            <div class="stunt-item">
                <span class="stunt-name">长距离跳跃</span>
                <span class="stunt-score">+30</span>
            </div>
        </div>
    </div>
    <!-- 赛道信息 -->
    <div class="track-info">
        <div class="track-section">
            <h3>🏁 赛道特色</h3>
            <ul>
                <li>起伏地形挑战平衡</li>
                <li>跳台特技表演</li>
                <li>重力物理模拟</li>
                <li>倾斜角度控制</li>
            </ul>
        </div>
        <div class="track-section">
            <h3>🏆 完成条件</h3>
            <ul>
                <li>到达终点线</li>
                <li>保持摩托车平衡</li>
                <li>完成特技加分</li>
                <li>挑战最高分数</li>
            </ul>
        </div>
    </div>
    <!-- 成绩展示 -->
    <div class="performance-panel">
        <h3>📊 表现数据</h3>
        <div class="performance-grid">
            <div class="performance-item">
                <span class="performance-label">当前得分</span>
                <span class="performance-value" id="currentScore">0</span>
            </div>
            <div class="performance-item">
                <span class="performance-label">最高分数</span>
                <span class="performance-value" id="highScore">0</span>
            </div>
            <div class="performance-item">
                <span class="performance-label">特技次数</span>
                <span class="performance-value" id="stuntCount">0</span>
            </div>
            <div class="performance-item">
                <span class="performance-label">完美着陆</span>
                <span class="performance-value" id="perfectLandings">0</span>
            </div>
        </div>
    </div>
    <!-- 游戏结果弹窗 -->
    <div class="game-modal" id="gameModal">
        <div class="modal-content">
            <h2 id="resultTitle">🏍️ 比赛结束</h2>
            <div class="result-stats">
                <div class="result-item">
                    <span class="result-label">最终得分</span>
                    <span class="result-value" id="finalScore">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">行驶距离</span>
                    <span class="result-value" id="finalDistance">0m</span>
                </div>
                <div class="result-item">
                    <span class="result-label">特技总数</span>
                    <span class="result-value" id="finalStunts">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">评级</span>
                    <span class="result-value" id="finalRating">⭐⭐⭐</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="playAgainBtn">再来一局</button>
                <button class="btn btn-secondary" id="backToMenuBtn">返回菜单</button>
            </div>
        </div>
    </div>
    <!-- 返回链接 -->
    <div class="back-link">
        <a href="../index.html" class="btn btn-link">← 返回游戏大厅</a>
    </div>
    </div>
    <script src="js/moto-racing.js"></script>
</body>

</html>
