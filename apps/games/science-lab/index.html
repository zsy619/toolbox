<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学实验室 - 探索科学奥秘</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="科学实验室 - 探索科学奥秘">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="科学实验室 - 探索科学奥秘">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="科学实验室 - 探索科学奥秘">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="lab-controls">
        <div class="control-panel">
            <div class="variable-control">
                <label class="variable-label">质量 (kg)</label>
                <input type="range" class="variable-slider" id="massSlider" min="1" max="10" value="5">
                <div class="variable-value" id="massValue">5 kg</div>
            </div>
        </div>
        <div class="control-panel">
            <div class="variable-control">
                <label class="variable-label">高度 (m)</label>
                <input type="range" class="variable-slider" id="heightSlider" min="10" max="100" value="50">
                <div class="variable-value" id="heightValue">50 m</div>
            </div>
        </div>
        <div class="control-panel">
            <div class="variable-control">
                <label class="variable-label">空气阻力</label>
                <input type="range" class="variable-slider" id="airResistanceSlider" min="0" max="100" value="10">
                <div class="variable-value" id="airResistanceValue">10%</div>
            </div>
        </div>
        <div class="control-panel">
            <div class="variable-control">
                <label class="variable-label">重力 (m/s²)</label>
                <input type="range" class="variable-slider" id="gravitySlider" min="1" max="20" value="10" step="0.1">
                <div class="variable-value" id="gravityValue">10.0 m/s²</div>
            </div>
        </div>
    </div>
    <canvas id="labCanvas" class="lab-canvas" width="900" height="500"></canvas>
    <div class="results-panel" id="resultsPanel">
        <div class="results-title">🔬 实验结果</div>
        <div class="results-content" id="resultsContent"></div>
    </div>
    <div class="message" id="message"></div>
    <div style="text-align: center; margin-top: 20px;">
        <button class="control-button" id="startButton">开始实验</button>
        <button class="control-button" id="resetButton">重置实验</button>
        <button class="control-button" id="recordButton" style="display: none;">记录数据</button>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
