<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼图游戏 - 经典益智挑战</title>
    <meta name="description" content="经典拼图游戏，多种难度选择，支持自定义图片，锻炼逻辑思维和空间想象力">
    <meta name="keywords" content="拼图,益智游戏,逻辑思维,空间想象,在线游戏">
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="拼图游戏 - 经典益智挑战">
    <meta property="og:description" content="经典拼图游戏，多种难度选择，支持自定义图片，锻炼逻辑思维和空间想象力">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="拼图游戏 - 经典益智挑战">
    <meta name="twitter:description" content="经典拼图游戏，多种难度选择，支持自定义图片，锻炼逻辑思维和空间想象力">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="拼图游戏 - 经典益智挑战">
    <meta itemprop="description" content="经典拼图游戏，多种难度选择，支持自定义图片，锻炼逻辑思维和空间想象力">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="action-buttons">
        <button id="newGame">新游戏</button>
        <button id="shuffle">打乱</button>
        <button id="hint">提示</button>
        <button id="solve">显示答案</button>
    </div>
    </div>
    <div class="game-info">
        <div class="info-item">
            <span class="label">游戏时间</span>
            <span class="value" id="timer">00:00</span>
        </div>
        <div class="info-item">
            <span class="label">移动次数</span>
            <span class="value" id="moves">0</span>
        </div>
        <div class="info-item">
            <span class="label">完成度</span>
            <span class="value" id="progress">0%</span>
        </div>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="game-area">
        <div class="puzzle-container">
            <div class="difficulty-indicator" id="difficultyIndicator">4×4</div>
            <div class="puzzle-board" id="puzzleBoard"></div>
        </div>
        <div class="reference-image" id="referenceImage"></div>
    </div>
    </div>
    <div class="completion-modal" id="completionModal">
        <div class="modal-content">
            <h2>🎉 恭喜完成！</h2>
            <p id="completionText">你成功完成了拼图！</p>
            <button onclick="jigsawPuzzle.hideCompletionModal()">继续游戏</button>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
