<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节拍创作 - Beat Creator | 音乐制作游戏</title>
    <meta name="description" content="创作属于你的音乐节拍！这是一个专业的在线节拍制作工具，支持多轨道编辑、实时播放和音效调节。">
    <meta name="keywords" content="节拍创作,音乐制作,Beat Creator,在线音乐编辑器,节奏游戏,音乐创作工具">
    <meta name="author" content="Game Creator">
    <link rel="canonical" href="/games/beat-creator/">
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="节拍创作 - Beat Creator | 音乐制作游戏">
    <meta property="og:description" content="创作属于你的音乐节拍！这是一个专业的在线节拍制作工具，支持多轨道编辑、实时播放和音效调节。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="节拍创作 - Beat Creator | 音乐制作游戏">
    <meta name="twitter:description" content="创作属于你的音乐节拍！这是一个专业的在线节拍制作工具，支持多轨道编辑、实时播放和音效调节。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="节拍创作 - Beat Creator | 音乐制作游戏">
    <meta itemprop="description" content="创作属于你的音乐节拍！这是一个专业的在线节拍制作工具，支持多轨道编辑、实时播放和音效调节。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="transport-controls">
        <button class="btn" id="playBtn">▶️ 播放</button>
        <button class="btn secondary" id="stopBtn">⏹️ 停止</button>
        <button class="btn secondary" id="recordBtn">🔴 录制</button>
        <button class="btn secondary" id="clearBtn">🗑️ 清空</button>
        <button class="btn secondary" id="randomBtn">🎲 随机</button>
    </div>
    <div class="tracks-container">
        <div class="track" data-track="kick">
            <div class="track-header">
                <div class="track-title">
                    🥁 底鼓 (Kick)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="80">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="kick"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>混响</label>
                    <input type="range" class="reverb-control" min="0" max="100" value="20">
                </div>
            </div>
        </div>
        <div class="track" data-track="snare">
            <div class="track-header">
                <div class="track-title">
                    🎯 小鼓 (Snare)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="75">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="snare"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>混响</label>
                    <input type="range" class="reverb-control" min="0" max="100" value="30">
                </div>
            </div>
        </div>
        <div class="track" data-track="hihat">
            <div class="track-header">
                <div class="track-title">
                    🎩 踩镲 (Hi-Hat)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="60">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="hihat"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>滤波</label>
                    <input type="range" class="filter-control" min="0" max="100" value="50">
                </div>
            </div>
        </div>
        <div class="track" data-track="openhat">
            <div class="track-header">
                <div class="track-title">
                    🔓 开音踩镲 (Open Hat)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="50">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="openhat"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>延迟</label>
                    <input type="range" class="delay-control" min="0" max="100" value="0">
                </div>
            </div>
        </div>
        <div class="track" data-track="clap">
            <div class="track-header">
                <div class="track-title">
                    👏 拍手 (Clap)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="65">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="clap"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>失真</label>
                    <input type="range" class="distortion-control" min="0" max="100" value="10">
                </div>
            </div>
        </div>
        <div class="track" data-track="crash">
            <div class="track-header">
                <div class="track-title">
                    💥 镲片 (Crash)
                </div>
                <div class="track-controls">
                    <button class="track-btn mute-btn">🔇</button>
                    <button class="track-btn solo-btn">Solo</button>
                    <div class="volume-control">
                        <span>🔊</span>
                        <input type="range" class="track-volume" min="0" max="100" value="70">
                    </div>
                </div>
            </div>
            <div class="sequencer" data-track="crash"></div>
            <div class="effects-panel">
                <div class="effect-control">
                    <label>音调</label>
                    <input type="range" class="pitch-control" min="-12" max="12" value="0">
                </div>
                <div class="effect-control">
                    <label>混响</label>
                    <input type="range" class="reverb-control" min="0" max="100" value="60">
                </div>
            </div>
        </div>
    </div>
    <div class="pattern-controls">
        <h3 style="color: white; margin-bottom: 15px;">🎼 预设节拍模式</h3>
        <div class="pattern-buttons">
            <button class="pattern-btn" data-pattern="basic">基础节拍</button>
            <button class="pattern-btn" data-pattern="rock">摇滚节拍</button>
            <button class="pattern-btn" data-pattern="funk">放克节拍</button>
            <button class="pattern-btn" data-pattern="disco">迪斯科</button>
            <button class="pattern-btn" data-pattern="techno">电子音乐</button>
            <button class="pattern-btn" data-pattern="jazz">爵士节拍</button>
            <button class="pattern-btn" data-pattern="latin">拉丁节拍</button>
            <button class="pattern-btn" data-pattern="trap">陷阱音乐</button>
        </div>
    </div>
    <div class="pattern-controls">
        <h3 style="color: white; margin-bottom: 15px;">🎹 实时演奏面板</h3>
        <div class="performance-pad">
            <div class="pad" data-sound="kick">Kick</div>
            <div class="pad" data-sound="snare">Snare</div>
            <div class="pad" data-sound="hihat">Hi-Hat</div>
            <div class="pad" data-sound="openhat">Open</div>
            <div class="pad" data-sound="clap">Clap</div>
            <div class="pad" data-sound="crash">Crash</div>
            <div class="pad" data-sound="ride">Ride</div>
            <div class="pad" data-sound="tom">Tom</div>
        </div>
        <div class="visualizer" id="visualizer"></div>
    </div>
    </div>
    <div class="status-bar" id="statusBar">
        准备就绪 - 开始创作你的节拍！
    </div>
    <script src="js/game.js"></script>
</body>

</html>
