<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏</title>
    <link rel="stylesheet" href="css/game.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="2048游戏">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="2048游戏">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="2048游戏">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="score-box">
        <div class="score-label">最高</div>
        <div class="score" id="bestScore">0</div>
    </div>
    </div>
    </div>
    <div class="game-info">
        <p class="game-intro">使用方向键移动方块，相同数字会合并！</p>
        <button class="restart-button" id="restartBtn">重新开始</button>
    </div>
    <div class="grid-container">
        <div class="grid-row">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
        </div>
    </div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="game-message" id="gameMessage">
        <p></p>
        <div class="lower">
            <button class="restart-button" id="tryAgainBtn">再试一次</button>
        </div>
    </div>
    <div class="game-explanation">
        <p><strong>玩法说明:</strong> 用方向键移动方块。当两个相同数字的方块碰撞时，它们会合并成一个！</p>
        <hr>
        <p><strong>如何获胜:</strong> 创造一个2048方块来获胜！</p>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
