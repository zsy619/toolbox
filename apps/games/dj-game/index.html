<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ游戏 - 电子音乐混音台</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="DJ游戏 - 电子音乐混音台">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DJ游戏 - 电子音乐混音台">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="DJ游戏 - 电子音乐混音台">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="track-selector">
        <button class="track-btn" data-track="house">🏠 House Beat</button>
        <button class="track-btn" data-track="techno">⚡ Techno Loop</button>
        <button class="track-btn" data-track="trance">🌟 Trance Melody</button>
        <button class="track-btn" data-track="dubstep">🔥 Dubstep Drop</button>
    </div>
    <div class="deck-controls">
        <button class="control-btn play" id="playA">▶️ PLAY</button>
        <button class="control-btn stop" id="stopA">⏹️ STOP</button>
    </div>
    <div class="volume-control">
        <label class="control-label">音量</label>
        <input type="range" class="slider" id="volumeA" min="0" max="100" value="70">
    </div>
    <div class="volume-control">
        <label class="control-label">音调</label>
        <input type="range" class="slider" id="pitchA" min="-50" max="50" value="0">
    </div>
    <button class="sync-btn" id="syncA">🔄 SYNC</button>
    </div>
    <!-- 中央控制区 -->
    <div class="crossfader-section">
        <div class="crossfader-title">CROSSFADER</div>
        <input type="range" class="crossfader" id="crossfader" min="0" max="100" value="50">
        <div class="effects-panel">
            <div class="effects-title">音效</div>
            <div class="effects-grid">
                <button class="effect-btn" id="reverb">🌊 混响</button>
                <button class="effect-btn" id="delay">⏰ 延迟</button>
                <button class="effect-btn" id="filter">🎛️ 滤波</button>
                <button class="effect-btn" id="distortion">⚡ 失真</button>
            </div>
        </div>
    </div>
    <!-- 右声道 -->
    <div class="deck" id="deckB">
        <div class="deck-title">🎵 DECK B</div>
        <div class="bpm-display">
            <div class="bpm-value" id="bpmB">128</div>
            <div class="bpm-label">BPM</div>
        </div>
        <div class="track-selector">
            <button class="track-btn" data-track="electro">⚡ Electro Bass</button>
            <button class="track-btn" data-track="ambient">🌙 Ambient Pad</button>
            <button class="track-btn" data-track="drum">🥁 Drum Pattern</button>
            <button class="track-btn" data-track="synth">🎹 Synth Lead</button>
        </div>
        <div class="deck-controls">
            <button class="control-btn play" id="playB">▶️ PLAY</button>
            <button class="control-btn stop" id="stopB">⏹️ STOP</button>
        </div>
        <div class="volume-control">
            <label class="control-label">音量</label>
            <input type="range" class="slider" id="volumeB" min="0" max="100" value="70">
        </div>
        <div class="volume-control">
            <label class="control-label">音调</label>
            <input type="range" class="slider" id="pitchB" min="-50" max="50" value="0">
        </div>
        <button class="sync-btn" id="syncB">🔄 SYNC</button>
    </div>
    </div>
    <!-- 可视化器 -->
    <div class="visualizer" id="visualizer"></div>
    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <div class="status-label">主音量</div>
            <div class="status-value" id="masterVolume">85%</div>
        </div>
        <div class="status-item">
            <div class="status-label">当前BPM</div>
            <div class="status-value" id="currentBPM">124</div>
        </div>
        <div class="status-item">
            <div class="status-label">混音状态</div>
            <div class="status-value" id="mixStatus">READY</div>
        </div>
        <div class="status-item">
            <div class="status-label">录制时间</div>
            <div class="status-value" id="recordTime">00:00</div>
        </div>
    </div>
    <!-- 录制控制 -->
    <div class="record-section">
        <button class="record-btn" id="recordBtn">🔴 开始录制</button>
    </div>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
