    <!-- Wechat Share Image Hack -->

    <div class="status-item">
        <div class="status-value" id="score">0</div>

    <div class="status-item">
        <div class="status-value" id="hearts">5</div>

    </div>
    </div>
    <div class="game-canvas" id="gameCanvas"></div>
    <div class="controls">

    </div>
    <div class="game-tips">
        <h3>游戏提示</h3>
        <ul>
            <li>使用鲭子攻击可以破坏物品</li>
            <li>收集爱心可以使用副武器</li>
            <li>注意各种怪物的攻击模式</li>
            <li>在平台间跳跃时小心落下</li>

    </div>
