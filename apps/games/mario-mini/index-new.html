    <script>
        // 马里奥游戏逻辑
        class MarioGame {
            constructor() {
                this.canvas = document.getElementById('marioCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.score = 0;
                this.lives = 3;
                this.coins = 0;
                this.gameRunning = false;

                this.setupControls();
                this.setupGame();
            }

            setupControls() {
                document.getElementById('startBtn').onclick = () => this.startGame();
                document.getElementById('pauseBtn').onclick = () => this.pauseGame();
                document.getElementById('resetBtn').onclick = () => this.resetGame();
            }

            setupGame() {
                this.ctx.fillStyle = '#87CEEB';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#654321';
                this.ctx.fillRect(0, 350, this.canvas.width, 50);

                this.ctx.fillStyle = '#FF0000';
                this.ctx.fillRect(50, 300, 30, 50);
                this.ctx.fillStyle = '#FFFF00';
                this.ctx.fillRect(55, 305, 20, 20);

                this.ctx.fillStyle = '#000';
                this.ctx.font = '20px Arial';
                this.ctx.fillText('马里奥冒险即将开始...', 250, 200);
            }

            startGame() {
                if (!this.gameRunning) {
                    this.gameRunning = true;
                    this.showMessage('游戏开始！', 'level-complete');
                    this.gameLoop();
                }
            }

            pauseGame() {
                this.gameRunning = !this.gameRunning;
                if (this.gameRunning) {
                    this.gameLoop();
                } else {
                    this.showMessage('游戏暂停', 'game-over');
                }
            }

            resetGame() {
                this.gameRunning = false;
                this.score = 0;
                this.lives = 3;
                this.coins = 0;
                this.updateStats();
                this.setupGame();
                this.hideMessage();
            }

            gameLoop() {
                if (!this.gameRunning) return;

                // 简单的游戏逻辑
                this.score += 10;
                if (Math.random() < 0.1) {
                    this.coins++;
                }

                this.updateStats();

                setTimeout(() => this.gameLoop(), 100);
            }

            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('coins').textContent = this.coins;
            }

            showMessage(text, type) {
                const messageEl = document.getElementById('gameMessage');
                messageEl.textContent = text;
                messageEl.className = `message show ${type}`;
                setTimeout(() => this.hideMessage(), 2000);
            }

            hideMessage() {
                const messageEl = document.getElementById('gameMessage');
                messageEl.className = 'message';
            }
        }

        // 初始化游戏
        window.onload = () => {
            new MarioGame();
        };
    </script>
