<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="game-controls">
        <button class="btn" id="startBtn">开始游戏</button>
        <button class="btn" id="pauseBtn">暂停</button>
        <button class="btn" id="resetBtn">重置</button>
    </div>
    <div class="game-canvas-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="control-hint">
            使用方向键或WASD控制移动
        </div>
    </div>
    <div class="power-ups">
        <div class="power-up">
            <span class="emoji">🔸</span>
            <span class="description">普通豆子 - 10分</span>
        </div>
        <div class="power-up">
            <span class="emoji">⚡</span>
            <span class="description">能量豆 - 50分，可吃鬼</span>
        </div>
        <div class="power-up">
            <span class="emoji">🍎</span>
            <span class="description">水果奖励 - 100分</span>
        </div>
    </div>
    </div>
    <script src="js/pacman.js"></script>
</body>
