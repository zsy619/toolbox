<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程入门游戏 - 学习编程基础知识</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="编程入门游戏 - 学习编程基础知识">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="编程入门游戏 - 学习编程基础知识">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="编程入门游戏 - 学习编程基础知识">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="challenge-card" id="challengeCard">
        <div class="challenge-title" id="challengeTitle">准备开始编程学习！</div>
        <div class="challenge-description" id="challengeDescription">
            选择一个课程开始学习编程基础知识。每个课程包含5个编程挑战，完成挑战来提升你的编程技能！
        </div>
        <div class="code-example" id="codeExample" style="display: none;">
            <!-- 示例代码 -->
        </div>
        <div class="hint-box" id="hintBox">
            <div class="hint-text" id="hintText"></div>
        </div>
        <div class="code-editor" id="codeEditor" style="display: none;">
            <textarea class="code-input" id="codeInput" placeholder="在这里输入你的代码..."></textarea>
        </div>
        <div class="code-output" id="codeOutput" style="display: none;">
            <div style="color: #63b3ed; margin-bottom: 10px;">输出结果:</div>
            <div id="outputText"></div>
        </div>
    </div>
    <div class="message" id="message"></div>
    <div class="game-controls">
        <button class="control-button" id="startButton">开始学习</button>
        <button class="control-button run-button" id="runButton" style="display: none;">🚀 运行代码</button>
        <button class="control-button hint-button" id="hintButton" style="display: none;">💡 提示</button>
        <button class="control-button" id="nextButton" style="display: none;">下一个挑战</button>
        <button class="control-button" id="restartButton" style="display: none;">重新开始</button>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
