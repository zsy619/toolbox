<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="css/game.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="贪吃蛇游戏">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="贪吃蛇游戏">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="贪吃蛇游戏">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="game-area">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn" class="btn">重新开始</button>
        </div>
    </div>
    <div class="game-controls">
        <button id="startBtn" class="btn btn-primary">开始游戏</button>
        <button id="pauseBtn" class="btn">暂停</button>
        <button id="resetBtn" class="btn">重置</button>
    </div>
    <div class="game-instructions">
        <h3>游戏说明</h3>
        <p>使用方向键控制蛇的移动，吃到食物可以增长并得分</p>
        <div class="controls-info">
            <span>↑ ↓ ← → 控制方向</span>
            <span>空格键暂停/继续</span>
        </div>
    </div>
    </div>
    <script src="js/game.js"></script>
    <script src="js/render.js"></script>
    <script src="js/controls.js"></script>
</body>

</html>
