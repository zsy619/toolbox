    <meta itemprop="name" content="🏃 跑酷游戏 - 扁平化竞速游戏">

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="game-controls">
        <button class="btn btn-primary" id="startBtn">开始跑酷</button>
        <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>
    <div class="game-canvas-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
    <div class="control-panel">
        <div class="control-instructions">
            <h3>🎮 操控说明</h3>
            <div class="control-grid">
                <div class="control-item">
                    <kbd>Space</kbd>
                    <span>跳跃</span>
                </div>
                <div class="control-item">
                    <kbd>↓</kbd>
                    <span>滑铲</span>
                </div>
                <div class="control-item">
                    <kbd>↑</kbd>
                    <span>翻滚</span>
                </div>
            </div>
        </div>
    </div>
    <div class="back-link">
        <a href="../index.html" class="btn btn-link">← 返回游戏大厅</a>
    </div>
    </div>
    <script src="js/parkour-runner.js"></script>
</body>
