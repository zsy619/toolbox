<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农场游戏 - 快乐农场经营</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="农场游戏 - 快乐农场经营">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="农场游戏 - 快乐农场经营">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="农场游戏 - 快乐农场经营">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="shop">
        <h3>🏪 种子商店</h3>
        <div class="shop-items">
            <div class="shop-item selected" data-seed="wheat">
                🌾 小麦<br>💰10
            </div>
            <div class="shop-item" data-seed="corn">
                🌽 玉米<br>💰20
            </div>
            <div class="shop-item" data-seed="tomato">
                🍅 番茄<br>💰30
            </div>
            <div class="shop-item" data-seed="carrot">
                🥕 胡萝卜<br>💰15
            </div>
            <div class="shop-item" data-seed="potato">
                🥔 土豆<br>💰25
            </div>
            <div class="shop-item" data-seed="strawberry">
                🍓 草莓<br>💰40
            </div>
        </div>
    </div>
    <canvas id="gameCanvas" class="game-canvas" width="900" height="500"></canvas>
    <div class="inventory">
        <h3>📦 仓库</h3>
        <div class="inventory-items" id="inventoryItems">
            <!-- 动态生成 -->
        </div>
    </div>
    <div class="message" id="message"></div>
    <button class="start-button" id="startButton">开始游戏</button>
    <div class="controls">
        <h3>🎮 游戏控制</h3>
        <div class="control-item">选择种子 - 点击商店中的种子</div>
        <div class="control-item">种植 - 点击空地种植作物</div>
        <div class="control-item">收获 - 点击成熟的作物收获</div>
        <div class="control-item">等待作物成长并出售赚钱</div>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
