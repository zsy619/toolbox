<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块游戏</title>
    <link rel="stylesheet" href="css/breakout.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="打砖块游戏">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="打砖块游戏">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="打砖块游戏">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    </div>
    <div class="game-area">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="game-controls">
            <button class="btn" id="startBtn">开始游戏</button>
            <button class="btn" id="pauseBtn">暂停</button>
            <button class="btn" id="restartBtn">重新开始</button>
        </div>
    </div>
    <div class="game-info">
        <div class="instructions">
            <h3>游戏说明</h3>
            <ul>
                <li>移动挡板反弹小球</li>
                <li>击破所有砖块过关</li>
                <li>不同颜色砖块分数不同</li>
                <li>生命用完游戏结束</li>
            </ul>
        </div>
        <div class="controls">
            <h3>操作方式</h3>
            <ul>
                <li>鼠标移动控制挡板</li>
                <li>← → 方向键移动</li>
                <li>空格键发射小球</li>
                <li>P键暂停游戏</li>
            </ul>
        </div>
    </div>
    <div class="game-message" id="gameMessage">
        <div class="message-content">
            <h2 id="messageTitle">游戏结束</h2>
            <p id="messageText">最终得分: 0</p>
            <button class="btn" id="newGameBtn">新游戏</button>
        </div>
    </div>
    </div>
    <script src="js/breakout.js"></script>
</body>

</html>
