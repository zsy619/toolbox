                                                                shuffleQuestions() {
                const questions = this.questions[this.difficulty];
                for (let i = questions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                                                                [questions[i], questions[j]] = [questions[j], questions[i]];
                }
            }

                                                                showQuestion() {

                                                                this.updateUI();
            }

                                                                font-weight: 600;
                                                                `;
                                                                explanationDiv.innerHTML = `💡 ${explanation}`;
                                                                document.getElementById('questionCard').appendChild(explanationDiv);
            }

                                                                showHint() {
                if (this.answered || this.hintUsed) return;

                                                                this.hintUsed = true;
                                                                const question = this.questions[this.difficulty][this.currentQuestionIndex];
                                                                document.getElementById('hintText').textContent = question.hint;
                                                                document.getElementById('hintBox').classList.add('show');
                                                                document.getElementById('hintButton').style.display = 'none';
            }

                                                                nextQuestion() {
                                                                    this.currentQuestionIndex++;
                                                                this.hideMessage();

                // 清除解释
                const explanation = document.querySelector('#questionCard > div:last-child');
                                                                if (explanation && explanation.style.background === 'rgb(232, 246, 243)') {
                                                                    explanation.remove();
                }

                                                                this.showQuestion();
            }

                                                                endQuiz() {
                const accuracy = Math.round((this.correctAnswers / this.totalQuestions) * 100);
                                                                let grade = '';
                
                if (accuracy >= 90) grade = '🏆 优秀！地理专家！';
                else if (accuracy >= 70) grade = '👍 良好！继续努力！';
                else if (accuracy >= 50) grade = '📚 及格！多加练习！';
                                                                else grade = '💪 需要加油！重新挑战！';

                                                                this.showMessage(`🎊 测试完成！\n得分：${this.score}分\n正确率：${accuracy}%\n${grade}`, 'final');

                                                                document.getElementById('nextButton').style.display = 'none';
                                                                document.getElementById('hintButton').style.display = 'none';
                                                                document.getElementById('restartButton').style.display = 'inline-block';
            }

                                                                restartQuiz() {
                                                                    this.currentQuestionIndex = 0;
                                                                this.score = 0;
                                                                this.correctAnswers = 0;
                                                                this.answered = false;

                                                                document.getElementById('questionText').textContent = '准备开始地理知识问答！';
                                                                document.getElementById('answersGrid').innerHTML = '';
                                                                document.getElementById('startButton').style.display = 'inline-block';
                                                                document.getElementById('restartButton').style.display = 'none';
                                                                document.getElementById('hintButton').style.display = 'none';
                                                                document.getElementById('nextButton').style.display = 'none';

                                                                this.hideMessage();
                                                                this.updateUI();
                                                                this.updateProgress();
            }

                                                                updateProgress() {
                const progress = (this.currentQuestionIndex / this.totalQuestions) * 100;
                                                                document.getElementById('progressFill').style.width = progress + '%';
            }

                                                                updateUI() {
                                                                    document.getElementById('score').textContent = this.score;
                                                                document.getElementById('currentQuestion').textContent = this.currentQuestionIndex + 1;
                
                if (this.totalQuestions > 0) {
                    const accuracy = Math.round((this.correctAnswers / Math.max(1, this.currentQuestionIndex)) * 100);
                                                                document.getElementById('accuracy').textContent = accuracy + '%';
                }
            }

                                                                showMessage(text, type) {
                const message = document.getElementById('message');
                                                                message.textContent = text;
                                                                message.className = `message ${type} show`;
            }

                                                                hideMessage() {
                const message = document.getElementById('message');
                                                                message.classList.remove('show');
            }
        }

        // 启动游戏
        window.addEventListener('load', () => {
                                                                    new GeographyQuiz();
        });
    </script>
