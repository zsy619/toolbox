<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="status-item">
        <div class="status-value" id="score">0</div>
        <div class="status-label">得分</div>
    </div>
    <div class="status-item">
        <div class="status-value" id="enemies">0</div>
        <div class="status-label">战胜敌人</div>
    </div>
    </div>
    <div class="game-canvas" id="gameCanvas"></div>
    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="pauseBtn">暂停</button>
        <button id="resetBtn">重新开始</button>
    </div>
    <div class="game-tips">
        <h3>游戏提示</h3>
        <ul>
            <li>使用组合键释放强力招式</li>
            <li>投技可以对多个敌人造成伤害</li>
            <li>注意身后和两侧的敌人</li>
            <li>在血量低时保持距离</li>
        </ul>
    </div>
    </div>
