<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网球游戏 - 经典网球对战</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信/OpenGraph 卡片信息 -->
    <meta property="og:title" content="网球游戏 - 经典网球对战">
    <meta property="og:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta property="og:url" content="./index.html">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="网球游戏 - 经典网球对战">
    <meta name="twitter:description" content="一个实用的在线工具，帮助您提高效率。">
    <meta name="twitter:image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
    <meta itemprop="name" content="网球游戏 - 经典网球对战">
    <meta itemprop="description" content="一个实用的在线工具，帮助您提高效率。">
    <meta itemprop="image" content="https://tools.yy24365.com/assets/images/dev-tools-og.png">
</head>

<body>
    <!-- Wechat Share Image Hack -->
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>
    <div class="ai-score">
        电脑: <span id="aiScore">0</span>
        <div class="set-score">盘数: <span id="aiSets">0</span></div>
    </div>
    </div>
    <div class="power-indicator">
        <div style="font-weight: bold; color: #2d3436; margin-bottom: 5px;">击球力度</div>
        <div class="power-bar">
            <div class="power-fill" id="powerFill"></div>
        </div>
    </div>
    <canvas id="gameCanvas" class="game-canvas" width="900" height="600"></canvas>
    <div class="message" id="message"></div>
    <button class="start-button" id="startButton">开始比赛</button>
    <div class="controls">
        <h3>🎮 游戏控制</h3>
        <div class="control-item">鼠标移动 - 控制球员位置</div>
        <div class="control-item">按住鼠标 - 蓄力击球</div>
        <div class="control-item">松开鼠标 - 击球</div>
        <div class="control-item">先赢3盘获胜</div>
    </div>
    </div>
    <script src="js/game.js"></script>
</body>

</html>
