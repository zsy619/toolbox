    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 显示当前页面路径
            var currentPath = window.location.href;
            document.getElementById('currentPath').textContent = currentPath;

            // 测试链接状态
            var parentLink = document.querySelector('a[href="../index.html"]');
            var rootLink = document.querySelector('a[href="/"]');

            // 检测父链接是否可访问（仅在有网络时测试）
            if (parentLink) {
                var parentHref = parentLink.href;
                fetch(parentHref, { method: 'HEAD' })
                    .then(function () {
                        document.getElementById('parentLinkStatus').innerHTML = '<span class="text-green-500">✓ 可访问</span>';
                    })
                    .catch(function () {
                        document.getElementById('parentLinkStatus').innerHTML = '<span class="text-yellow-500">⚠ 未测试</span>';
                    });
            }

            if (rootLink) {
                document.getElementById('rootLinkStatus').innerHTML = '<span class="text-gray-500">⚠ 相对路径</span>';
            }
        });
    </script>
