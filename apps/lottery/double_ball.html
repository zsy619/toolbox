    <script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.8.17/layui.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            layui.use(['layer'], function () {
                var layer = layui.layer;
                var historyData = JSON.parse(localStorage.getItem('doubleBallHistory')) || [];

                // 生成随机号码
                function generateBallSet() {
                    var redBalls = [];
                    while (redBalls.length < 6) {
                        var num = Math.floor(Math.random() * 33) + 1;
                        num = num < 10 ? '0' + num : num.toString();
                        if (redBalls.indexOf(num) === -1) {
                            redBalls.push(num);
                        }
                    }
                    redBalls.sort(function (a, b) { return a - b; });

                    var blueBall = Math.floor(Math.random() * 16) + 1;
                    blueBall = blueBall < 10 ? '0' + blueBall : blueBall.toString();

                    return {
                        redBalls: redBalls,
                        blueBall: blueBall,
                        time: new Date().toISOString()
                    };
                }

                // 复制号码到剪贴板
                function copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(function () {
                        layer.msg('已复制到剪贴板', { icon: 1 });
                    }, function (err) {
                        layer.msg('复制失败', { icon: 2 });
                        console.error('复制失败:', err);
                    });
                }

                // 渲染批量生成结果
                function renderBatchResults(results) {
                    var html = '';
                    results.forEach(function (item, index) {
                        var numbers = item.redBalls.join(' ') + ' + ' + item.blueBall;

                        var isCollected = isDuplicateNumbers(item);
                        var saveButtonHtml = isCollected ?
                            '<button class="action-btn save-btn bg-gray-400 cursor-not-allowed"><i class="fas fa-check"></i> 已收藏</button>' :
                            '<button class="action-btn save-btn bg-blue-500 hover:bg-blue-600 text-white" onclick="saveSingleSet(' + index + ')"><i class="fas fa-star"></i> 收藏</button>';

                        html += '<div class="batch-item">' +
                            '<div class="batch-balls">' +
                            '<span class="ball red-ball">' + item.redBalls[0] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[1] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[2] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[3] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[4] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[5] + '</span>' +
                            '<span class="mx-2 text-xl">+</span>' +
                            '<span class="ball blue-ball">' + item.blueBall + '</span>' +
                            '</div>' +
                            '<div class="batch-actions">' +
                            saveButtonHtml +
                            '<button class="action-btn copy-btn bg-green-600 hover:bg-green-700 text-white" onclick="copyNumbers(\'' + numbers + '\')">' +
                            '<i class="fas fa-copy"></i> 复制' +
                            '</button>' +
                            '</div>' +
                            '</div>';
                    });
                    document.getElementById('batchResults').innerHTML = html;
                }

                // 渲染历史记录
                function renderHistory() {
                    var html = '';
                    historyData.forEach(function (item, index) {
                        var date = new Date(item.time);
                        var year = date.getFullYear();
                        var month = (date.getMonth() + 1).toString().padStart(2, '0');
                        var day = date.getDate().toString().padStart(2, '0');
                        var hours = date.getHours().toString().padStart(2, '0');
                        var minutes = date.getMinutes().toString().padStart(2, '0');
                        var timeStr = year + '/' + month + '/' + day + ' ' + hours + ':' + minutes;
                        var numbers = item.redBalls.join(' ') + ' + ' + item.blueBall;

                        html += '<div class="history-item">' +
                            '<div class="history-balls">' +
                            '<span class="ball red-ball">' + item.redBalls[0] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[1] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[2] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[3] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[4] + '</span>' +
                            '<span class="ball red-ball">' + item.redBalls[5] + '</span>' +
                            '<span class="mx-2 text-xl">+</span>' +
                            '<span class="ball blue-ball">' + item.blueBall + '</span>' +
                            '</div>' +
                            '<div class="history-time">' + timeStr + '</div>' +
                            '<div class="history-actions">' +
                            '<button class="action-btn copy-btn bg-green-600 hover:bg-green-700 text-white" onclick="copyNumbers(\'' + numbers + '\')">' +
                            '<i class="fas fa-copy"></i> 复制' +
                            '</button>' +
                            '<button class="action-btn delete-btn bg-yellow-500 hover:bg-yellow-600 text-white" data-index="' + index + '">' +
                            '<i class="fas fa-trash"></i> 删除' +
                            '</button>' +
                            '</div>' +
                            '</div>';
                    });

                    document.getElementById('historyList').innerHTML = html ||
                        '<div class="empty-history text-center text-gray-500 py-5">暂无历史记录</div>';

                    // 绑定删除事件
                    document.querySelectorAll('.delete-btn').forEach(function (btn) {
                        btn.addEventListener('click', function () {
                            var index = parseInt(this.getAttribute('data-index'));
                            historyData.splice(index, 1);
                            localStorage.setItem('doubleBallHistory', JSON.stringify(historyData));
                            renderHistory();

                            var batchItems = document.querySelectorAll('.batch-item');
                            batchItems.forEach(function (item, idx) {
                                updateCollectButtonState(item, idx);
                            });

                            layer.msg('删除成功', { icon: 1 });
                        });
                    });
                }

                // 检查号码组合是否已存在
                function isDuplicateNumbers(newBalls) {
                    return historyData.some(function (existingBalls) {
                        var redMatch = newBalls.redBalls.length === existingBalls.redBalls.length &&
                            newBalls.redBalls.every(function (ball, index) {
                                return ball === existingBalls.redBalls[index];
                            });
                        var blueMatch = newBalls.blueBall === existingBalls.blueBall;
                        return redMatch && blueMatch;
                    });
                }

                // 更新收藏按钮状态
                function updateCollectButtonState(item, index) {
                    var balls = {
                        redBalls: [
                            item.querySelector('.red-ball:nth-child(1)').textContent,
                            item.querySelector('.red-ball:nth-child(2)').textContent,
                            item.querySelector('.red-ball:nth-child(3)').textContent,
                            item.querySelector('.red-ball:nth-child(4)').textContent,
                            item.querySelector('.red-ball:nth-child(5)').textContent,
                            item.querySelector('.red-ball:nth-child(6)').textContent
                        ],
                        blueBall: item.querySelector('.blue-ball').textContent
                    };

                    var saveBtn = item.querySelector('.save-btn');
                    if (isDuplicateNumbers(balls)) {
                        saveBtn.innerHTML = '<i class="fas fa-check"></i> 已收藏';
                        saveBtn.classList.remove('bg-blue-500', 'hover:bg-blue-600');
                        saveBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                        saveBtn.onclick = null;
                    } else {
                        saveBtn.innerHTML = '<i class="fas fa-star"></i> 收藏';
                        saveBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                        saveBtn.classList.add('bg-blue-500', 'hover:bg-blue-600');
                        saveBtn.onclick = function () { saveSingleSet(index); };
                    }
                }

                // 收藏单组号码
                window.saveSingleSet = function (index) {
                    var batchItems = document.querySelectorAll('.batch-item');
                    if (index >= 0 && index < batchItems.length) {
                        var item = batchItems[index];
                        var balls = {
                            redBalls: [
                                item.querySelector('.red-ball:nth-child(1)').textContent,
                                item.querySelector('.red-ball:nth-child(2)').textContent,
                                item.querySelector('.red-ball:nth-child(3)').textContent,
                                item.querySelector('.red-ball:nth-child(4)').textContent,
                                item.querySelector('.red-ball:nth-child(5)').textContent,
                                item.querySelector('.red-ball:nth-child(6)').textContent
                            ],
                            blueBall: item.querySelector('.blue-ball').textContent,
                            time: new Date().toISOString()
                        };

                        if (isDuplicateNumbers(balls)) {
                            layer.msg('该号码组合已收藏过了', { icon: 2 });
                            return;
                        }

                        historyData.unshift(balls);
                        if (historyData.length > 50) {
                            historyData = historyData.slice(0, 50);
                        }

                        localStorage.setItem('doubleBallHistory', JSON.stringify(historyData));
                        renderHistory();

                        batchItems.forEach(function (batchItem, idx) {
                            updateCollectButtonState(batchItem, idx);
                        });

                        layer.msg('收藏成功', { icon: 1 });
                    }
                };

                // 复制号码
                window.copyNumbers = function (numbers) {
                    copyToClipboard(numbers);
                };

                // 绑定事件
                document.getElementById('generateBtn').addEventListener('click', function () {
                    var results = [];
                    for (var i = 0; i < 5; i++) {
                        results.push(generateBallSet());
                    }
                    renderBatchResults(results);
                    layer.msg('已生成5组号码', { icon: 1 });
                });

                document.getElementById('resetBtn').addEventListener('click', function () {
                    document.getElementById('batchResults').innerHTML = '';
                    layer.msg('已重置', { icon: 1 });
                });

                // 颜色主题切换功能
                function initThemeSelector() {
                    var colorOptions = document.querySelectorAll('.color-option');
                    var savedTheme = localStorage.getItem('doubleBallTheme') || 'blue';

                    document.documentElement.setAttribute('data-theme', savedTheme);
                    updateThemeStyles(savedTheme);

                    colorOptions.forEach(function (option) {
                        option.classList.toggle('ring-2', option.dataset.color === savedTheme);
                        option.classList.toggle('ring-offset-2', option.dataset.color === savedTheme);
                        if (option.dataset.color === savedTheme) {
                            option.classList.add('ring-gray-800');
                        }
                    });

                    colorOptions.forEach(function (option) {
                        option.addEventListener('click', function () {
                            var selectedColor = this.dataset.color;

                            colorOptions.forEach(function (opt) {
                                opt.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-800');
                            });
                            this.classList.add('ring-2', 'ring-offset-2', 'ring-gray-800');

                            document.documentElement.setAttribute('data-theme', selectedColor);
                            updateThemeStyles(selectedColor);

                            localStorage.setItem('doubleBallTheme', selectedColor);

                            layer.msg('主题已切换', { icon: 1, time: 1000 });
                        });
                    });
                }

                function updateThemeStyles(theme) {
                    var colors = {
                        orange: { bg: 'bg-orange-500', text: 'text-white' },
                        blue: { bg: 'bg-blue-500', text: 'text-white' },
                        green: { bg: 'bg-green-500', text: 'text-white' },
                        purple: { bg: 'bg-purple-500', text: 'text-white' },
                        red: { bg: 'bg-red-500', text: 'text-white' },
                        yellow: { bg: 'bg-yellow-500', text: 'text-white' },
                        'contrast-dark': { bg: 'bg-gray-800', text: 'text-white' },
                        'contrast-light': { bg: 'bg-gray-200', text: 'text-gray-800' }
                    };

                    var color = colors[theme] || colors.blue;
                    var header = document.querySelector('header');
                    if (header) {
                        header.className = color.bg + ' ' + color.text + ' py-6 text-center mb-5 shadow-md';
                    }
                }

                // 初始化
                renderHistory();
                initThemeSelector();
            });
        });
    </script>
