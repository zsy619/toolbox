    <script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.8.17/layui.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            layui.use(['layer'], function () {
                var layer = layui.layer;
                var historyData = JSON.parse(localStorage.getItem('pl5History')) || [];

                // 生成排列5号码
                function generatePL5Numbers() {
                    var digits = [];
                    for (var i = 0; i < 5; i++) {
                        digits.push(Math.floor(Math.random() * 10));
                    }
                    return {
                        digits: digits,
                        time: new Date().toISOString()
                    };
                }

                // 复制到剪贴板
                function copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(function () {
                        layer.msg('已复制到剪贴板', { icon: 1 });
                    }, function (err) {
                        layer.msg('复制失败', { icon: 2 });
                        console.error('复制失败:', err);
                    });
                }

                // 渲染生成结果
                function renderBatchResults(results) {
                    var html = '';
                    results.forEach(function (result, index) {
                        var numberStr = result.digits.join('');

                        var isCollected = isDuplicatePL5Numbers(result.digits);
                        var saveButtonHtml = isCollected ?
                            '<button class="action-btn save-btn bg-gray-400 cursor-not-allowed"><i class="fas fa-check"></i> 已收藏</button>' :
                            '<button class="action-btn save-btn bg-blue-500 hover:bg-blue-600 text-white" onclick="collectSet(' + index + ')"><i class="fas fa-star"></i> 收藏</button>';

                        html += '<div class="batch-item">' +
                            '<div class="batch-digits">' +
                            result.digits.map(function (digit) { return '<span class="digit">' + digit + '</span>'; }).join('') +
                            '</div>' +
                            '<div class="batch-actions">' +
                            saveButtonHtml +
                            '<button class="action-btn copy-btn bg-green-600 hover:bg-green-700 text-white" onclick="copyNumbers(\'' + numberStr + '\')">' +
                            '<i class="fas fa-copy"></i> 复制' +
                            '</button>' +
                            '</div>' +
                            '</div>';
                    });
                    document.getElementById('batchResults').innerHTML = html;
                }

                // 渲染历史记录
                function renderHistory() {
                    var html = '';
                    historyData.forEach(function (item, index) {
                        var date = new Date(item.time);
                        var timeStr = date.toLocaleString();
                        var numberStr = item.digits.join('');

                        html += '<div class="history-item">' +
                            '<div class="history-digits">' +
                            item.digits.map(function (digit) { return '<span class="digit">' + digit + '</span>'; }).join('') +
                            '</div>' +
                            '<div class="history-time">' + timeStr + '</div>' +
                            '<div class="history-actions">' +
                            '<button class="action-btn copy-btn bg-green-600 hover:bg-green-700 text-white" onclick="copyNumbers(\'' + numberStr + '\')">' +
                            '<i class="fas fa-copy"></i> 复制' +
                            '</button>' +
                            '<button class="action-btn delete-btn bg-yellow-500 hover:bg-yellow-600 text-white" data-index="' + index + '">' +
                            '<i class="fas fa-trash"></i> 删除' +
                            '</button>' +
                            '</div>' +
                            '</div>';
                    });

                    document.getElementById('historyList').innerHTML = html ||
                        '<div class="empty-history text-center text-gray-500 py-5">暂无历史记录</div>';

                    // 绑定删除事件
                    document.querySelectorAll('.delete-btn').forEach(function (btn) {
                        btn.addEventListener('click', function () {
                            var index = parseInt(this.getAttribute('data-index'));
                            historyData.splice(index, 1);
                            localStorage.setItem('pl5History', JSON.stringify(historyData));
                            renderHistory();

                            var batchItems = document.querySelectorAll('.batch-item');
                            batchItems.forEach(function (item, idx) {
                                updatePL5CollectButtonState(item, idx);
                            });

                            layer.msg('删除成功', { icon: 1 });
                        });
                    });
                }

                // 检查排列5号码组合是否已存在
                function isDuplicatePL5Numbers(newDigits) {
                    return historyData.some(function (existingItem) {
                        return newDigits.length === existingItem.digits.length &&
                            newDigits.every(function (digit, index) {
                                return digit === existingItem.digits[index];
                            });
                    });
                }

                // 收藏指定组号码
                window.collectSet = function (index) {
                    var batchItems = document.querySelectorAll('.batch-item');
                    if (index >= 0 && index < batchItems.length) {
                        var batchItem = batchItems[index];
                        var digits = Array.from(batchItem.querySelectorAll('.digit')).map(function (el) { return parseInt(el.textContent); });

                        if (isDuplicatePL5Numbers(digits)) {
                            layer.msg('该号码组合已收藏过了', { icon: 2 });
                            return;
                        }

                        var pl5Numbers = {
                            digits: digits,
                            time: new Date().toISOString()
                        };

                        historyData.unshift(pl5Numbers);
                        if (historyData.length > 50) {
                            historyData = historyData.slice(0, 50);
                        }

                        localStorage.setItem('pl5History', JSON.stringify(historyData));
                        renderHistory();

                        batchItems.forEach(function (item, idx) {
                            updatePL5CollectButtonState(item, idx);
                        });

                        layer.msg('收藏成功', { icon: 1 });
                    }
                };

                // 更新排列5收藏按钮状态
                function updatePL5CollectButtonState(item, index) {
                    var digits = Array.from(item.querySelectorAll('.digit')).map(function (el) { return parseInt(el.textContent); });
                    var saveBtn = item.querySelector('.save-btn');

                    if (isDuplicatePL5Numbers(digits)) {
                        saveBtn.innerHTML = '<i class="fas fa-check"></i> 已收藏';
                        saveBtn.classList.remove('bg-blue-500', 'hover:bg-blue-600');
                        saveBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                        saveBtn.onclick = null;
                    } else {
                        saveBtn.innerHTML = '<i class="fas fa-star"></i> 收藏';
                        saveBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                        saveBtn.classList.add('bg-blue-500', 'hover:bg-blue-600');
                        saveBtn.onclick = function () { collectSet(index); };
                    }
                }

                // 复制号码
                window.copyNumbers = function (numbers) {
                    copyToClipboard(numbers);
                };

                // 绑定事件
                document.getElementById('generateBtn').addEventListener('click', function () {
                    var results = [];
                    for (var i = 0; i < 5; i++) {
                        results.push(generatePL5Numbers());
                    }
                    renderBatchResults(results);
                    layer.msg('已生成5组排列5号码', { icon: 1 });
                });

                document.getElementById('resetBtn').addEventListener('click', function () {
                    document.getElementById('batchResults').innerHTML = '';
                    layer.msg('已重置', { icon: 1 });
                });

                // 颜色主题切换功能
                function initThemeSelector() {
                    var colorOptions = document.querySelectorAll('.color-option');
                    var savedTheme = localStorage.getItem('pl5Theme') || 'blue';

                    document.documentElement.setAttribute('data-theme', savedTheme);
                    updateThemeStyles(savedTheme);

                    colorOptions.forEach(function (option) {
                        option.classList.toggle('ring-2', option.dataset.color === savedTheme);
                        option.classList.toggle('ring-offset-2', option.dataset.color === savedTheme);
                        if (option.dataset.color === savedTheme) {
                            option.classList.add('ring-gray-800');
                        }
                    });

                    colorOptions.forEach(function (option) {
                        option.addEventListener('click', function () {
                            var selectedColor = this.dataset.color;

                            colorOptions.forEach(function (opt) {
                                opt.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-800');
                            });
                            this.classList.add('ring-2', 'ring-offset-2', 'ring-gray-800');

                            document.documentElement.setAttribute('data-theme', selectedColor);
                            updateThemeStyles(selectedColor);

                            localStorage.setItem('pl5Theme', selectedColor);

                            layer.msg('主题已切换', { icon: 1, time: 1000 });
                        });
                    });
                }

                function updateThemeStyles(theme) {
                    var colors = {
                        orange: { bg: 'bg-orange-500', text: 'text-white' },
                        blue: { bg: 'bg-blue-500', text: 'text-white' },
                        green: { bg: 'bg-green-500', text: 'text-white' },
                        purple: { bg: 'bg-purple-500', text: 'text-white' },
                        red: { bg: 'bg-red-500', text: 'text-white' },
                        yellow: { bg: 'bg-yellow-500', text: 'text-white' },
                        'contrast-dark': { bg: 'bg-gray-800', text: 'text-white' },
                        'contrast-light': { bg: 'bg-gray-200', text: 'text-gray-800' }
                    };

                    var color = colors[theme] || colors.blue;
                    var header = document.querySelector('header');
                    if (header) {
                        header.className = color.bg + ' ' + color.text + ' py-6 text-center mb-5 shadow-md';
                    }
                }

                // 初始化
                renderHistory();
                initThemeSelector();
            });
        });
    </script>
