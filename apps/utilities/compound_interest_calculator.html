                            <th class="px-4 py-3 text-left font-semibold">年末总金额（元）</th>

                    </tbody>

        <footer class="text-center py-6 text-gray-500">

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var ctx = document.getElementById('growthChart').getContext('2d');
            var growthChart;

            initCalculator();

            document.getElementById('btn-fv').addEventListener('click', function () {
                setActiveButton('fv');
            });

            document.getElementById('btn-annuity').addEventListener('click', function () {
                setActiveButton('annuity');
            });

            document.getElementById('btn-rate').addEventListener('click', function () {
                setActiveButton('rate');
            });

            document.getElementById('btn-principal').addEventListener('click', function () {
                setActiveButton('principal');
            });

            document.getElementById('calculate').addEventListener('click', function () {
                calculate();
            });

            document.getElementById('reset').addEventListener('click', function () {
                resetCalculator();
            });

            function setActiveButton(type) {
                document.querySelectorAll('.calc-option').forEach(btn => {
                    btn.classList.remove('active', 'bg-blue-50', 'border-blue-500');
                    btn.classList.add('bg-gray-50', 'border-gray-200');
                });

                var activeBtn = document.getElementById(`btn-${type}`);
                activeBtn.classList.add('active', 'bg-blue-50', 'border-blue-500');
                activeBtn.classList.remove('bg-gray-50', 'border-gray-200');

                if (type === 'annuity') {
                    document.getElementById('principal').placeholder = "请输入初始本金（可选）";
                } else if (type === 'fv') {
                    document.getElementById('principal').placeholder = "请输入本金金额";
                }
            }

            function initCalculator() {
                growthChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array.from({ length: 20 }, (_, i) => `第${i + 1}年`),
                        datasets: [{
                            label: '年末总金额',
                            data: [],
                            borderColor: '#1E9FFF',
                            backgroundColor: 'rgba(30, 159, 255, 0.1)',
                            borderWidth: 3,
                            pointRadius: 4,
                            pointBackgroundColor: '#fff',
                            pointBorderWidth: 2,
                            tension: 0.2,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.7)',
                                titleFont: { size: 14 },
                                bodyFont: { size: 14 },
                                padding: 12,
                                displayColors: false,
                                callbacks: {
                                    label: function (context) {
                                        return '金额: ' + context.parsed.y.toLocaleString() + '元';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(0, 0, 0, 0.05)' },
                                ticks: {
                                    callback: function (value) {
                                        return value.toLocaleString() + '元';
                                    }
                                }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });

                calculate();
            }

            function calculate() {
                var type = document.querySelector('.calc-option.active').getAttribute('data-type');
                var principal = parseFloat(document.getElementById('principal').value) || 0;
                var rate = parseFloat(document.getElementById('rate').value) || 0;
                var annuity = parseFloat(document.getElementById('annuity').value) || 0;
                var years = parseInt(document.getElementById('years').value) || 0;

                if (years <= 0 || years > 100) {
                    layui.layer.msg('计算年限必须在1-100年之间', { icon: 2 });
                    return;
                }

                var summary = '';
                var results = [];
                var totalAmount = 0;

                if (type === 'fv') {
                    if (principal <= 0) {
                        layui.layer.msg('本金必须大于0', { icon: 2 });
                        return;
                    }

                    var amount = principal;
                    for (var i = 1; i <= years; i++) {
                        var startAmount = amount;
                        var interest = startAmount * (rate / 100);
                        var endAmount = startAmount + interest;
                        results.push({
                            year: i,
                            startAmount: startAmount,
                            interest: interest,
                            endAmount: endAmount
                        });
                        amount = endAmount;
                    }
                    totalAmount = amount;
                    summary = `初始本金 <span class="font-bold text-green-600 text-xl">${formatCurrency(principal)} 元</span>，年收益率 <span class="font-bold text-green-600 text-xl">${rate}%</span>，<span class="font-bold text-green-600 text-xl">${years} 年</span>后终值为 <span class="font-bold text-green-600 text-xl">${formatCurrency(totalAmount)} 元</span>`;
                }
                else if (type === 'annuity') {
                    if (annuity <= 0) {
                        layui.layer.msg('年金必须大于0', { icon: 2 });
                        return;
                    }

                    var amount = principal;
                    for (var i = 1; i <= years; i++) {
                        var startAmount = amount;
                        var interest = startAmount * (rate / 100);
                        amount = startAmount + interest + annuity;
                        results.push({
                            year: i,
                            startAmount: startAmount,
                            interest: interest,
                            endAmount: amount
                        });
                    }
                    totalAmount = amount;
                    summary = `初始本金 <span class="font-bold text-green-600 text-xl">${formatCurrency(principal)} 元</span>，每年年金 <span class="font-bold text-green-600 text-xl">${formatCurrency(annuity)} 元</span>，年收益率 <span class="font-bold text-green-600 text-xl">${rate}%</span>，<span class="font-bold text-green-600 text-xl">${years} 年</span>后终值为 <span class="font-bold text-green-600 text-xl">${formatCurrency(totalAmount)} 元</span>`;
                }
                else if (type === 'rate') {
                    if (principal <= 0) {
                        layui.layer.msg('本金必须大于0', { icon: 2 });
                        return;
                    }

                    var targetAmount = parseFloat(prompt("请输入目标终值金额:", (principal * 3).toFixed(2))) || (principal * 3);
                    if (targetAmount <= principal) {
                        layui.layer.msg('目标终值必须大于本金', { icon: 2 });
                        return;
                    }

                    var r = Math.pow(targetAmount / principal, 1 / years) - 1;
                    var calculatedRate = (r * 100).toFixed(2);

                    var amount = principal;
                    for (var i = 1; i <= years; i++) {
                        var startAmount = amount;
                        var interest = startAmount * r;
                        var endAmount = startAmount + interest;
                        results.push({
                            year: i,
                            startAmount: startAmount,
                            interest: interest,
                            endAmount: endAmount
                        });
                        amount = endAmount;
                    }
                    totalAmount = amount;
                    summary = `初始本金 <span class="font-bold text-green-600 text-xl">${formatCurrency(principal)} 元</span>，目标终值 <span class="font-bold text-green-600 text-xl">${formatCurrency(targetAmount)} 元</span>，<span class="font-bold text-green-600 text-xl">${years} 年</span>所需年收益率为 <span class="font-bold text-green-600 text-xl">${calculatedRate}%</span>`;
                }
                else if (type === 'principal') {
                    var targetAmount = parseFloat(prompt("请输入目标终值金额:", (principal * 3).toFixed(2))) || (principal * 3);
                    if (targetAmount <= 0) {
                        layui.layer.msg('目标终值必须大于0', { icon: 2 });
                        return;
                    }

                    var calculatedPrincipal = targetAmount / Math.pow(1 + (rate / 100), years);

                    var amount = calculatedPrincipal;
                    for (var i = 1; i <= years; i++) {
                        var startAmount = amount;
                        var interest = startAmount * (rate / 100);
                        var endAmount = startAmount + interest;
                        results.push({
                            year: i,
                            startAmount: startAmount,
                            interest: interest,
                            endAmount: endAmount
                        });
                        amount = endAmount;
                    }
                    totalAmount = amount;
                    summary = `目标终值 <span class="font-bold text-green-600 text-xl">${formatCurrency(targetAmount)} 元</span>，年收益率 <span class="font-bold text-green-600 text-xl">${rate}%</span>，<span class="font-bold text-green-600 text-xl">${years} 年</span>所需本金为 <span class="font-bold text-green-600 text-xl">${formatCurrency(calculatedPrincipal)} 元</span>`;
                }

                document.querySelector('.result-container .bg-gradient-to-r').innerHTML = `<p>${summary}</p>`;

                updateResultTable(results);
                updateChart(results, years);
            }

            function updateResultTable(results) {
                var tableHtml = '';
                results.forEach((item, index) => {
                    var bgClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                    tableHtml += `
                        <tr class="${bgClass} hover:bg-blue-50 transition-colors">
                            <td class="px-4 py-3 border-b border-gray-100">${item.year}</td>
                            <td class="px-4 py-3 border-b border-gray-100">${formatCurrency(item.startAmount)}</td>
                            <td class="px-4 py-3 border-b border-gray-100">${formatCurrency(item.interest)}</td>
                            <td class="px-4 py-3 border-b border-gray-100 font-bold text-green-600">${formatCurrency(item.endAmount)}</td>
                        </tr>
                    `;
                });
                document.getElementById('result-body').innerHTML = tableHtml;
            }

            function updateChart(results, years) {
                var chartData = results.map(function (item) { return item.endAmount; });
                growthChart.data.datasets[0].data = chartData;
                growthChart.data.labels = Array.from({ length: years }, (_, i) => `第${i + 1}年`);
                growthChart.update();
            }

            function formatCurrency(value) {
                return value.toLocaleString('zh-CN', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            function resetCalculator() {
                document.getElementById('principal').value = '100000';
                document.getElementById('rate').value = '7';
                document.getElementById('annuity').value = '12000';
                document.getElementById('years').value = '20';

                setActiveButton('fv');

                document.getElementById('principal').placeholder = "请输入本金金额";

                document.querySelector('.result-container .bg-gradient-to-r').innerHTML =
                    '<p>初始本金 <span class="font-bold text-green-600 text-xl">100,000 元</span>，年收益率 <span class="font-bold text-green-600 text-xl">7%</span>，<span class="font-bold text-green-600 text-xl">20 年</span>后终值为 <span class="font-bold text-green-600 text-xl">386,968.45 元</span></p>';

                var resultBody = document.getElementById('result-body');
                resultBody.innerHTML = '';

                growthChart.data.datasets[0].data = [];
                growthChart.update();
            }
        });
    </script>
