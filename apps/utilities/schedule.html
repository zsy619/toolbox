<body class="bg-gradient-to-br from-slate-100 to-blue-100 min-h-screen">
    <div style="display:none; visibility:hidden;">
        <img src="https://tools.yy24365.com/assets/images/dev-tools-og.png" alt="wechat-share-icon" width="400" height="400">
    </div>

    <div class="max-w-7xl mx-auto p-5">
        <header class="bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl p-6 mb-6 shadow-lg relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-white/10 to-transparent"></div>
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">任务项管理系统</h1>
                    <p class="text-blue-100 mt-1">支持实时同步、多任务优先级算法的智能调度平台</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="bg-white/20 rounded-lg px-5 py-3 text-center min-w-[200px]">
                        <div class="text-sm text-blue-100">当前时间</div>
                        <div id="currentTime" class="text-xl font-bold tracking-wider">--:--:--</div>
                    </div>
                    <div id="shiftIndicator" class="shift-indicator shift-morning rounded-lg px-4 py-2 flex items-center gap-2 text-sm font-medium">
                        <i class="fas fa-sun"></i>
                        <span>早班进行中</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="bg-white rounded-xl shadow-md p-4 mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex-1 w-full md:max-w-md relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="搜索任务名称、描述或时间..."
                    class="w-full pl-11 pr-4 py-3 rounded-full bg-blue-50 border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all">
            </div>
            <select id="tenantSelect" class="layui-select px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-blue-500 outline-none min-w-[200px]">
                <option value="tenant1">总部办公区</option>
                <option value="tenant2">东区办公点</option>
                <option value="tenant3">西区办公点</option>
            </select>
        </section>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="shift-column bg-white rounded-xl shadow-md overflow-hidden flex flex-col transition-all duration-300 hover:shadow-xl" id="morningColumn">
                <div class="column-header p-5 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-blue-50/50 to-transparent">
                    <div class="column-title text-lg font-semibold flex items-center gap-2">
                        <i class="fas fa-sun text-yellow-500"></i>
                        <span>早班任务 (07:40-15:50)</span>
                    </div>
                    <span id="morningCount" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-medium">5 项任务</span>
                </div>
                <div id="morningTasks" class="task-list p-4 flex-1 min-h-[400px] overflow-y-auto"></div>
            </div>

            <div class="shift-column bg-white rounded-xl shadow-md overflow-hidden flex flex-col transition-all duration-300 hover:shadow-xl" id="middleColumn">
                <div class="column-header p-5 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-cyan-50/50 to-transparent">
                    <div class="column-title text-lg font-semibold flex items-center gap-2">
                        <i class="fas fa-cloud-sun text-cyan-500"></i>
                        <span>中班任务 (15:50-23:00)</span>
                    </div>
                    <span id="middleCount" class="bg-cyan-100 text-cyan-600 px-3 py-1 rounded-full text-sm font-medium">3 项任务</span>
                </div>
                <div id="middleTasks" class="task-list p-4 flex-1 min-h-[400px] overflow-y-auto"></div>
            </div>

            <div class="shift-column bg-white rounded-xl shadow-md overflow-hidden flex flex-col transition-all duration-300 hover:shadow-xl" id="nightColumn">
                <div class="column-header p-5 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-purple-50/50 to-transparent">
                    <div class="column-title text-lg font-semibold flex items-center gap-2">
                        <i class="fas fa-moon text-purple-500"></i>
                        <span>夜班任务 (23:00-07:40)</span>
                    </div>
                    <span id="nightCount" class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-sm font-medium">3 项任务</span>
                </div>
                <div id="nightTasks" class="task-list p-4 flex-1 min-h-[400px] overflow-y-auto"></div>
            </div>
        </main>

        <button id="addTaskBtn" class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:shadow-xl cursor-pointer z-50">
            <i class="fas fa-plus"></i>
        </button>

        <footer class="text-center py-6 text-gray-500">
            <p>任务项管理系统 &copy; 2025 | 专业信息化工作流程解决方案</p>
        </footer>
    </div>

    <div id="taskFormTemplate" class="hidden">
        <form class="layui-form p-6" id="taskForm">
            <input type="hidden" name="id">
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">任务名称</label>
                <div class="layui-input-block">
                    <input type="text" name="title" required lay-verify="required" placeholder="请输入任务名称" autocomplete="off" class="layui-input rounded-lg border-gray-200 focus:border-blue-500">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">任务描述</label>
                <div class="layui-input-block">
                    <textarea name="description" placeholder="请输入任务描述" class="layui-textarea rounded-lg border-gray-200 focus:border-blue-500" rows="3"></textarea>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">任务时间</label>
                <div class="layui-input-block">
                    <input type="text" name="time" id="taskTime" required lay-verify="required" placeholder="请选择时间" autocomplete="off" class="layui-input rounded-lg border-gray-200 focus:border-blue-500">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">班次</label>
                <div class="layui-input-block">
                    <select name="shift" lay-verify="required" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200">
                        <option value="morning">早班</option>
                        <option value="middle">中班</option>
                        <option value="night">夜班</option>
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">优先级</label>
                <div class="layui-input-block">
                    <select name="priority" lay-verify="required" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200">
                        <option value="high">高</option>
                        <option value="medium">中</option>
                        <option value="low">低</option>
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">状态</label>
                <div class="layui-input-block">
                    <select name="status" lay-verify="required" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200">
                        <option value="pending">待处理</option>
                        <option value="inprogress">处理中</option>
                        <option value="completed">已完成</option>
                        <option value="cancelled">已取消</option>
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label font-medium text-gray-600">任务颜色</label>
                <div class="layui-input-block">
                    <input type="color" name="color" value="#3498db" class="w-16 h-10 rounded cursor-pointer">
                </div>
            </div>
        </form>
    </div>

    <script src="../../assets/js/layui.min.js"></script>
    <script>
        const initTasks = [
            { id: 1, title: "整理桌边和检查会议手机", description: "提前10分钟接班，整理工作区域并检查会议手机状态", time: "07:50", shift: "morning", priority: "high", status: "pending", color: "#3498db" },
            { id: 2, title: "检查会议电话", description: "检查两部会议电话是否无异常，监控外围乱停车辆，超过5分钟通知到位", time: "08:00", shift: "morning", priority: "high", status: "inprogress", color: "#2ecc71" },
            { id: 3, title: "检查会议本", description: "检查会议本是否有会议重复情况", time: "08:10", shift: "morning", priority: "medium", status: "pending", color: "#9b59b6" },
            { id: 4, title: "早高峰车辆协调", description: "早高峰车辆多，跟外围协调好交通秩序", time: "08:30", shift: "morning", priority: "medium", status: "pending", color: "#f39c12" },
            { id: 5, title: "交接班准备", description: "提前10分钟做好交接班准备", time: "15:40", shift: "middle", priority: "high", status: "pending", color: "#3498db" },
            { id: 6, title: "打扫卫生和交接班", description: "打扫卫生，与下一班次进行工作交接", time: "15:50", shift: "middle", priority: "high", status: "pending", color: "#2ecc71" },
            { id: 7, title: "重要点位检查", description: "检查重要点位是否存在异常情况", time: "16:00", shift: "middle", priority: "high", status: "pending", color: "#9b59b6" },
            { id: 8, title: "切换电子屏幕", description: "按照要求切换电子屏幕内容", time: "20:00", shift: "middle", priority: "medium", status: "pending", color: "#f39c12" },
            { id: 9, title: "检查会议手机和对讲机", description: "接班后及时查看会议手机、对讲机是否有电，及时充电", time: "23:10", shift: "night", priority: "high", status: "pending", color: "#3498db" },
            { id: 10, title: "监控重要点位", description: "定时抬头看监控重要点位是否存在异常", time: "00:00", shift: "night", priority: "high", status: "pending", color: "#2ecc71" },
            { id: 11, title: "保安巡逻", description: "按时跟保安进行巡逻，确保安全", time: "02:00", shift: "night", priority: "medium", status: "pending", color: "#9b59b6" }
        ];

        document.addEventListener('DOMContentLoaded', function () {
            layui.use(['layer', 'form', 'util', 'laydate'], function () {
                const layer = layui.layer;
                const form = layui.form;
                const util = layui.util;
                const laydate = layui.laydate;

                let tasks = JSON.parse(localStorage.getItem('tasks')) || initTasks;

                function updateTime() {
                    const now = new Date();
                    document.getElementById('currentTime').textContent = util.toDateString(now, "yyyy-MM-dd HH:mm:ss");
                    const hours = now.getHours();
                    const minutes = now.getMinutes();
                    const totalMinutes = hours * 60 + minutes;

                    let shift = "off";
                    let shiftName = "非工作时间";

                    if (totalMinutes >= 460 && totalMinutes < 950) { shift = "morning"; shiftName = "早班进行中"; }
                    else if (totalMinutes >= 950 && totalMinutes < 1380) { shift = "middle"; shiftName = "中班进行中"; }
                    else if (totalMinutes >= 1380 || totalMinutes < 460) { shift = "night"; shiftName = "夜班进行中"; }

                    const shiftIndicator = document.getElementById('shiftIndicator');
                    shiftIndicator.className = `shift-indicator shift-${shift} rounded-lg px-4 py-2 flex items-center gap-2 text-sm font-medium`;

                    const icon = shiftIndicator.querySelector('i');
                    if (shift === "morning") icon.className = "fas fa-sun";
                    else if (shift === "middle") icon.className = "fas fa-cloud-sun";
                    else if (shift === "night") icon.className = "fas fa-moon";
                    else icon.className = "fas fa-clock";
                    shiftIndicator.querySelector('span').textContent = shiftName;

                    document.querySelectorAll('.shift-column').forEach(column => column.classList.remove('ring-2', 'ring-blue-400', 'scale-[1.02]'));
                    if (shift !== "off") {
                        const activeColumn = document.getElementById(shift + 'Column');
                        activeColumn.classList.add('ring-2', 'ring-blue-400', 'scale-[1.02]');
                    }

                    if (now.getSeconds() === 0) checkReminders(now);
                }

                function checkReminders(now) {
                    const hours = now.getHours().toString().padStart(2, '0');
                    const minutes = now.getMinutes().toString().padStart(2, '0');
                    const currentTime = `${hours}:${minutes}`;
                    tasks.forEach(task => {
                        if (task.time === currentTime && task.status === 'pending') {
                            layer.msg(`任务提醒：${task.title}`, { icon: 1, time: 10000, btn: ['知道了'] });
                        }
                    });
                }

                function renderTasks() {
                    document.getElementById('morningTasks').innerHTML = '';
                    document.getElementById('middleTasks').innerHTML = '';
                    document.getElementById('nightTasks').innerHTML = '';

                    const morningTasks = tasks.filter(task => task.shift === 'morning');
                    const middleTasks = tasks.filter(task => task.shift === 'middle');
                    const nightTasks = tasks.filter(task => task.shift === 'night');

                    document.getElementById('morningCount').textContent = `${morningTasks.length} 项任务`;
                    document.getElementById('middleCount').textContent = `${middleTasks.length} 项任务`;
                    document.getElementById('nightCount').textContent = `${nightTasks.length} 项任务`;

                    if (morningTasks.length > 0) morningTasks.forEach(task => renderTask(task, 'morningTasks'));
                    else document.getElementById('morningTasks').innerHTML = emptyStateHTML();
                    if (middleTasks.length > 0) middleTasks.forEach(task => renderTask(task, 'middleTasks'));
                    else document.getElementById('middleTasks').innerHTML = emptyStateHTML();
                    if (nightTasks.length > 0) nightTasks.forEach(task => renderTask(task, 'nightTasks'));
                    else document.getElementById('nightTasks').innerHTML = emptyStateHTML();

                    form.render();
                }

                function emptyStateHTML() {
                    return `
                        <div class="text-center py-12 text-gray-400">
                            <i class="fas fa-tasks text-5xl mb-4 opacity-30"></i>
                            <div class="text-lg mb-2">暂无任务</div>
                            <div class="text-sm">点击右下角按钮添加新任务</div>
                        </div>`;
                }

                function renderTask(task, containerId) {
                    const priorityColors = { high: 'border-l-red-500', medium: 'border-l-yellow-500', low: 'border-l-green-500' };
                    const priorityText = { high: '高', medium: '中', low: '低' };
                    const statusColors = { pending: 'bg-yellow-100 text-yellow-700', inprogress: 'bg-blue-100 text-blue-700', completed: 'bg-green-100 text-green-700', cancelled: 'bg-red-100 text-red-700' };
                    const statusText = { pending: '待处理', inprogress: '处理中', completed: '已完成', cancelled: '已取消' };
                    const shiftText = { morning: '早班', middle: '中班', night: '夜班' };

                    const taskHtml = `
                        <div class="task-item bg-white rounded-lg shadow-sm p-4 mb-3 border-l-4 ${priorityColors[task.priority]} hover:shadow-md cursor-pointer relative" data-id="${task.id}" style="border-left-color: ${task.color}">
                            <div class="task-time bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-medium inline-block mb-3">${task.time}</div>
                            <div class="task-title font-semibold text-gray-800 mb-2 truncate">${task.title}</div>
                            <div class="task-description text-gray-500 text-sm mb-3 line-clamp-2">${task.description}</div>
                            <div class="flex flex-wrap gap-2">
                                <span class="task-tag px-3 py-1 rounded-full text-xs font-medium ${statusColors[task.status]} cursor-pointer hover:opacity-80">${statusText[task.status]}</span>
                                <span class="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-300">优先级: ${priorityText[task.priority]}</span>
                                <span class="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600">${shiftText[task.shift]}</span>
                            </div>
                            <div class="task-actions absolute top-3 right-3 flex gap-2 opacity-0 hover:opacity-100 transition-opacity">
                                <button class="edit-btn w-7 h-7 rounded-full bg-white shadow flex items-center justify-center text-blue-500 border border-blue-200 hover:bg-blue-50">
                                    <i class="fas fa-edit text-xs"></i>
                                </button>
                                <button class="delete-btn w-7 h-7 rounded-full bg-white shadow flex items-center justify-center text-red-500 border border-red-200 hover:bg-red-50">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                                <button class="color-picker-btn w-7 h-7 rounded-full bg-white shadow flex items-center justify-center text-purple-500 border border-purple-200 hover:bg-purple-50">
                                    <i class="fas fa-palette text-xs"></i>
                                </button>
                            </div>
                        </div>`;
                    document.getElementById(containerId).innerHTML += taskHtml;
                }

                function saveTasks() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

                function initTimePicker() {
                    laydate.render({ elem: '#taskTime', type: 'time', format: 'HH:mm', theme: '#3498db' });
                }

                document.getElementById('addTaskBtn').addEventListener('click', function () {
                    form.val('taskForm', { id: '', title: '', description: '', time: '', shift: 'morning', priority: 'high', status: 'pending', color: '#3498db' });
                    const index = layer.open({
                        type: 1, title: '<i class="fas fa-plus mr-2"></i>添加新任务', area: ['600px', 'auto'],
                        content: document.getElementById('taskFormTemplate').innerHTML,
                        btn: ['保存任务', '重置'], btnAlign: 'c',
                        success: function () { initTimePicker(); form.render(); },
                        yes: function (index) { $('#taskForm').find('button[lay-submit]').click(); return false; },
                        btn2: function () { $('#taskForm')[0].reset(); form.render(); return false; }
                    });
                });

                document.addEventListener('click', function (e) {
                    if (e.target.closest('.task-tag')) {
                        const taskItem = e.target.closest('.task-item');
                        if (taskItem) {
                            const taskId = taskItem.dataset.id;
                            const task = tasks.find(t => t.id == taskId);
                            if (task) {
                                const statusOrder = ['pending', 'inprogress', 'completed', 'cancelled'];
                                task.status = statusOrder[(statusOrder.indexOf(task.status) + 1) % statusOrder.length];
                                saveTasks(); renderTasks();
                                layer.msg(`状态已更新为：${['待处理', '处理中', '已完成', '已取消'][statusOrder.indexOf(task.status)]}`, { icon: 1, time: 1500 });
                            }
                        }
                    }

                    if (e.target.closest('.edit-btn')) {
                        const taskItem = e.target.closest('.task-item');
                        if (taskItem) {
                            const task = tasks.find(t => t.id == taskItem.dataset.id);
                            if (task) {
                                form.val('taskForm', task);
                                const index = layer.open({
                                    type: 1, title: `<i class="fas fa-edit mr-2"></i>编辑任务: ${task.title}`, area: ['600px', 'auto'],
                                    content: document.getElementById('taskFormTemplate').innerHTML,
                                    btn: ['保存任务', '重置'], btnAlign: 'c',
                                    success: function () { initTimePicker(); form.render(); },
                                    yes: function (index) { $('#taskForm').find('button[lay-submit]').click(); return false; },
                                    btn2: function () { form.val('taskForm', task); form.render(); return false; }
                                });
                            }
                        }
                    }

                    if (e.target.closest('.delete-btn')) {
                        const taskItem = e.target.closest('.task-item');
                        if (taskItem) {
                            layer.confirm('确定要删除这个任务吗？', { title: '删除确认', icon: 3, btn: ['确定删除', '取消'] }, function (index) {
                                tasks = tasks.filter(t => t.id != taskItem.dataset.id);
                                saveTasks(); renderTasks(); layer.close(index);
                                layer.msg('任务已删除', { icon: 1, time: 1500 });
                            });
                        }
                    }

                    if (e.target.closest('.color-picker-btn')) {
                        const taskItem = e.target.closest('.task-item');
                        if (taskItem) {
                            const task = tasks.find(t => t.id == taskItem.dataset.id);
                            if (task) {
                                const colors = ['#3498db', '#2ecc71', '#9b59b6', '#f39c12', '#e74c3c', '#1abc9c', '#34495e', '#7f8c8d'];
                                const colorPalette = document.createElement('div');
                                colorPalette.className = 'color-palette grid grid-cols-4 gap-2 p-3 bg-white rounded-lg shadow-lg';
                                colorPalette.style.cssText = 'position:absolute;top:40px;right:0;z-index:10;';
                                colors.forEach(c => {
                                    const opt = document.createElement('div');
                                    opt.className = 'w-6 h-6 rounded-full cursor-pointer hover:scale-125 transition-transform';
                                    opt.style.background = c;
                                    opt.addEventListener('click', () => { task.color = c; saveTasks(); renderTasks(); colorPalette.remove(); });
                                    colorPalette.appendChild(opt);
                                });
                                taskItem.appendChild(colorPalette);
                                colorPalette.style.display = 'grid';
                                setTimeout(() => {
                                    document.addEventListener('click', function closePalette(e) {
                                        if (!colorPalette.contains(e.target) && !e.target.closest('.color-picker-btn')) {
                                            colorPalette.remove();
                                            document.removeEventListener('click', closePalette);
                                        }
                                    });
                                }, 0);
                            }
                        }
                    }
                });

                form.on('submit(submitTask)', function (data) {
                    const taskData = data.field;
                    taskData.id = taskData.id ? parseInt(taskData.id) : null;
                    if (taskData.id) {
                        const idx = tasks.findIndex(t => t.id === taskData.id);
                        if (idx !== -1) tasks[idx] = { ...tasks[idx], ...taskData };
                    } else {
                        taskData.id = Date.now();
                        tasks.push(taskData);
                    }
                    saveTasks(); renderTasks(); layer.close(layer.index);
                    layer.msg('任务已保存', { icon: 1, time: 1500 });
                    return false;
                });

                document.getElementById('searchInput').addEventListener('input', function () {
                    const keyword = this.value.toLowerCase();
                    document.querySelectorAll('.task-item').forEach(item => {
                        item.style.display = item.textContent.toLowerCase().includes(keyword) ? 'block' : 'none';
                    });
                });

                document.getElementById('tenantSelect').addEventListener('change', function () {
                    layer.msg(`已切换到: ${this.options[this.selectedIndex].text}`, { icon: 1, time: 1500 });
                });

                updateTime();
                setInterval(updateTime, 1000);
                renderTasks();
                form.render();
            });
        });
    </script>
