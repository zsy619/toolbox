    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // DOM 元素引用
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const clearBtn = document.getElementById('clearBtn');
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            const messagesContainer = document.getElementById('messages');
            const statusText = document.getElementById('status-text');
            const statusIndicator = document.getElementById('status-indicator');
            const statusContainer = document.getElementById('status-container');
            const predefinedMsgButtons = document.querySelectorAll('.predefined-msg');
            const sentCountEl = document.getElementById('sentCount');
            const receivedCountEl = document.getElementById('receivedCount');
            const messagesCountEl = document.getElementById('messagesCount');
            const connectionTimeEl = document.getElementById('connectionTime');
            const urlInput = document.getElementById('urlInput');
            const urlSetBtn = document.getElementById('urlSetBtn');

            // 状态变量
            let websocket = null;
            let sentCount = 0;
            let receivedCount = 0;
            let connectionStartTime = null;
            let connectionTimer = null;
            let currentUrl = 'ws://localhost:6060/online/heartbeat';

            // 更新连接状态显示
            function updateStatus(connected) {
                if (connected) {
                    statusText.textContent = '已连接';
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-emerald-500 animate-pulse-slow';
                    statusContainer.classList.remove('bg-gray-700/50');
                    statusContainer.classList.add('bg-emerald-700/50');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    statusText.textContent = '未连接';
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-red-500 animate-pulse-slow';
                    statusContainer.classList.remove('bg-emerald-700/50');
                    statusContainer.classList.add('bg-gray-700/50');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    sendBtn.disabled = true;
                }
            }

            // 添加消息到消息容器
            function addMessage(content, type = 'system', sender = '系统') {
                const messageEl = document.createElement('div');
                messageEl.classList.add('message', type, 'animate-fadeIn', 'rounded-xl', 'p-4');

                let bgColor, borderColor, alignClass, textColor;

                switch(type) {
                    case 'received':
                        bgColor = 'bg-blue-50';
                        borderColor = 'border-l-4 border-blue-500';
                        alignClass = 'self-start';
                        textColor = 'text-blue-800';
                        break;
                    case 'sent':
                        bgColor = 'bg-green-50';
                        borderColor = 'border-l-4 border-green-500';
                        alignClass = 'self-end';
                        textColor = 'text-green-800';
                        break;
                    case 'error':
                        bgColor = 'bg-red-50';
                        borderColor = 'border-l-4 border-red-500';
                        alignClass = 'self-center';
                        textColor = 'text-red-800';
                        break;
                    default: // system
                        bgColor = 'bg-amber-50';
                        borderColor = 'border-l-4 border-amber-500';
                        alignClass = 'self-center';
                        textColor = 'text-amber-800';
                }

                messageEl.classList.add(bgColor, borderColor, alignClass);

                if (type === 'system') {
                    messageEl.classList.add('max-w-[70%]', 'mx-auto');
                } else {
                    messageEl.classList.add('max-w-[85%]');
                }

                const now = new Date();
                const timestamp = now.toLocaleTimeString();

                let icon, senderLabel;
                switch(type) {
                    case 'received':
                        icon = '<i class="fas fa-server text-blue-500"></i>';
                        senderLabel = sender;
                        break;
                    case 'sent':
                        icon = '<i class="fas fa-user text-green-500"></i>';
                        senderLabel = sender;
                        break;
                    case 'error':
                        icon = '<i class="fas fa-exclamation-circle text-red-500"></i>';
                        senderLabel = '错误';
                        break;
                    default:
                        icon = '<i class="fas fa-info-circle text-amber-600"></i>';
                        senderLabel = '系统消息';
                }

                // 检查是否是 JSON
                let contentHtml;
                try {
                    const parsed = JSON.parse(content);
                    contentHtml = `<div class="json-content">${JSON.stringify(parsed, null, 2)}</div>`;
                } catch (e) {
                    contentHtml = `<div class="whitespace-pre-wrap">${content}</div>`;
                }

                messageEl.innerHTML = `
                    <div class="flex items-center gap-2 mb-2 text-xs ${textColor}">
                        ${icon}
                        <span class="font-semibold">${senderLabel}</span>
                        <span class="ml-auto">${timestamp}</span>
                    </div>
                    <div class="text-sm ${textColor}">
                        ${contentHtml}
                    </div>
                `;

                messagesContainer.appendChild(messageEl);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                // 更新消息计数
                const totalMessages = messagesContainer.children.length;
                messagesCountEl.textContent = `(${totalMessages} 条消息)`;
            }

            // 更新连接时间
            function updateConnectionTime() {
                if (connectionStartTime) {
                    const now = new Date();
                    const elapsed = Math.floor((now - connectionStartTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    connectionTimeEl.textContent = `${minutes}分${seconds}秒`;
                }
            }

            // 设置 URL
            function setUrl() {
                const newUrl = urlInput.value.trim();
                if (newUrl) {
                    if (newUrl.startsWith('ws://') || newUrl.startsWith('wss://')) {
                        currentUrl = newUrl;
                        addMessage(`已设置 URL: ${currentUrl}`, 'system');

                        if (websocket && websocket.readyState === WebSocket.OPEN) {
                            disconnect();
                            addMessage('URL 已更改，请重新连接', 'system');
                        }
                    } else {
                        addMessage('URL 必须以 ws:// 或 wss:// 开头', 'error');
                    }
                } else {
                    addMessage('请输入有效的 URL', 'error');
                }
            }

            // 连接到 WebSocket
            function connect() {
                try {
                    addMessage('正在连接到: ' + currentUrl, 'system');
                    websocket = new WebSocket(currentUrl);

                    websocket.onopen = function () {
                        addMessage('成功连接到: ' + currentUrl, 'system');
                        updateStatus(true);

                        connectionStartTime = new Date();
                        connectionTimer = setInterval(updateConnectionTime, 1000);
                    };

                    websocket.onclose = function () {
                        addMessage('连接已关闭', 'system');
                        updateStatus(false);

                        if (connectionTimer) {
                            clearInterval(connectionTimer);
                            connectionTimer = null;
                        }
                    };

                    websocket.onerror = function (error) {
                        addMessage('连接错误: ' + JSON.stringify(error), 'error');
                        updateStatus(false);
                    };

                    websocket.onmessage = function (event) {
                        receivedCount++;
                        receivedCountEl.textContent = receivedCount;
                        addMessage(event.data, 'received', '服务器');
                    };

                } catch (error) {
                    addMessage('连接异常: ' + error.message, 'error');
                    updateStatus(false);
                }
            }

            // 断开 WebSocket 连接
            function disconnect() {
                if (websocket) {
                    websocket.close();
                    websocket = null;
                    addMessage('已断开连接', 'system');

                    if (connectionTimer) {
                        clearInterval(connectionTimer);
                        connectionTimer = null;
                    }
                }
            }

            // 发送消息
            function sendMessage() {
                const message = messageInput.value.trim();
                if (message && websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(message);
                    sentCount++;
                    sentCountEl.textContent = sentCount;
                    addMessage(message, 'sent', '我');
                    messageInput.value = '';
                }
            }

            // 事件监听
            connectBtn.addEventListener('click', connect);
            disconnectBtn.addEventListener('click', disconnect);

            clearBtn.addEventListener('click', function () {
                messagesContainer.innerHTML = '';
                addMessage('消息已清除', 'system');
            });

            sendBtn.addEventListener('click', sendMessage);

            messageInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            predefinedMsgButtons.forEach(button => {
                button.addEventListener('click', function () {
                    messageInput.value = this.dataset.msg;
                    messageInput.focus();
                });
            });

            urlSetBtn.addEventListener('click', setUrl);
            urlInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    setUrl();
                }
            });

            // 初始状态
            updateStatus(false);

            // 添加使用提示
            addMessage('提示: 使用 Ctrl+Enter 快速发送消息', 'system');
            addMessage('提示: 点击预设消息可以快速填充消息框', 'system');
        });
    </script>
