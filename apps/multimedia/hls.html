    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 获取DOM元素
            const video = document.getElementById('video-player');
            const videoUrlInput = document.getElementById('video-url');
            const playBtn = document.getElementById('play-btn');
            const startPlayBtn = document.getElementById('start-play');
            const pausePlayBtn = document.getElementById('pause-play');
            const toggleMuteBtn = document.getElementById('toggle-mute');
            const fullscreenBtn = document.getElementById('fullscreen');
            const playerStatus = document.getElementById('player-status');
            const statusDot = document.getElementById('status-dot');
            const currentUrl = document.getElementById('current-url');
            const addFavoriteBtn = document.getElementById('add-favorite');
            const favoriteTitleInput = document.getElementById('favorite-title');
            const favoritesContainer = document.getElementById('favorites-container');
            const speedSelect = document.getElementById('playback-speed');
            const speedIndicator = document.getElementById('speed-indicator');

            let hls = null;
            let sortable = null;
            let currentPlaybackRate = 1.0;

            // 初始化HLS播放器
            function initPlayer(url) {
                if (hls) {
                    hls.destroy();
                }

                currentUrl.textContent = url;

                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.playbackRate = currentPlaybackRate;
                        speedIndicator.textContent = currentPlaybackRate.toFixed(1) + 'x';
                        updateStatus('已加载视频，准备播放');
                        video.play().catch(e => {
                            updateStatus('自动播放被阻止，请手动点击播放');
                        });
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', function () {
                        video.playbackRate = currentPlaybackRate;
                        speedIndicator.textContent = currentPlaybackRate.toFixed(1) + 'x';
                        updateStatus('已加载视频，准备播放');
                        video.play().catch(e => {
                            updateStatus('自动播放被阻止，请手动点击播放');
                        });
                    });
                } else {
                    alert('您的浏览器不支持HLS播放');
                }
            }

            // 更新播放状态
            function updateStatus(text) {
                playerStatus.textContent = text;
                if (text.includes('播放中')) {
                    statusDot.className = 'w-3 h-3 rounded-full bg-green-400 animate-pulse-slow';
                } else if (text.includes('暂停') || text.includes('等待')) {
                    statusDot.className = 'w-3 h-3 rounded-full bg-yellow-400';
                } else {
                    statusDot.className = 'w-3 h-3 rounded-full bg-gray-400';
                }
            }

            // 播放按钮事件
            playBtn.addEventListener('click', function () {
                const url = videoUrlInput.value.trim();
                if (url) {
                    updateStatus('正在加载视频...');
                    initPlayer(url);
                } else {
                    alert('请输入有效的视频地址');
                }
            });

            // 开始播放
            startPlayBtn.addEventListener('click', function () {
                if (video.src) {
                    video.play();
                    updateStatus('播放中... (' + currentPlaybackRate.toFixed(1) + 'x)');
                } else {
                    alert('请先加载视频');
                }
            });

            // 暂停播放
            pausePlayBtn.addEventListener('click', function () {
                video.pause();
                updateStatus('已暂停');
            });

            // 静音切换
            toggleMuteBtn.addEventListener('click', function () {
                video.muted = !video.muted;
                if (video.muted) {
                    toggleMuteBtn.innerHTML = '<i class="fas fa-volume-mute"></i><span>取消静音</span>';
                    updateStatus('已静音');
                } else {
                    toggleMuteBtn.innerHTML = '<i class="fas fa-volume-up"></i><span>静音</span>';
                    updateStatus('播放中... (' + currentPlaybackRate.toFixed(1) + 'x)');
                }
            });

            // 全屏模式
            fullscreenBtn.addEventListener('click', function () {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.mozRequestFullScreen) {
                    video.mozRequestFullScreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                } else if (video.msRequestFullscreen) {
                    video.msRequestFullscreen();
                }
            });

            // 倍速控制
            speedSelect.addEventListener('change', function () {
                const speed = parseFloat(this.value);
                currentPlaybackRate = speed;
                video.playbackRate = speed;
                speedIndicator.textContent = speed.toFixed(1) + 'x';
                if (!video.paused) {
                    updateStatus('播放中... (' + speed.toFixed(1) + 'x)');
                }
            });

            // 视频事件监听
            video.addEventListener('play', function () {
                updateStatus('播放中... (' + currentPlaybackRate.toFixed(1) + 'x)');
            });

            video.addEventListener('pause', function () {
                updateStatus('已暂停');
            });

            video.addEventListener('ended', function () {
                updateStatus('播放结束');
            });

            video.addEventListener('error', function () {
                updateStatus('播放出错，请检查视频地址');
            });

            // 加载收藏列表
            function loadFavorites() {
                favoritesContainer.innerHTML = '';
                const favorites = JSON.parse(localStorage.getItem('videoFavorites')) || [];

                if (favorites.length === 0) {
                    favoritesContainer.innerHTML = `
                        <div class="text-center py-12 text-gray-400">
                            <i class="fas fa-star text-5xl mb-4 opacity-30"></i>
                            <p class="text-sm">暂无收藏内容</p>
                        </div>
                    `;
                    initSortable();
                    return;
                }

                favorites.forEach((fav, index) => {
                    const item = document.createElement('div');
                    item.className = 'favorite-item bg-white rounded-xl p-4 shadow-sm border border-gray-200 hover:shadow-md hover:border-blue-400 transition-all cursor-move relative group';
                    item.dataset.index = index;
                    item.innerHTML = `
                        <div class="drag-handle absolute left-2 top-1/2 -translate-y-1/2 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity cursor-move">
                            <i class="fas fa-grip-lines"></i>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                                <i class="fas fa-film text-blue-600"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-medium text-gray-800 truncate">${fav.title}</div>
                                <div class="text-xs text-gray-500 truncate">${fav.url}</div>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="play-fav flex-1 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg transition-all" data-url="${fav.url}">
                                <i class="fas fa-play mr-1"></i>播放
                            </button>
                            <button class="download-fav px-3 py-2 bg-green-600 hover:bg-green-700 text-white text-xs font-semibold rounded-lg transition-all" data-url="${fav.url}">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="delete-fav px-3 py-2 bg-red-600 hover:bg-red-700 text-white text-xs font-semibold rounded-lg transition-all" data-index="${index}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                    favoritesContainer.appendChild(item);
                });

                // 添加事件监听
                document.querySelectorAll('.play-fav').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const url = this.getAttribute('data-url');
                        videoUrlInput.value = url;
                        updateStatus('正在加载收藏的视频...');
                        initPlayer(url);
                    });
                });

                document.querySelectorAll('.download-fav').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const url = this.getAttribute('data-url');
                        downloadVideo(url);
                    });
                });

                document.querySelectorAll('.delete-fav').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const index = parseInt(this.getAttribute('data-index'));
                        const favorites = JSON.parse(localStorage.getItem('videoFavorites')) || [];
                        favorites.splice(index, 1);
                        localStorage.setItem('videoFavorites', JSON.stringify(favorites));
                        loadFavorites();
                        alert('已删除收藏');
                    });
                });

                initSortable();
            }

            // 下载视频函数
            function downloadVideo(url) {
                if (url) {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = url.split('/').pop() || 'video_stream';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    alert('已开始下载视频');
                } else {
                    alert('没有可下载的视频地址');
                }
            }

            // 初始化拖拽排序功能
            function initSortable() {
                if (sortable) {
                    sortable.destroy();
                }

                sortable = new Sortable(favoritesContainer, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    handle: '.drag-handle',
                    onEnd: function (evt) {
                        const favorites = JSON.parse(localStorage.getItem('videoFavorites')) || [];
                        const newIndex = evt.newIndex;
                        const oldIndex = evt.oldIndex;

                        if (newIndex >= favorites.length) {
                            var k = newIndex - favorites.length + 1;
                            while (k--) {
                                favorites.push(undefined);
                            }
                        }
                        favorites.splice(newIndex, 0, favorites.splice(oldIndex, 1)[0]);

                        localStorage.setItem('videoFavorites', JSON.stringify(favorites));
                    }
                });
            }

            // 添加收藏
            addFavoriteBtn.addEventListener('click', function () {
                const url = videoUrlInput.value.trim();
                const title = favoriteTitleInput.value.trim();

                if (!url) {
                    alert('请先输入视频地址');
                    return;
                }

                if (!title) {
                    alert('请输入收藏名称');
                    return;
                }

                if (!url.startsWith('http')) {
                    alert('请输入有效的视频地址');
                    return;
                }

                const favorites = JSON.parse(localStorage.getItem('videoFavorites')) || [];

                if (favorites.some(fav => fav.url === url)) {
                    alert('该视频已在收藏列表中');
                    return;
                }

                favorites.push({ title, url });
                localStorage.setItem('videoFavorites', JSON.stringify(favorites));
                favoriteTitleInput.value = '';
                loadFavorites();
                alert('已添加到收藏');
            });

            // 初始化页面
            loadFavorites();
            updateStatus('等待播放');

            // 设置默认视频
            setTimeout(() => {
                if (videoUrlInput.value) {
                    updateStatus('正在加载默认视频...');
                    initPlayer(videoUrlInput.value);
                }
            }, 1000);

            // 移动端触摸事件优化
            if ('ontouchstart' in window) {
                const buttons = document.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.addEventListener('touchstart', function () {
                        this.classList.add('scale-95');
                    });
                    btn.addEventListener('touchend', function () {
                        this.classList.remove('scale-95');
                    });
                });
            }
        });
    </script>
