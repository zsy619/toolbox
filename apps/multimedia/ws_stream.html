    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // DOM 元素引用
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const clearBtn = document.getElementById('clearBtn');
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            const dialogMessages = document.getElementById('dialogMessages');
            const statusText = document.getElementById('status-text');
            const statusIndicator = document.getElementById('status-indicator');
            const statusContainer = document.getElementById('status-container');
            const predefinedMsgButtons = document.querySelectorAll('.predefined-msg');
            const sentCountEl = document.getElementById('sentCount');
            const receivedCountEl = document.getElementById('receivedCount');
            const messagesCountEl = document.getElementById('messagesCount');
            const connectionTimeEl = document.getElementById('connectionTime');
            const urlInput = document.getElementById('urlInput');
            const urlSetBtn = document.getElementById('urlSetBtn');
            const toggleStreamBtn = document.getElementById('toggleStreamBtn');
            const streamStatusEl = document.getElementById('streamStatus');

            // 状态变量
            let websocket = null;
            let sentCount = 0;
            let receivedCount = 0;
            let connectionStartTime = null;
            let connectionTimer = null;
            let currentUrl = 'ws://localhost:6060/online/heartbeat';
            let streamEnabled = true;
            let currentStreamMessage = null;
            let streamTimeout = null;

            // 更新连接状态显示
            function updateStatus(connected) {
                if (connected) {
                    statusText.textContent = '已连接';
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-green-500 animate-pulse-slow';
                    statusContainer.classList.remove('bg-gray-700/50');
                    statusContainer.classList.add('bg-green-700/50');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    statusText.textContent = '未连接';
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-red-500 animate-pulse-slow';
                    statusContainer.classList.remove('bg-green-700/50');
                    statusContainer.classList.add('bg-gray-700/50');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    sendBtn.disabled = true;
                }
            }

            // 添加消息到对话框
            function addMessage(content, type = 'system', sender = '系统') {
                const messageEl = document.createElement('div');
                messageEl.classList.add('message', `message-${type}`, 'animate-fadeIn', 'rounded-xl', 'p-4', 'max-w-[80%]');

                // 根据类型设置样式
                switch(type) {
                    case 'user':
                        messageEl.classList.add('bg-blue-50', 'border-l-4', 'border-blue-500', 'ml-auto', 'mr-[5%]');
                        break;
                    case 'server':
                        messageEl.classList.add('bg-green-50', 'border-l-4', 'border-green-500');
                        break;
                    case 'system':
                        messageEl.classList.add('bg-amber-50', 'border-l-4', 'border-amber-500', 'mx-auto', 'text-center', 'max-w-[90%]');
                        break;
                    case 'error':
                        messageEl.classList.add('bg-red-50', 'border-l-4', 'border-red-500', 'mx-auto', 'text-center', 'max-w-[90%]');
                        break;
                }

                const now = new Date();
                const timestamp = now.toLocaleTimeString();

                messageEl.innerHTML = `
                    <div class="flex justify-between items-center mb-2 text-xs text-gray-500">
                        <span class="font-semibold">${sender}</span>
                        <span>${timestamp}</span>
                    </div>
                    <div class="message-content text-sm leading-relaxed ${type === 'error' ? 'text-red-800' : 'text-gray-700'}">
                        ${formatContent(content, type)}
                    </div>
                    <div class="message-actions mt-2 flex justify-end gap-2 opacity-0 hover:opacity-100 transition-opacity">
                        <button class="message-action-btn px-3 py-1 bg-white hover:bg-gray-100 rounded text-xs text-gray-600 transition-colors" onclick="copyMessage(this)">
                            <i class="fas fa-copy mr-1"></i>复制
                        </button>
                    </div>
                `;

                dialogMessages.appendChild(messageEl);
                dialogMessages.scrollTop = dialogMessages.scrollHeight;

                // 更新消息计数
                const totalMessages = dialogMessages.children.length;
                messagesCountEl.textContent = `(${totalMessages} 条消息)`;

                return messageEl;
            }

            // 格式化消息内容
            function formatContent(content, type) {
                if (type === 'error') {
                    return `<div class="text-red-800 font-medium">${content}</div>`;
                }

                try {
                    const parsed = JSON.parse(content);
                    return `<div class="json-content">${JSON.stringify(parsed, null, 2)}</div>`;
                } catch (e) {
                    return `<div class="whitespace-pre-wrap">${content}</div>`;
                }
            }

            // 开始流式消息显示
            function startStreamMessage(sender = '服务器') {
                if (currentStreamMessage) {
                    completeStreamMessage();
                }

                const messageEl = document.createElement('div');
                messageEl.classList.add('message', 'message-server', 'bg-green-50', 'border-l-4', 'border-green-500', 'rounded-xl', 'p-4', 'max-w-[80%]', 'animate-fadeIn');

                const now = new Date();
                const timestamp = now.toLocaleTimeString();

                messageEl.innerHTML = `
                    <div class="flex justify-between items-center mb-2 text-xs text-gray-500">
                        <span class="font-semibold">${sender}</span>
                        <span>${timestamp}</span>
                    </div>
                    <div class="message-content text-sm leading-relaxed text-gray-700">
                        <div class="typing-indicator flex gap-1 items-center">
                            <span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span>
                            <span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span>
                            <span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span>
                        </div>
                    </div>
                `;

                dialogMessages.appendChild(messageEl);
                dialogMessages.scrollTop = dialogMessages.scrollHeight;

                currentStreamMessage = {
                    element: messageEl,
                    content: '',
                    complete: false
                };

                return currentStreamMessage;
            }

            // 追加流式内容
            function appendStreamContent(content, isComplete = false) {
                if (!currentStreamMessage) {
                    startStreamMessage();
                }

                if (streamTimeout) {
                    clearTimeout(streamTimeout);
                }

                currentStreamMessage.content += content;

                const contentEl = currentStreamMessage.element.querySelector('.message-content');

                if (isComplete) {
                    contentEl.innerHTML = formatContent(currentStreamMessage.content, 'server');
                    completeStreamMessage();
                } else {
                    contentEl.innerHTML = `<div class="whitespace-pre-wrap">${currentStreamMessage.content}</div><div class="typing-indicator flex gap-1 items-center mt-2"><span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span><span class="typing-dot w-1.5 h-1.5 bg-gray-600 rounded-full"></span></div>`;

                    streamTimeout = setTimeout(() => {
                        completeStreamMessage();
                    }, 2000);
                }

                dialogMessages.scrollTop = dialogMessages.scrollHeight;
            }

            // 完成流式消息
            function completeStreamMessage() {
                if (currentStreamMessage && !currentStreamMessage.complete) {
                    const contentEl = currentStreamMessage.element.querySelector('.message-content');
                    contentEl.innerHTML = formatContent(currentStreamMessage.content, 'server');

                    currentStreamMessage.element.classList.remove('bg-green-50');
                    currentStreamMessage.complete = true;
                    currentStreamMessage = null;

                    if (streamTimeout) {
                        clearTimeout(streamTimeout);
                        streamTimeout = null;
                    }
                }
            }

            // 复制消息内容
            window.copyMessage = function (btn) {
                const messageEl = btn.closest('.message');
                const contentEl = messageEl.querySelector('.message-content');
                const text = contentEl.textContent || contentEl.innerText;

                navigator.clipboard.writeText(text).then(() => {
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check mr-1"></i>已复制';
                    btn.classList.add('bg-green-100', 'text-green-700');
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.classList.remove('bg-green-100', 'text-green-700');
                    }, 2000);
                });
            };

            // 更新连接时间
            function updateConnectionTime() {
                if (connectionStartTime) {
                    const now = new Date();
                    const elapsed = Math.floor((now - connectionStartTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    connectionTimeEl.textContent = `${minutes}分${seconds}秒`;
                }
            }

            // 设置 URL
            function setUrl() {
                const newUrl = urlInput.value.trim();
                if (newUrl) {
                    if (newUrl.startsWith('ws://') || newUrl.startsWith('wss://')) {
                        currentUrl = newUrl;
                        addMessage(`已设置 URL: ${currentUrl}`, 'system');

                        if (websocket && websocket.readyState === WebSocket.OPEN) {
                            disconnect();
                            addMessage('URL 已更改，请重新连接', 'system');
                        }
                    } else {
                        addMessage('URL 必须以 ws:// 或 wss:// 开头', 'error');
                    }
                } else {
                    addMessage('请输入有效的 URL', 'error');
                }
            }

            // 连接到 WebSocket
            function connect() {
                try {
                    addMessage('正在连接到: ' + currentUrl, 'system');
                    websocket = new WebSocket(currentUrl);

                    websocket.onopen = function () {
                        addMessage('成功连接到: ' + currentUrl, 'system');
                        updateStatus(true);

                        connectionStartTime = new Date();
                        connectionTimer = setInterval(updateConnectionTime, 1000);
                    };

                    websocket.onclose = function () {
                        addMessage('连接已关闭', 'system');
                        updateStatus(false);

                        if (connectionTimer) {
                            clearInterval(connectionTimer);
                            connectionTimer = null;
                        }
                    };

                    websocket.onerror = function (error) {
                        addMessage('连接错误: ' + JSON.stringify(error), 'error');
                        updateStatus(false);
                    };

                    websocket.onmessage = function (event) {
                        receivedCount++;
                        receivedCountEl.textContent = receivedCount;

                        if (streamEnabled) {
                            simulateStreamResponse(event.data);
                        } else {
                            addMessage(event.data, 'server', '服务器');
                        }
                    };

                } catch (error) {
                    addMessage('连接异常: ' + error.message, 'error');
                    updateStatus(false);
                }
            }

            // 模拟流式响应
            function simulateStreamResponse(data) {
                startStreamMessage();

                const chunks = data.match(/.{1,10}/g) || [data];
                let delay = 0;

                chunks.forEach((chunk, index) => {
                    setTimeout(() => {
                        appendStreamContent(chunk, index === chunks.length - 1);
                    }, delay);
                    delay += 50 + Math.random() * 100;
                });
            }

            // 断开 WebSocket 连接
            function disconnect() {
                if (websocket) {
                    websocket.close();
                    websocket = null;
                    addMessage('已断开连接', 'system');

                    if (connectionTimer) {
                        clearInterval(connectionTimer);
                        connectionTimer = null;
                    }

                    if (currentStreamMessage) {
                        completeStreamMessage();
                    }
                }
            }

            // 发送消息
            function sendMessage() {
                const message = messageInput.value.trim();
                if (message && websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(message);
                    sentCount++;
                    sentCountEl.textContent = sentCount;
                    addMessage(message, 'user', '我');
                    messageInput.value = '';
                }
            }

            // 切换流式模式
            function toggleStreamMode() {
                streamEnabled = !streamEnabled;

                if (streamEnabled) {
                    toggleStreamBtn.innerHTML = '<i class="fas fa-toggle-on"></i><span>流式显示</span>';
                    toggleStreamBtn.classList.remove('bg-gray-600', 'hover:bg-gray-700');
                    toggleStreamBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                    streamStatusEl.innerHTML = '<i class="fas fa-stream text-purple-500"></i><span>流式模式: <span class="font-semibold text-purple-600">开启</span></span>';
                } else {
                    toggleStreamBtn.innerHTML = '<i class="fas fa-toggle-off"></i><span>普通显示</span>';
                    toggleStreamBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                    toggleStreamBtn.classList.add('bg-gray-600', 'hover:bg-gray-700');
                    streamStatusEl.innerHTML = '<i class="fas fa-stream text-gray-500"></i><span>流式模式: <span class="font-semibold text-gray-600">关闭</span></span>';
                }

                addMessage(`流式显示模式已${streamEnabled ? '开启' : '关闭'}`, 'system');
            }

            // 事件监听
            connectBtn.addEventListener('click', connect);
            disconnectBtn.addEventListener('click', disconnect);

            clearBtn.addEventListener('click', function () {
                dialogMessages.innerHTML = '';
                messagesCountEl.textContent = '(0 条消息)';
                addMessage('对话已清除', 'system');
            });

            sendBtn.addEventListener('click', sendMessage);

            messageInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            predefinedMsgButtons.forEach(button => {
                button.addEventListener('click', function () {
                    messageInput.value = this.dataset.msg;
                    messageInput.focus();
                });
            });

            urlSetBtn.addEventListener('click', setUrl);
            urlInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    setUrl();
                }
            });

            toggleStreamBtn.addEventListener('click', toggleStreamMode);

            // 初始化状态
            updateStatus(false);
        });
    </script>
